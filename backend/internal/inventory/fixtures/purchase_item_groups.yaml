vendors:
  - name: "Restaurant Depot"
  - name: "US Foods"
  - name: "Sysco"
  - name: "Costco"
  - name: "Local Farm"

# Groups and tags are seeded here. Items are NOT seeded — they are created
# automatically from receipt line items as they flow through the system.
# This ensures the item catalog reflects actual purchased products
# (e.g. "Poland Spring 40/16.9oz") rather than abstract categories.
item_groups:
  - name: "Proteins"
    par_days: 3
    tags: ["Proteins", "Meat"]

  - name: "Produce"
    par_days: 2
    tags: ["Produce", "Fresh"]

  - name: "Dairy"
    par_days: 4
    tags: ["Dairy", "Cold"]

  - name: "Dry Goods"
    par_days: 7
    tags: ["Dry Goods", "Pantry"]

  - name: "Packaging"
    par_days: 14
    tags: ["Supplies", "Packaging"]

  - name: "Beverages"
    par_days: 7
    tags: ["Drinks", "Beverages"]

  - name: "Bread"
    par_days: 2
    tags: ["Bread", "Bakery"]

  - name: "Cleaning Supplies"
    par_days: 30
    tags: ["Supplies", "Cleaning"]
