version: '3'

vars:
  DB_URL: '{{.DB_URL | default "postgres://yumyums:yumyums@localhost:5432/yumyums?sslmode=disable"}}'
  PORT: '{{.PORT | default "8080"}}'
  STATIC_DIR: '{{.STATIC_DIR | default ".."}}'

tasks:
  dev:
    desc: Run the server in development mode
    cmd: go run ./cmd/server
    env:
      STATIC_DIR: '{{.STATIC_DIR}}'
      PORT: '{{.PORT}}'
      DB_URL: '{{.DB_URL}}'
      SUPERADMIN_CONFIG: config/superadmins.yaml

  build:
    desc: Build the server binary with embedded frontend assets
    cmds:
      - rm -rf cmd/server/public/*
      - cp ../*.html ../*.js ../manifest.json cmd/server/public/
      - cp -r ../icons cmd/server/public/ 2>/dev/null || true
      - cp -r ../lib cmd/server/public/ 2>/dev/null || true
      - go build -o bin/server ./cmd/server

  db-start:
    desc: Start PostgreSQL container
    cmd: >-
      docker run -d --name yumyums-pg
      -e POSTGRES_USER=yumyums
      -e POSTGRES_PASSWORD=yumyums
      -e POSTGRES_DB=yumyums
      -p 5432:5432
      -v yumyums-pgdata:/var/lib/postgresql/data
      postgres:13

  db-stop:
    desc: Stop and remove PostgreSQL container
    cmd: docker stop yumyums-pg && docker rm yumyums-pg

  db-reset:
    desc: Reset database (stop, remove volume, restart)
    cmds:
      - task db-stop
      - docker volume rm yumyums-pgdata
      - task db-start

  db-test:
    desc: Ensure Postgres is running and hq_test database exists
    cmds:
      - docker start yumyums-pg 2>/dev/null || task backend:db-start
      - sleep 1
      - >-
        docker exec yumyums-pg
        psql -U yumyums -tc "SELECT 1 FROM pg_database WHERE datname = 'hq_test'"
        | grep -q 1
        || docker exec yumyums-pg psql -U yumyums -c "CREATE DATABASE hq_test"

  seed:
    desc: Run Go seed command
    cmd: go run ./cmd/seed
    env:
      DB_URL: '{{.DB_URL}}'

  import-notion:
    desc: Import Notion catalog export — uploads photos to DO Spaces, writes purchase_items.yaml
    dotenv: ['.env']
    cmd: >-
      go run ./cmd/import-notion/
      --csv ../notion-export/AllItems.csv
      --images ../notion-export/AllItems/
      --output internal/inventory/fixtures/purchase_items.yaml
    env:
      DO_SPACES_ENDPOINT: 'https://{{.DO_SPACES_REGION}}.digitaloceanspaces.com'

  import-notion-dry:
    desc: Dry-run Notion import (no upload, placeholder URLs)
    cmd: >-
      go run ./cmd/import-notion/
      --csv ../notion-export/AllItems.csv
      --images ../notion-export/AllItems/
      --output internal/inventory/fixtures/purchase_items.yaml
      --dry-run

  login:
    desc: Login as admin and save session cookie to /tmp/yumcookie
    cmd: >-
      curl -s -c /tmp/yumcookie
      -X POST http://localhost:{{.PORT}}/api/v1/auth/login
      -H 'Content-Type: application/json'
      -d '{"email":"jamal@yumyums.kitchen","password":"test123"}'
      | python3 -m json.tool

  simulate-cutoff:
    desc: Trigger weekly cutoff — locks current draft PO and creates next week's draft
    deps: [login]
    cmd: >-
      curl -s -X POST http://localhost:{{.PORT}}/api/v1/purchasing/simulate-cutoff
      -b /tmp/yumcookie | python3 -m json.tool

  db-reset-purchasing:
    desc: Wipe purchasing data (POs, shopping lists) for re-testing cutoff flow
    cmd: >-
      docker exec yumyums-pg psql -U yumyums -d yumyums -c "
        TRUNCATE shopping_list_items, shopping_list_vendor_sections, shopping_lists, po_line_items, purchase_orders CASCADE;
      "

  db-reset-inventory:
    desc: Wipe inventory + receipt data only (keeps users, templates, etc.)
    cmd: >-
      docker exec yumyums-pg psql -U yumyums -d yumyums -c "
        TRUNCATE purchase_line_items, purchase_events, pending_purchases CASCADE;
      "
