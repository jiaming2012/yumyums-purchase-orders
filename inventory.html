<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c447c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<title>Inventory - Yumyums HQ</title>
<style>
:root{--bg:#f5f5f3;--card:#fff;--txt:#1a1a1a;--mut:#6b6b6b;--brd:rgba(0,0,0,0.08);--info-bg:#e6f1fb;--info-tx:#0c447c;--warn-bg:#faeeda;--warn-tx:#854f0b}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--card:#262626;--txt:#f0f0f0;--mut:#999;--brd:rgba(255,255,255,0.1);--info-bg:#0c447c;--info-tx:#b5d4f4;--warn-bg:#633806;--warn-tx:#fac775}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{margin:0;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}
.app{max-width:480px;margin:0 auto;padding-top:20px}
.back{display:inline-flex;align-items:center;gap:4px;color:var(--info-tx);text-decoration:none;font-size:14px;font-weight:500;margin-bottom:16px;cursor:pointer}
.tabs{display:flex;gap:0;background:var(--card);border-radius:10px;padding:3px;border:0.5px solid var(--brd);margin-bottom:16px}
.tabs button{flex:1;border:none;background:transparent;padding:12px 0;font-size:14px;font-weight:500;color:var(--mut);border-radius:8px;cursor:pointer}
.tabs button.on{background:var(--info-bg);color:var(--info-tx)}
.card{background:var(--card);border:0.5px solid var(--brd);border-radius:12px;padding:16px;margin-bottom:8px}
.event-card{background:var(--card);border:0.5px solid var(--brd);border-radius:12px;padding:16px;margin-bottom:8px;cursor:pointer}
.event-header{display:flex;align-items:center;justify-content:space-between;gap:8px}
.event-vendor{font-size:15px;font-weight:600;color:var(--txt)}
.event-meta{font-size:12px;color:var(--mut);margin-top:2px}
.event-total{font-size:15px;font-weight:600;color:var(--info-tx);white-space:nowrap}
.event-detail{display:none;margin-top:12px;border-top:0.5px solid var(--brd);padding-top:12px}
.event-detail.open{display:block}
.line-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--brd)}
.line-item:last-child{border-bottom:none}
.line-item-name{font-size:13px;color:var(--txt);flex:1}
.line-item-qty{font-size:12px;color:var(--mut);white-space:nowrap}
.line-item-price{font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap}
.case-badge{font-size:10px;background:var(--warn-bg);color:var(--warn-tx);padding:1px 6px;border-radius:4px;margin-left:4px;vertical-align:middle}
.filter-select{width:100%;padding:10px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt);margin-bottom:12px;font-family:inherit;appearance:none;-webkit-appearance:none}
.coming-soon{text-align:center;padding:60px 20px;color:var(--mut)}
.coming-soon h3{font-size:16px;font-weight:500;color:var(--txt);margin:0 0 8px}
.coming-soon p{font-size:13px;margin:0;line-height:1.5}
.chart-wrap{position:relative;width:100%;height:220px}
.empty{text-align:center;padding:40px 20px;color:var(--mut)}
.empty p{font-size:13px;margin:0}
</style>
</head>
<body>
<div class="app">
  <a class="back" href="index.html">&#8249; HQ</a>
  <div class="tabs">
    <button id="t1" class="on" onclick="show(1)">History</button>
    <button id="t2" onclick="show(2)">Trends</button>
    <button id="t3" onclick="show(3)">Stock</button>
    <button id="t4" onclick="show(4)">Cost</button>
  </div>
  <div id="s1">
    <select id="vendor-filter" class="filter-select">
      <option value="">All Vendors</option>
    </select>
    <div id="history-list"></div>
  </div>
  <div id="s2" style="display:none">
    <!-- TODO: gate Trends to manager+ via backend roles (INTG-01) -->
    <div id="trends-container" class="coming-soon">
      <h3>Spending Trends</h3>
      <p>Category breakdown and monthly spending charts coming soon.</p>
    </div>
  </div>
  <div id="s3" style="display:none">
    <div class="coming-soon">
      <h3>Stock Levels</h3>
      <p>Purchase-frequency stock estimates and reorder suggestions coming soon.</p>
    </div>
  </div>
  <div id="s4" style="display:none">
    <!-- TODO: gate Cost to manager+ via backend roles (INTG-01) -->
    <div id="cost-container" class="coming-soon">
      <h3>Food Cost Intelligence</h3>
      <p>Menu item cost estimates and ingredient analysis coming soon.</p>
    </div>
  </div>
</div>
<script src="lib/chart.umd.min.js"></script>

let ACTIVE_TAB=1;

function show(n){
  [1,2,3,4].forEach(i=>{
    document.getElementById('s'+i).style.display=i===n?'':'none';
    var btn=document.getElementById('t'+i);
    if(btn)btn.className=i===n?'on':'';
  });
  ACTIVE_TAB=n;
  render();
}

function render(){
  if(ACTIVE_TAB===1)renderHistory();
  // if(ACTIVE_TAB===2)renderTrends(); // Phase 8
  if(ACTIVE_TAB===3)renderStock();
  // if(ACTIVE_TAB===4)renderCost();   // Phase 8
}

function calcStockLevels(){
  // Build lookup: purchaseItemId -> groupId
  var piToGroup={};
  MOCK_PURCHASE_ITEMS.forEach(pi=>{piToGroup[pi.id]=pi.groupId;});
  // Build lookup: groupId -> list of purchase events with date/vendor/price
  var groupPurchases={};
  MOCK_PURCHASES.forEach(p=>{
    var gid=piToGroup[p.purchaseItemId];
    if(!gid)return;
    if(!groupPurchases[gid])groupPurchases[gid]=[];
    groupPurchases[gid].push(p);
  });
  // Get event map for date/vendor lookup
  var eventMap={};
  MOCK_PURCHASE_EVENTS.forEach(e=>{eventMap[e.id]=e;});
  // Count weeks in sales data
  var weekSet=new Set(MOCK_SALES.map(s=>s.weekOf));
  var numWeeks=weekSet.size||1;
  // Build sales totals per menuItemId
  var salesTotals={};
  MOCK_SALES.forEach(s=>{
    salesTotals[s.menuItemId]=(salesTotals[s.menuItemId]||0)+s.qty;
  });
  return MOCK_ITEM_GROUPS.map(grp=>{
    var purchases=groupPurchases[grp.id]||[];
    var totalPurchased=purchases.reduce((sum,p)=>sum+p.qty,0);
    // Calculate totalConsumed via sales * ingredient ratio
    var totalConsumed=0;
    MOCK_MENU_ITEMS.forEach(mi=>{
      if(!mi.ingredientGroupIds.includes(grp.id))return;
      var salesQty=salesTotals[mi.id]||0;
      var ratio=1/mi.ingredientGroupIds.length;
      totalConsumed+=salesQty*ratio;
    });
    var remaining=Math.max(0,totalPurchased-totalConsumed);
    var avgWeeklyConsumption=totalConsumed/numWeeks;
    // Determine level
    var level;
    if(totalPurchased===0){
      level='unknown';
    } else if(remaining>avgWeeklyConsumption*1){
      level='high';
    } else if(remaining>avgWeeklyConsumption*0.5){
      level='medium';
    } else {
      level='low';
    }
    // Find last purchase info
    var lastPurchaseDate='',lastVendor='',lastPrice=0;
    if(purchases.length){
      var withDates=purchases.map(p=>{
        var evt=eventMap[p.purchaseEventId]||{};
        return {p,date:evt.date||'',vendorName:evt.vendorName||'',price:p.price};
      });
      withDates.sort((a,b)=>b.date.localeCompare(a.date));
      lastPurchaseDate=withDates[0].date;
      lastVendor=withDates[0].vendorName;
      lastPrice=withDates[0].price;
    }
    return {groupId:grp.id,groupName:grp.name,tagIds:grp.tagIds,level,remaining:Math.round(remaining*10)/10,avgWeeklyConsumption:Math.round(avgWeeklyConsumption*10)/10,lastPurchaseDate,lastVendor,lastPrice,totalPurchased,totalConsumed:Math.round(totalConsumed*10)/10};
  });
}

function formatDate(dateStr){
  var d=parseLocalDate(dateStr);
  return new Intl.DateTimeFormat('en-US',{month:'short',day:'numeric',year:'numeric'}).format(d);
}

function renderLineItems(eventId){
  var items=MOCK_PURCHASES.filter(p=>p.purchaseEventId===eventId);
  return '<div class="event-detail" style="display:block">'+items.map(p=>'<div class="line-item"><div style="flex:1"><div style="font-size:13px;font-weight:500">'+p.name+'</div><div style="font-size:12px;color:var(--mut);margin-top:2px">Qty: '+p.qty+(p.isCase?' <span class="case-badge">CASE</span>':'')+'</div></div><div style="font-size:14px;font-weight:500">$'+p.price.toFixed(2)+'</div></div>').join('')+'</div>';
}

function renderHistory(){
  var sel=document.getElementById('vendor-filter');
  var vendors=[...MOCK_VENDORS].sort((a,b)=>a.name.localeCompare(b.name));
  sel.innerHTML='<option value="">All Vendors</option>'+vendors.map(v=>'<option value="'+v.id+'">'+v.name+'</option>').join('');
  sel.value=VENDOR_FILTER;
  var list=document.getElementById('history-list');
  var filtered=VENDOR_FILTER
    ?MOCK_PURCHASE_EVENTS.filter(e=>e.vendorId===VENDOR_FILTER)
    :MOCK_PURCHASE_EVENTS;
  var sorted=filtered.slice().sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length){
    list.innerHTML='<div class="coming-soon"><h3>No purchases found</h3><p>No purchase events match the selected filter.</p></div>';
    return;
  }
  list.innerHTML=sorted.map(evt=>{
    var expanded=EXPANDED_EVENTS[evt.id];
    return '<div class="event-card" data-action="toggle-event" data-id="'+evt.id+'"><div class="event-header"><div><div class="event-vendor">'+evt.vendorName+'</div><div class="event-meta">'+formatDate(evt.date)+'</div></div><div class="event-total">$'+evt.total.toFixed(2)+'</div></div>'+(expanded?renderLineItems(evt.id):'')+'</div>';
  }).join('');
}

document.getElementById('vendor-filter').addEventListener('change',function(e){
  VENDOR_FILTER=e.target.value;
  renderHistory();
});

document.getElementById('history-list').addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el)return;
  var action=el.dataset.action;
  var id=el.dataset.id;
  if(action==='toggle-event')toggleEventDetail(id);
});

function toggleEventDetail(eventId){
  EXPANDED_EVENTS[eventId]=!EXPANDED_EVENTS[eventId];
  renderHistory();
}
