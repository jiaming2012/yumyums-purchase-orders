<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c447c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<title>Inventory - Yumyums HQ</title>
<style>
:root{--bg:#f5f5f3;--card:#fff;--txt:#1a1a1a;--mut:#6b6b6b;--brd:rgba(0,0,0,0.08);--info-bg:#e6f1fb;--info-tx:#0c447c;--warn-bg:#faeeda;--warn-tx:#854f0b}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--card:#262626;--txt:#f0f0f0;--mut:#999;--brd:rgba(255,255,255,0.1);--info-bg:#0c447c;--info-tx:#b5d4f4;--warn-bg:#633806;--warn-tx:#fac775}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{margin:0;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}
.app{max-width:480px;margin:0 auto;padding-top:20px}
.back{display:inline-flex;align-items:center;gap:4px;color:var(--info-tx);text-decoration:none;font-size:14px;font-weight:500;margin-bottom:16px;cursor:pointer}
.tabs{display:flex;gap:0;background:var(--card);border-radius:10px;padding:3px;border:0.5px solid var(--brd);margin-bottom:16px}
.tabs button{flex:1;border:none;background:transparent;padding:12px 0;font-size:14px;font-weight:500;color:var(--mut);border-radius:8px;cursor:pointer}
.tabs button.on{background:var(--info-bg);color:var(--info-tx)}
.card{background:var(--card);border:0.5px solid var(--brd);border-radius:12px;padding:16px;margin-bottom:8px}
.event-card{background:var(--card);border:0.5px solid var(--brd);border-radius:12px;padding:16px;margin-bottom:8px;cursor:pointer}
.event-header{display:flex;align-items:center;justify-content:space-between;gap:8px}
.event-vendor{font-size:15px;font-weight:600;color:var(--txt)}
.event-meta{font-size:12px;color:var(--mut);margin-top:2px}
.event-total{font-size:15px;font-weight:600;color:var(--info-tx);white-space:nowrap}
.event-detail{display:none;margin-top:12px;border-top:0.5px solid var(--brd);padding-top:12px}
.event-detail.open{display:block}
.line-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--brd)}
.line-item:last-child{border-bottom:none}
.line-item-name{font-size:13px;color:var(--txt);flex:1}
.line-item-qty{font-size:12px;color:var(--mut);white-space:nowrap}
.line-item-price{font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap}
.case-badge{font-size:10px;background:var(--warn-bg);color:var(--warn-tx);padding:1px 6px;border-radius:4px;margin-left:4px;vertical-align:middle}
.filter-select{width:100%;padding:10px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt);margin-bottom:12px;font-family:inherit;appearance:none;-webkit-appearance:none}
.coming-soon{text-align:center;padding:60px 20px;color:var(--mut)}
.coming-soon h3{font-size:16px;font-weight:500;color:var(--txt);margin:0 0 8px}
.coming-soon p{font-size:13px;margin:0;line-height:1.5}
.chart-wrap{position:relative;width:100%;height:220px}
.empty{text-align:center;padding:40px 20px;color:var(--mut)}
.empty p{font-size:13px;margin:0}
.stock-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
.stock-high{background:#dcfce7;color:#166534}
.stock-medium{background:#fef9c3;color:#854d0e}
.stock-low{background:#fee2e2;color:#991b1b}
.stock-unknown{background:var(--brd);color:var(--mut)}
@media(prefers-color-scheme:dark){.stock-high{background:#14532d;color:#86efac}.stock-medium{background:#713f12;color:#fde047}.stock-low{background:#7f1d1d;color:#fca5a5}}
.tag-section{margin-bottom:16px}
.tag-header{display:flex;align-items:center;gap:8px;padding:12px 0;font-size:15px;font-weight:600;cursor:pointer;user-select:none;border-bottom:0.5px solid var(--brd)}
.tag-header .arrow{transition:transform 0.2s;font-size:12px;color:var(--mut)}
.tag-header .arrow.collapsed{transform:rotate(-90deg)}
.stock-item{background:var(--card);border:0.5px solid var(--brd);border-radius:12px;padding:14px 16px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px}
.stock-item-name{font-size:14px;font-weight:500;color:var(--txt)}
.stock-detail{display:none;background:var(--card);border:0.5px solid var(--brd);border-radius:0 0 12px 12px;border-top:none;padding:12px 16px;margin-top:-6px;margin-bottom:6px}
.stock-detail.open{display:block}
.stock-detail-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--brd);font-size:13px}
.stock-detail-row:last-child{border-bottom:none}
.stock-detail-label{color:var(--mut)}
.stock-detail-value{font-weight:500;color:var(--txt)}
.override-btn{margin-top:10px;width:100%;padding:8px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.reorder-section{background:var(--warn-bg);border-radius:12px;padding:16px;margin-bottom:16px}
.reorder-title{font-size:14px;font-weight:600;color:var(--warn-tx);margin-bottom:8px}
.reorder-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid rgba(0,0,0,0.06)}
.reorder-item:last-child{border-bottom:none}
.reorder-item-name{font-size:13px;font-weight:500;color:var(--txt)}
.reorder-item-meta{font-size:11px;color:var(--mut);margin-top:1px}
.override-form{background:var(--bg);border-radius:8px;padding:12px;margin-top:8px}
.override-radios{display:flex;gap:12px;margin-bottom:8px}
.override-radios label{display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer}
.override-radios input[type=radio]{accent-color:var(--info-tx)}
.override-reason{width:100%;padding:8px;background:var(--card);border:0.5px solid var(--brd);border-radius:6px;font-size:13px;color:var(--txt);font-family:inherit}
.override-actions{display:flex;gap:8px;margin-top:8px}
.btn-override{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-save{background:var(--info-bg);color:var(--info-tx)}
.btn-cancel{background:var(--bg);color:var(--mut)}
.btn-clear-override{background:transparent;color:var(--mut);border:none;font-size:12px;cursor:pointer;text-decoration:underline;padding:4px 0}
.overridden-indicator{font-size:10px;color:var(--mut);font-style:italic;margin-left:6px}
.sub-tabs{display:flex;gap:0;background:var(--bg);border-radius:8px;padding:2px;margin-bottom:12px}
.sub-tabs button{flex:1;border:none;background:transparent;padding:10px 0;font-size:13px;font-weight:500;color:var(--mut);border-radius:6px;cursor:pointer}
.sub-tabs button.on{background:var(--card);color:var(--info-tx)}
.chip-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{padding:6px 12px;border-radius:16px;border:0.5px solid var(--brd);background:var(--card);color:var(--mut);font-size:12px;font-weight:500;cursor:pointer;user-select:none}
.chip.on{background:var(--info-bg);color:var(--info-tx);border-color:var(--info-tx)}
.menu-card{background:var(--card);border:0.5px solid var(--brd);border-radius:12px;padding:16px;margin-bottom:8px;cursor:pointer}
.menu-card-header{display:flex;align-items:center;justify-content:space-between}
.menu-card-name{font-size:15px;font-weight:600;color:var(--txt)}
.menu-card-cost{font-size:15px;font-weight:600;color:var(--info-tx)}
.menu-card-detail{display:none;margin-top:12px;border-top:0.5px solid var(--brd);padding-top:12px}
.menu-card-detail.open{display:block}
.ingredient-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--brd);font-size:13px}
.ingredient-row:last-child{border-bottom:none}
.ingredient-name{color:var(--txt);flex:1}
.ingredient-pct{color:var(--mut);margin-right:12px;font-size:12px}
.ingredient-cost{font-weight:500;color:var(--txt);white-space:nowrap}
.revenue-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;margin-top:8px;border-top:0.5px solid var(--brd)}
.revenue-label{color:var(--mut)}
.revenue-value{font-weight:500}
</style>
</head>
<body>
<div class="app">
  <a class="back" href="index.html">&#8249; HQ</a>
  <div class="tabs">
    <button id="t1" class="on" onclick="show(1)">History</button>
    <button id="t2" onclick="show(2)">Trends</button>
    <button id="t3" onclick="show(3)">Stock</button>
    <button id="t4" onclick="show(4)">Cost</button>
  </div>
  <div id="s1">
    <select id="vendor-filter" class="filter-select">
      <option value="">All Vendors</option>
    </select>
    <div id="history-list"></div>
  </div>
  <div id="s2" style="display:none">
    <!-- TODO: gate Trends to manager+ via backend roles (INTG-01) -->
    <div id="trends-container" class="coming-soon">
      <h3>Spending Trends</h3>
      <p>Category breakdown and monthly spending charts coming soon.</p>
    </div>
  </div>
  <div id="s3" style="display:none">
    <div id="reorder-section"></div>
    <div id="stock-list"></div>
  </div>
  <div id="s4" style="display:none">
    <!-- TODO: gate Cost to manager+ via backend roles (INTG-01) -->
    <div id="cost-container" class="coming-soon">
      <h3>Food Cost Intelligence</h3>
      <p>Menu item cost estimates and ingredient analysis coming soon.</p>
    </div>
  </div>
</div>

function calcStockLevels(){
  // Build lookup: purchaseItemId -> groupId
  var piToGroup={};
  MOCK_PURCHASE_ITEMS.forEach(pi=>{piToGroup[pi.id]=pi.groupId;});
  // Build lookup: groupId -> list of purchase events with date/vendor/price
  var groupPurchases={};
  MOCK_PURCHASES.forEach(p=>{
    var gid=piToGroup[p.purchaseItemId];
    if(!gid)return;
    if(!groupPurchases[gid])groupPurchases[gid]=[];
    groupPurchases[gid].push(p);
  });
  // Get event map for date/vendor lookup
  var eventMap={};
  MOCK_PURCHASE_EVENTS.forEach(e=>{eventMap[e.id]=e;});
  // Count weeks in sales data
  var weekSet=new Set(MOCK_SALES.map(s=>s.weekOf));
  var numWeeks=weekSet.size||1;
  // Build sales totals per menuItemId
  var salesTotals={};
  MOCK_SALES.forEach(s=>{
    salesTotals[s.menuItemId]=(salesTotals[s.menuItemId]||0)+s.qty;
  });
  return MOCK_ITEM_GROUPS.map(grp=>{
    var purchases=groupPurchases[grp.id]||[];
    var totalPurchased=purchases.reduce((sum,p)=>sum+p.qty,0);
    // Calculate totalConsumed via sales * ingredient ratio
    var totalConsumed=0;
    MOCK_MENU_ITEMS.forEach(mi=>{
      if(!mi.ingredientGroupIds.includes(grp.id))return;
      var salesQty=salesTotals[mi.id]||0;
      var ratio=1/mi.ingredientGroupIds.length;
      totalConsumed+=salesQty*ratio;
    });
    var remaining=Math.max(0,totalPurchased-totalConsumed);
    var avgWeeklyConsumption=totalConsumed/numWeeks;
    // Determine level
    var level;
    if(totalPurchased===0){
      level='unknown';
    } else if(remaining>avgWeeklyConsumption*1){
      level='high';
    } else if(remaining>avgWeeklyConsumption*0.5){
      level='medium';
    } else {
      level='low';
    }
    // Find last purchase info
    var lastPurchaseDate='',lastVendor='',lastPrice=0;
    if(purchases.length){
      var withDates=purchases.map(p=>{
        var evt=eventMap[p.purchaseEventId]||{};
        return {p,date:evt.date||'',vendorName:evt.vendorName||'',price:p.price};
      });
      withDates.sort((a,b)=>b.date.localeCompare(a.date));
      lastPurchaseDate=withDates[0].date;
      lastVendor=withDates[0].vendorName;
      lastPrice=withDates[0].price;
    }
    return {groupId:grp.id,groupName:grp.name,tagIds:grp.tagIds,level,remaining:Math.round(remaining*10)/10,avgWeeklyConsumption:Math.round(avgWeeklyConsumption*10)/10,lastPurchaseDate,lastVendor,lastPrice,totalPurchased,totalConsumed:Math.round(totalConsumed*10)/10};
  });
}

function spendByTag(chips){
  var piToGroup={};
  MOCK_PURCHASE_ITEMS.forEach(pi=>{piToGroup[pi.id]=pi.groupId;});
  var groupToTags={};
  MOCK_ITEM_GROUPS.forEach(g=>{groupToTags[g.id]=g.tagIds;});
  var totals={};
  MOCK_PURCHASES.forEach(p=>{
    var gid=piToGroup[p.purchaseItemId];
    if(!gid)return;
    var tagIds=groupToTags[gid]||[];
    var primaryTag=tagIds[0];
    if(!primaryTag)return;
    if(chips.size>0&&!chips.has(primaryTag))return;
    totals[primaryTag]=(totals[primaryTag]||0)+p.price*p.qty;
  });
  var labels=[],data=[],colors=[];
  var palette=['#ef4444','#22c55e','#f59e0b','#3b82f6','#8b5cf6'];
  MOCK_TAGS.forEach((t,i)=>{
    if(chips.size>0&&!chips.has(t.id))return;
    labels.push((TAG_EMOJI[t.id]||'')+' '+t.name);
    data.push(Math.round((totals[t.id]||0)*100)/100);
    colors.push(palette[i%palette.length]);
  });
  return {labels,data,colors};
}

function spendByMonth(chips){
  var piToGroup={};
  MOCK_PURCHASE_ITEMS.forEach(pi=>{piToGroup[pi.id]=pi.groupId;});
  var groupToTags={};
  MOCK_ITEM_GROUPS.forEach(g=>{groupToTags[g.id]=g.tagIds;});
  var eventMap={};
  MOCK_PURCHASE_EVENTS.forEach(e=>{eventMap[e.id]=e;});
  var monthTotals={};
  MOCK_PURCHASES.forEach(p=>{
    var evt=eventMap[p.purchaseEventId];
    if(!evt)return;
    if(chips.size>0){
      var gid=piToGroup[p.purchaseItemId];
      var tagIds=gid?(groupToTags[gid]||[]):[];
      var hasMatch=tagIds.some(tid=>chips.has(tid));
      if(!hasMatch)return;
    }
    var d=parseLocalDate(evt.date);
    var key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    monthTotals[key]=(monthTotals[key]||0)+p.price*p.qty;
  });
  var keys=Object.keys(monthTotals).sort();
  var labels=keys.map(k=>{
    var parts=k.split('-');
    var d=new Date(Number(parts[0]),Number(parts[1])-1,1);
    return new Intl.DateTimeFormat('en-US',{month:'short',year:'numeric'}).format(d);
  });
  var data=keys.map(k=>Math.round(monthTotals[k]*100)/100);
  return {labels,data};
}

function calcAvgUnitPrice(groupId){
  var piIds=MOCK_PURCHASE_ITEMS.filter(pi=>pi.groupId===groupId).map(pi=>pi.id);
  var relevant=MOCK_PURCHASES.filter(p=>piIds.includes(p.purchaseItemId));
  var totalQty=relevant.reduce((s,p)=>s+p.qty,0);
  if(!totalQty)return 0;
  var totalCost=relevant.reduce((s,p)=>s+p.price*p.qty,0);
  return totalCost/totalQty;
}

function calcMenuItemCost(menuItem){
  var n=menuItem.ingredientGroupIds.length||1;
  var ingredients=menuItem.ingredientGroupIds.map(gid=>{
    var grp=MOCK_ITEM_GROUPS.find(g=>g.id===gid)||{name:gid};
    var avg=calcAvgUnitPrice(gid);
    var proportion=1/n;
    return {name:grp.name,groupId:gid,proportion,avgUnitPrice:avg,lineCost:avg*proportion};
  });
  var totalCost=ingredients.reduce((s,i)=>s+i.lineCost,0);
  return {totalCost,ingredients};
}

function calcIngredientUsage(groupId){
  var avgPrice=calcAvgUnitPrice(groupId);
  var salesTotals={};
  MOCK_SALES.forEach(s=>{salesTotals[s.menuItemId]=(salesTotals[s.menuItemId]||0)+s.qty;});
  var usages=MOCK_MENU_ITEMS.filter(mi=>mi.ingredientGroupIds.includes(groupId)).map(mi=>{
    var proportion=1/mi.ingredientGroupIds.length;
    var costContribution=avgPrice*proportion;
    var totalSalesQty=salesTotals[mi.id]||0;
    var revenue=totalSalesQty*mi.price;
    var returnOnPurchase=costContribution>0?revenue/costContribution:0;
    return {menuItemName:mi.name,costContribution,revenue,returnOnPurchase};
  });
  var totalContrib=usages.reduce((s,u)=>s+u.costContribution,0);
  usages.forEach(u=>{u.pct=totalContrib>0?(u.costContribution/totalContrib*100):0;});
  return usages;
}

  } else {
    html+=MOCK_ITEM_GROUPS.map(grp=>{
      var avg=calcAvgUnitPrice(grp.id);
      var expanded=EXPANDED_INGREDIENTS[grp.id];
      var detail='';

        detail='<div class="menu-card-detail open">'+rows+'</div>';
      }
      return '<div class="menu-card" data-action="toggle-ingredient" data-group-id="'+grp.id+'"><div class="menu-card-header"><span class="menu-card-name">'+grp.name+'</span><span class="menu-card-cost">$'+avg.toFixed(2)+' avg/unit</span></div>'+detail+'</div>';
    }).join('');
  }
  document.getElementById('cost-container').innerHTML=html;
}

document.getElementById('s4').addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el)return;
  var action=el.dataset.action;
  if(action==='cost-subtab'){
    COST_SUB_TAB=Number(el.dataset.sub);
    renderCost();
  } else if(action==='toggle-menu-item'){
    var mid=el.dataset.menuId;
    EXPANDED_MENU_ITEMS[mid]=!EXPANDED_MENU_ITEMS[mid];
    renderCost();
  } else if(action==='toggle-ingredient'){
    var gid=el.dataset.groupId;
    EXPANDED_INGREDIENTS[gid]=!EXPANDED_INGREDIENTS[gid];
    renderCost();
  }
});

// Tag emoji map: Proteins 🥩, Produce 🥬, Dairy 🧀, Supplies 📦, Beverages 🥤
const TAG_EMOJI={'tag_1':'🥩','tag_2':'🥬','tag_3':'🧀','tag_4':'📦','tag_5':'🥤'};
const LEVEL_ORDER={low:0,medium:1,high:2,unknown:3};

function badgeHtml(level){
  return '<span class="stock-badge stock-'+level+'">'+(level.charAt(0).toUpperCase()+level.slice(1))+'</span>';
}

function renderStock(){
  var stocks=calcStockLevels();
  // Apply overrides to stock levels
  stocks.forEach(s=>{
    if(STOCK_OVERRIDES[s.groupId])s.level=STOCK_OVERRIDES[s.groupId].level;
  });
  // Reorder suggestions (use override-adjusted levels)
  var reorderEl=document.getElementById('reorder-section');
  var needsReorder=stocks.filter(s=>s.level==='low'||s.level==='medium');
  needsReorder.sort((a,b)=>LEVEL_ORDER[a.level]-LEVEL_ORDER[b.level]||a.groupName.localeCompare(b.groupName));
  if(needsReorder.length){
    reorderEl.innerHTML='<div class="reorder-section"><div class="reorder-title">Reorder Suggestions ('+needsReorder.length+')</div>'+needsReorder.map(s=>'<div class="reorder-item"><div><div class="reorder-item-name">'+s.groupName+'</div><div class="reorder-item-meta">'+(s.lastPurchaseDate?'Last bought: '+formatDate(s.lastPurchaseDate):'No purchase history')+'</div></div>'+badgeHtml(s.level)+'</div>').join('')+'</div>';
  } else {
    reorderEl.innerHTML='';
  }
  // Tag-grouped stock list
  var tagMap={};
  MOCK_TAGS.forEach(t=>{tagMap[t.id]=t;});
  // Group stocks by first tagId
  var sections={};
  stocks.forEach(s=>{
    var tid=s.tagIds[0];
    if(!sections[tid])sections[tid]=[];
    sections[tid].push(s);
  });
  var html='';
  MOCK_TAGS.forEach(tag=>{
    var items=sections[tag.id];
    if(!items||!items.length)return;
    items.sort((a,b)=>LEVEL_ORDER[a.level]-LEVEL_ORDER[b.level]||a.groupName.localeCompare(b.groupName));
    var collapsed=COLLAPSED_TAGS[tag.id];
    var emoji=TAG_EMOJI[tag.id]||'';
    html+='<div class="tag-section">';
    html+='<div class="tag-header" data-action="toggle-tag" data-tag-id="'+tag.id+'">'+emoji+' '+tag.name+'<span style="font-size:12px;color:var(--mut);font-weight:400;margin-left:4px">('+items.length+')</span><span class="arrow'+(collapsed?' collapsed':'')+'">▼</span></div>';
    if(!collapsed){
      items.forEach(s=>{
        var expanded=EXPANDED_STOCK_ITEMS[s.groupId];
        var ovr=STOCK_OVERRIDES[s.groupId];
        var badgeAndIndicator=badgeHtml(s.level)+(ovr?'<span class="overridden-indicator">Overridden</span>':'');
        html+='<div class="stock-item" data-action="toggle-stock-item" data-group-id="'+s.groupId+'"><span class="stock-item-name">'+s.groupName+'</span>'+badgeAndIndicator+'</div>';
        if(expanded){
          var lastDate=s.lastPurchaseDate?formatDate(s.lastPurchaseDate):'Unknown';
          var vendor=s.lastVendor||'Unknown';
          var price=s.lastPrice?'$'+s.lastPrice.toFixed(2):'Unknown';
          var remaining=s.totalPurchased===0?'No history':'~'+s.remaining+' units';
          var freq=s.avgWeeklyConsumption>0?'~'+s.avgWeeklyConsumption+' units/week':'Unknown';
          html+='<div class="stock-detail open">';
          html+='<div class="stock-detail-row"><span class="stock-detail-label">Last purchased</span><span class="stock-detail-value">'+lastDate+'</span></div>';
          html+='<div class="stock-detail-row"><span class="stock-detail-label">Last vendor</span><span class="stock-detail-value">'+vendor+'</span></div>';
          html+='<div class="stock-detail-row"><span class="stock-detail-label">Avg weekly use</span><span class="stock-detail-value">'+freq+'</span></div>';
          html+='<div class="stock-detail-row"><span class="stock-detail-label">Last price</span><span class="stock-detail-value">'+price+'</span></div>';
          html+='<div class="stock-detail-row"><span class="stock-detail-label">Est. remaining</span><span class="stock-detail-value">'+remaining+'</span></div>';
          if(ovr){
            html+='<div class="stock-detail-row"><span class="stock-detail-label">Override reason</span><span class="stock-detail-value">'+ovr.reason+'</span></div>';
            html+='<button class="btn-clear-override" data-action="clear-override" data-group-id="'+s.groupId+'">Clear Override</button>';
          } else if(OVERRIDE_FORM_OPEN===s.groupId){
            html+='<div class="override-form">';
            html+='<div class="override-radios"><label><input type="radio" name="override-level" value="low"> Low</label><label><input type="radio" name="override-level" value="medium"> Medium</label><label><input type="radio" name="override-level" value="high"> High</label></div>';
            html+='<input class="override-reason" placeholder="Reason for override..." data-group-id="'+s.groupId+'">';
            html+='<div class="override-actions"><button class="btn-override btn-save" data-action="save-override" data-group-id="'+s.groupId+'">Save Override</button><button class="btn-override btn-cancel" data-action="cancel-override">Cancel</button></div>';
            html+='</div>';
          } else {
            html+='<button class="override-btn" data-action="show-override" data-group-id="'+s.groupId+'">Override Level</button>';
          }
          html+='</div>';
        }
      });
    }
    html+='</div>';
  });
  document.getElementById('stock-list').innerHTML=html;
}

document.getElementById('s2').addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el)return;
  var action=el.dataset.action;
  if(action==='toggle-chip'){
    var tid=el.dataset.tagId;
    if(!tid){
      ACTIVE_CHIPS.clear();
    } else if(ACTIVE_CHIPS.has(tid)){
      ACTIVE_CHIPS.delete(tid);
    } else {
      ACTIVE_CHIPS.add(tid);
      if(ACTIVE_CHIPS.size===MOCK_TAGS.length)ACTIVE_CHIPS.clear();
    }
    renderTrends();
  } else if(action==='trends-subtab'){
    TRENDS_SUB_TAB=Number(el.dataset.sub);
    renderTrends();
  }
});

document.addEventListener('click',function(e){
  if(ACTIVE_TAB!==3)return;
  var el=e.target.closest('[data-action]');
  if(!el)return;
  var action=el.dataset.action;
  if(action==='toggle-stock-item'){
    var gid=el.dataset.groupId;
    EXPANDED_STOCK_ITEMS[gid]=!EXPANDED_STOCK_ITEMS[gid];
    renderStock();
  } else if(action==='toggle-tag'){
    var tid=el.dataset.tagId;
    COLLAPSED_TAGS[tid]=!COLLAPSED_TAGS[tid];
    renderStock();
  } else if(action==='show-override'){
    OVERRIDE_FORM_OPEN=el.dataset.groupId;
    renderStock();
  } else if(action==='save-override'){
    var gid=el.dataset.groupId;
    var radio=document.querySelector('input[name="override-level"]:checked');
    if(!radio)return;
    var reason=(document.querySelector('.override-reason')||{}).value||'';
    STOCK_OVERRIDES[gid]={level:radio.value,reason:reason,timestamp:new Date()};
    OVERRIDE_FORM_OPEN=null;
    renderStock();
  } else if(action==='cancel-override'){
    OVERRIDE_FORM_OPEN=null;
    renderStock();
  } else if(action==='clear-override'){
    var gid=el.dataset.groupId;
    delete STOCK_OVERRIDES[gid];
    renderStock();
  }
});

function formatDate(dateStr){
  var d=parseLocalDate(dateStr);
  return new Intl.DateTimeFormat('en-US',{month:'short',day:'numeric',year:'numeric'}).format(d);
}

function renderLineItems(eventId){
  var items=MOCK_PURCHASES.filter(p=>p.purchaseEventId===eventId);
  return '<div class="event-detail" style="display:block">'+items.map(p=>'<div class="line-item"><div style="flex:1"><div style="font-size:13px;font-weight:500">'+p.name+'</div><div style="font-size:12px;color:var(--mut);margin-top:2px">Qty: '+p.qty+(p.isCase?' <span class="case-badge">CASE</span>':'')+'</div></div><div style="font-size:14px;font-weight:500">$'+p.price.toFixed(2)+'</div></div>').join('')+'</div>';
}

function renderHistory(){
  var sel=document.getElementById('vendor-filter');
  var vendors=[...MOCK_VENDORS].sort((a,b)=>a.name.localeCompare(b.name));
  sel.innerHTML='<option value="">All Vendors</option>'+vendors.map(v=>'<option value="'+v.id+'">'+v.name+'</option>').join('');
  sel.value=VENDOR_FILTER;
  var list=document.getElementById('history-list');
  var filtered=VENDOR_FILTER
    ?MOCK_PURCHASE_EVENTS.filter(e=>e.vendorId===VENDOR_FILTER)
    :MOCK_PURCHASE_EVENTS;
  var sorted=filtered.slice().sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length){
    list.innerHTML='<div class="coming-soon"><h3>No purchases found</h3><p>No purchase events match the selected filter.</p></div>';
    return;
  }
  list.innerHTML=sorted.map(evt=>{
    var expanded=EXPANDED_EVENTS[evt.id];
    return '<div class="event-card" data-action="toggle-event" data-id="'+evt.id+'"><div class="event-header"><div><div class="event-vendor">'+evt.vendorName+'</div><div class="event-meta">'+formatDate(evt.date)+'</div></div><div class="event-total">$'+evt.total.toFixed(2)+'</div></div>'+(expanded?renderLineItems(evt.id):'')+'</div>';
  }).join('');
}

document.getElementById('vendor-filter').addEventListener('change',function(e){
  VENDOR_FILTER=e.target.value;
  renderHistory();
});

document.getElementById('history-list').addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el)return;
  var action=el.dataset.action;
  var id=el.dataset.id;
  if(action==='toggle-event')toggleEventDetail(id);
});

function toggleEventDetail(eventId){
  EXPANDED_EVENTS[eventId]=!EXPANDED_EVENTS[eventId];
  renderHistory();
}

if(typeof Chart==='undefined')console.error('Chart.js failed to load');

document.addEventListener('dblclick',e=>e.preventDefault());
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');

show(1);
