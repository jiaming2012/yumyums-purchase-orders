<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c447c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<title>Onboarding - Yumyums HQ</title>
<style>
:root{--bg:#f5f5f3;--card:#fff;--txt:#1a1a1a;--mut:#6b6b6b;--brd:rgba(0,0,0,0.08);--info-bg:#e6f1fb;--info-tx:#0c447c;--warn-bg:#faeeda;--warn-tx:#854f0b}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--card:#262626;--txt:#f0f0f0;--mut:#999;--brd:rgba(255,255,255,0.1);--info-bg:#0c447c;--info-tx:#b5d4f4;--warn-bg:#633806;--warn-tx:#fac775}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{margin:0;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}
.app{max-width:480px;margin:0 auto;padding-top:20px}
.back{display:inline-flex;align-items:center;gap:4px;color:var(--info-tx);text-decoration:none;font-size:14px;font-weight:500;margin-bottom:16px;cursor:pointer}
.tabs{display:flex;gap:0;background:var(--card);border-radius:10px;padding:3px;border:0.5px solid var(--brd);margin-bottom:16px}
.tabs button{flex:1;border:none;background:transparent;padding:12px 0;font-size:14px;font-weight:500;color:var(--mut);border-radius:8px;cursor:pointer}
.tabs button.on{background:var(--info-bg);color:var(--info-tx)}
.card{background:var(--card);border:0.5px solid var(--brd);border-radius:12px;padding:16px;margin-bottom:8px}
.cat{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:var(--mut);padding:16px 0 8px}
.sec-header{display:flex;align-items:center;justify-content:space-between;min-height:44px;padding:12px 16px;cursor:pointer;background:var(--card);border-radius:10px;margin-bottom:4px;border:0.5px solid var(--brd)}
.sec-header.locked{cursor:default;opacity:0.5}
.pill{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:8px}
.pill-warn{background:var(--warn-bg);color:var(--warn-tx)}
.pill-ok{background:rgba(39,174,96,0.12);color:#27ae60}
.item-row{display:flex;align-items:flex-start;gap:8px;padding:12px 16px;border-bottom:0.5px solid var(--brd);min-height:44px}
.ob-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--brd);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:2px}
.ob-check.checked{background:rgba(39,174,96,0.12);border-color:#27ae60;color:#27ae60}
.btn-primary{width:100%;padding:12px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:12px}
.btn-danger{width:100%;padding:12px;background:transparent;color:#c0392b;border:0.5px solid #c0392b;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px}
.btn-approve{width:100%;padding:12px;background:rgba(39,174,96,0.12);color:#27ae60;border:0.5px solid #27ae60;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:12px}
.empty{text-align:center;padding:40px 20px;color:var(--mut)}
.empty h3{font-size:14px;font-weight:500;color:var(--txt);margin:0 0 8px}
.empty p{font-size:12px;margin:0}
.video-link{color:var(--info-tx);font-size:14px;font-weight:500;text-decoration:none;white-space:nowrap}
.faq-q{font-size:14px;font-weight:500;padding:12px 16px;cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--brd)}
.faq-a{font-size:13px;color:var(--mut);padding:8px 16px 16px;line-height:1.5}
.attribution{font-size:11px;color:var(--mut);margin-top:2px}
.sec-items{background:var(--card);border:0.5px solid var(--brd);border-radius:10px;margin-bottom:4px;overflow:hidden}
.sec-items .item-row:last-child{border-bottom:none}
.sec-actions{padding:12px 16px}
.sub-tabs{display:flex;gap:0;margin-bottom:12px}
.sub-tabs button{flex:1;border:none;background:transparent;padding:8px 0;font-size:12px;font-weight:500;color:var(--mut);border-bottom:2px solid transparent;cursor:pointer}
.sub-tabs button.on{color:var(--info-tx);border-bottom-color:var(--info-tx)}
.hire-role{font-size:12px;color:var(--mut);text-transform:capitalize}
.assign-picker{background:var(--card);border:0.5px solid var(--brd);border-radius:12px;padding:8px;margin-top:8px}
.assign-row{padding:10px 12px;cursor:pointer;border-radius:8px;font-size:14px;min-height:44px;display:flex;align-items:center}
.assign-row:active{background:var(--brd)}
</style>
</head>
<body>
<div class="app">
  <a class="back" href="index.html">&#8249; HQ</a>
  <div class="tabs">
    <button id="t1" class="on" onclick="show(1)">My Trainings</button>

<script>

const MOCK_OB_TEMPLATES = [

              { id: 'vp_lc_cleanup_2', title: 'Part 2: Deep Clean Protocol', desc: 'Step-by-step deep cleaning procedures', url: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ' },

              { id: 'vp_fs_sv_1', title: 'Part 1: Personal Hygiene', desc: 'Handwashing, illness policies, and personal cleanliness', url: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ' },
              { id: 'vp_fs_sv_2', title: 'Part 2: Safe Food Handling', desc: 'Receiving, storing, and preparing food safely', url: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ' },
              { id: 'vp_fs_sv_3', title: 'Part 3: Cleaning and Sanitation', desc: 'Cleaning schedules and sanitizer concentration', url: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ' },

const SECTION_STATES = {};
const OB_CHECKS = {};
const FAQ_VIEWED = {};
const EXPANDED_SECTIONS = {};
const EXPANDED_FAQS = {};
let obState = { view: 'list', activeHireId: null, activeTemplateIdx: 0 };
let mgrState = { view: 'list', subView: 'active', activeHireId: null, activeTemplateIdx: 0 };
let assignPickerOpen = null;
let obBuilderState = { view: 'list', activeTemplate: null };
function isManager() {
  return ['admin','manager','superadmin'].includes(MOCK_CURRENT_USER.role);
}
function getMyHire() {
  return MOCK_HIRES.find(h => h.userId === MOCK_CURRENT_USER.id);
}
function initSectionStates(hire) {
  if (!hire) return;
  if (SECTION_STATES[hire.id]) return;
  SECTION_STATES[hire.id] = {};
  hire.assignedTemplates.forEach(tplId => {
    var tpl = MOCK_OB_TEMPLATES.find(t => t.id === tplId);
    if (!tpl) return;
    tpl.sections.forEach((sec, idx) => {
      SECTION_STATES[hire.id][sec.id] = idx === 0 ? 'active' : 'locked';
    });
  });
}
function isSectionComplete(hireId, section) {
  if (section.isFaq) return FAQ_VIEWED[hireId] === true;
  for (var i = 0; i < section.items.length; i++) {
    var item = section.items[i];
    if (item.type === 'checkbox') {
      if (!OB_CHECKS[item.id]) return false;
    } else if (item.type === 'video_series') {
      for (var j = 0; j < item.parts.length; j++) {
        if (!OB_CHECKS[item.parts[j].id]) return false;
      }
    }
  }
  return true;
}
function canUnlockNext(hireId, sections, currentIndex) {
  var sec = sections[currentIndex];
  var state = SECTION_STATES[hireId][sec.id];
  if (!isSectionComplete(hireId, sec)) return false;
  if (sec.requiresSignOff && state !== 'signed_off') return false;
  return true;
}
function tryAdvanceSections(hireId, tplId) {
  var tpl = MOCK_OB_TEMPLATES.find(t => t.id === tplId);
  if (!tpl) return;
  var sections = tpl.sections;
  for (var i = 0; i < sections.length - 1; i++) {
    var sec = sections[i];
    var nextSec = sections[i + 1];
    var nextState = SECTION_STATES[hireId][nextSec.id];
    if (canUnlockNext(hireId, sections, i) && nextState === 'locked') {
      SECTION_STATES[hireId][nextSec.id] = 'active';
    }
  }
}
function getSectionItemCount(section) {
  var total = 0;
  section.items.forEach(function(item) {
    if (item.type === 'checkbox') total++;
    else if (item.type === 'video_series') total += item.parts.length;
  });
  return total;
}
function getSectionCheckedCount(section) {
  var checked = 0;
  section.items.forEach(function(item) {
    if (item.type === 'checkbox') {
      if (OB_CHECKS[item.id]) checked++;
    } else if (item.type === 'video_series') {
      item.parts.forEach(function(p) {
        if (OB_CHECKS[p.id]) checked++;
      });
    }
  });
  return checked;
}
function getProgress(hireId, template) {
  var total = 0, checked = 0;
  template.sections.forEach(function(sec) {
    if (sec.isFaq) return;
    sec.items.forEach(function(item) {
      if (item.type === 'checkbox') {
        total++;
        if (OB_CHECKS[item.id]) checked++;
      } else if (item.type === 'video_series') {
        item.parts.forEach(function(p) {
          total++;
          if (OB_CHECKS[p.id]) checked++;
        });
      }
    });
  });
  return { checked: checked, total: total, pct: total > 0 ? Math.round((checked / total) * 100) : 0 };
}
function show(n) {
  [1,2,3].forEach(function(i) {
    document.getElementById('s'+i).style.display = i===n ? '' : 'none';
    document.getElementById('t'+i).classList.toggle('on', i===n);
  });
  if (n === 3) renderOBBuilder();
}
function generateOBId(prefix) {
  return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
}
function createNewOBTemplate(name, role) {
  return { id: generateOBId('tpl'), name: name, role: role, sections: [] };
}
function createNewOBSection(title) {
  return { id: generateOBId('sec'), title: title, requiresSignOff: false, isFaq: false, items: [] };
}
function escapeOBAttr(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function renderOBBuilder() {
  var body = document.getElementById('builder-body');
  if (!body) return;
  if (obBuilderState.view === 'list') {
    body.innerHTML = renderOBTemplateList();
  } else {
    body.innerHTML = renderOBEditor();
  }
}
function renderOBTemplateList() {
  var html = '';
  if (MOCK_OB_TEMPLATES.length === 0) {
    html += '<div class="empty"><h3>No templates yet.</h3><p>Create your first onboarding template to get started.</p></div>';
  } else {
    MOCK_OB_TEMPLATES.forEach(function(tpl) {
      var roleLabel = tpl.role ? tpl.role.replace(/_/g,' ') : 'All roles';
      var secCount = tpl.sections.length;
      html += '<div class="card" style="cursor:pointer" data-action="open-template" data-tpl-id="'+tpl.id+'">';
      html += '<div style="font-size:14px;font-weight:500;margin-bottom:4px">'+escapeOBAttr(tpl.name)+'</div>';
      html += '<div style="font-size:12px;color:var(--mut);text-transform:capitalize">'+escapeOBAttr(roleLabel)+'</div>';
      html += '<div style="font-size:12px;color:var(--mut)">'+secCount+' section'+(secCount!==1?'s':'')+'</div>';
      html += '</div>';
    });
  }
  html += '<button class="btn-primary" data-action="new-template">+ New Template</button>';
  return html;
}
function renderOBSection(sec) {
  var soStyle = sec.requiresSignOff ? 'background:rgba(39,174,96,0.12);color:#27ae60' : 'background:var(--brd);color:var(--mut)';
  var faqStyle = sec.isFaq ? 'background:rgba(39,174,96,0.12);color:#27ae60' : 'background:var(--brd);color:var(--mut)';
  var html = '<div class="card" style="margin-bottom:8px">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
  html += '<span style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:var(--mut)">'+escapeOBAttr(sec.title)+'</span>';
  html += '<div style="display:flex;gap:4px;align-items:center">';
  html += '<button class="pill'+(sec.requiresSignOff?' pill-ok':'')+'" data-action="toggle-signoff" data-sec-id="'+sec.id+'" style="cursor:pointer;border:none;font-size:11px;padding:2px 8px;border-radius:8px;'+soStyle+'">SO</button>';
  html += '<button class="pill'+(sec.isFaq?' pill-ok':'')+'" data-action="toggle-faq-mode" data-sec-id="'+sec.id+'" style="cursor:pointer;border:none;font-size:11px;padding:2px 8px;border-radius:8px;'+faqStyle+'">FAQ</button>';
  html += '<span data-action="delete-ob-section" data-sec-id="'+sec.id+'" style="color:#c0392b;cursor:pointer;font-size:14px;margin-left:8px">&#10005;</span>';
  html += '</div>';
  html += '</div>';
  html += '<input type="text" value="'+escapeOBAttr(sec.title)+'" data-action="sec-title-input" data-sec-id="'+sec.id+'" placeholder="Section title" style="width:100%;padding:8px 10px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:13px;color:var(--txt);font-family:inherit;outline:none;margin-bottom:8px">';
  if (sec.isFaq) {
    html += '<div style="font-size:12px;color:var(--mut);padding:8px 0">Q&amp;A items &mdash; managed in Plan 02</div>';
  } else {
    html += '<div style="font-size:12px;color:var(--mut);padding:8px 0">Items &mdash; managed in Plan 02</div>';
  }
  html += '</div>';
  return html;
}
function renderOBEditor() {
  var tpl = obBuilderState.activeTemplate;
  if (!tpl) return '';
  var html = '';
  html += '<span class="back" data-action="back-to-templates" style="display:inline-flex;align-items:center;gap:4px;font-size:14px;font-weight:500;margin-bottom:16px;cursor:pointer">&#8249; Templates</span>';
  html += '<input type="text" value="'+escapeOBAttr(tpl.name)+'" data-action="tpl-name-input" placeholder="Template name" style="width:100%;padding:10px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt);font-family:inherit;outline:none;margin-bottom:8px">';
  html += '<select data-action="tpl-role-select" style="width:100%;padding:10px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt);font-family:inherit;outline:none;margin-bottom:16px">';
  html += '<option value=""'+(tpl.role===null?' selected':'')+'>All roles</option>';
  ['line_cook','cashier','manager','admin'].forEach(function(r) {
    html += '<option value="'+r+'"'+(tpl.role===r?' selected':'')+'>'+r.replace(/_/g,' ')+'</option>';
  });
  html += '</select>';
  tpl.sections.forEach(function(sec) {
    html += renderOBSection(sec);
  });
  html += '<button class="btn-primary" data-action="add-ob-section" style="margin-top:8px">+ Add Section</button>';
  html += '<button style="width:100%;padding:12px;background:transparent;color:#c0392b;border:0.5px solid #c0392b;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:24px" data-action="delete-template">Delete Template</button>';
  return html;
}
function renderMyTrainings() {
  if (obState.view === 'list') renderMyList();
  else renderRunner();
}
function renderMyList() {
  var hire = getMyHire();
  var el = document.getElementById('my-body');
  if (!hire) {
    el.innerHTML = '<div class="empty"><h3>No trainings yet.</h3><p>Your onboarding checklist will appear here once assigned by your manager.</p></div>';
    return;
  }
  var html = '';
  hire.assignedTemplates.forEach(function(tplId, idx) {
    var tpl = MOCK_OB_TEMPLATES.find(t => t.id === tplId);
    if (!tpl) return;
    var prog = getProgress(hire.id, tpl);
    html += '<div class="card" style="cursor:pointer" data-action="open-checklist" data-tpl-idx="'+idx+'">';
    html += '<div style="font-size:14px;font-weight:500;color:var(--txt);margin-bottom:8px">'+tpl.name+'</div>';
    html += '<div style="height:4px;background:var(--brd);border-radius:2px;margin-bottom:6px;overflow:hidden"><div style="height:100%;background:#27ae60;border-radius:2px;width:'+prog.pct+'%"></div></div>';
    html += '<div style="font-size:12px;color:var(--mut)">'+prog.checked+' of '+prog.total+' tasks complete</div>';
    html += '</div>';
  });
  el.innerHTML = html;
}
function renderRunnerContent(hireId, tplIdx, readOnly) {
  var hire = MOCK_HIRES.find(function(h) { return h.id === hireId; });
  if (!hire) return '';
  var tplId = hire.assignedTemplates[tplIdx];
  var tpl = MOCK_OB_TEMPLATES.find(function(t) { return t.id === tplId; });
  if (!tpl) return '';
  var html = '';
  html += '<div style="font-size:14px;font-weight:600;color:var(--txt);margin-bottom:16px">'+tpl.name+'</div>';
  tpl.sections.forEach(function(sec) {
    var state = SECTION_STATES[hire.id] ? SECTION_STATES[hire.id][sec.id] : 'locked';
    var isLocked = state === 'locked';
    var isExpanded = !isLocked && EXPANDED_SECTIONS[sec.id];
    var totalItems = sec.isFaq ? 0 : getSectionItemCount(sec);
    var checkedItems = sec.isFaq ? 0 : getSectionCheckedCount(sec);
    var headerClass = 'sec-header' + (isLocked ? ' locked' : '');
    var stateHtml = '';
    if (isLocked) {
      stateHtml = '<span style="font-size:12px;color:var(--mut)">&#128274; Locked</span>';
    } else if (state === 'pending_signoff') {
      stateHtml = '<span class="pill pill-warn">Pending Sign-Off</span>';
    } else if (state === 'signed_off') {
      stateHtml = '<span style="font-size:12px;color:#27ae60;font-weight:500">&#10003; Signed Off</span>';
    } else if (sec.isFaq) {
      if (FAQ_VIEWED[hire.id]) {
        stateHtml = '<span style="font-size:12px;color:#27ae60;font-weight:500">Viewed &#10003;</span>';
      } else {
        stateHtml = '<span class="pill pill-warn">View Required</span>';
      }
    } else {
      stateHtml = '<span style="font-size:12px;color:var(--mut)">'+checkedItems+'/'+totalItems+'</span>';
    }
    var chevron = isLocked ? '' : '<span style="font-size:12px;color:var(--mut);margin-left:4px">'+(isExpanded ? '&#9650;' : '&#9660;')+'</span>';
    var actionAttr = isLocked ? '' : ' data-action="toggle-section" data-sec-id="'+sec.id+'" data-hire-id="'+hire.id+'" data-tpl-id="'+tplId+'"';
    html += '<div class="'+headerClass+'"'+actionAttr+'>';
    html += '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px">'+sec.title+'</span>'+chevron+'</div>';
    html += stateHtml;
    html += '</div>';
    if (isExpanded) {
      if (sec.isFaq) {
        html += '<div class="sec-items">';
        sec.items.forEach(function(faqItem) {
          var isOpen = EXPANDED_FAQS[faqItem.id];
          html += '<div class="faq-q" data-action="toggle-faq" data-faq-id="'+faqItem.id+'" data-hire-id="'+hire.id+'" data-tpl-id="'+tplId+'">'+faqItem.question+'<span>'+(isOpen ? '&#9650;' : '&#9660;')+'</span></div>';
          if (isOpen) {
            html += '<div class="faq-a">'+faqItem.answer+'</div>';
          }
        });
        html += '</div>';
      } else {
        html += '<div class="sec-items">';
        sec.items.forEach(function(item) {
          if (item.type === 'checkbox') {
            var checked = OB_CHECKS[item.id];
            var checkClass = 'ob-check' + (checked ? ' checked' : '');
            var checkable = (!readOnly && state === 'active') ? ' data-action="toggle-item" data-item-id="'+item.id+'" data-hire-id="'+hire.id+'" data-tpl-id="'+tplId+'"' : '';
            var checkStyle = readOnly ? ' style="cursor:default"' : '';
            html += '<div class="item-row">';
            html += '<div class="'+checkClass+'"'+checkable+checkStyle+'>'+(checked ? '&#10003;' : '')+'</div>';
            html += '<div style="flex:1"><div style="font-size:14px;font-weight:500">'+item.label+'</div>';
            if (checked) {
              html += '<div class="attribution">Checked by '+CURRENT_USER.name+'</div>';
            }
            html += '</div></div>';
          } else if (item.type === 'video_series') {
            html += '<div class="item-row" style="flex-direction:column;gap:4px;padding-bottom:4px">';
            html += '<div style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:var(--mut);padding-bottom:4px">'+item.label+'</div>';
            html += '</div>';
            item.parts.forEach(function(part) {
              var partChecked = OB_CHECKS[part.id];
              var partCheckClass = 'ob-check' + (partChecked ? ' checked' : '');
              var partCheckable = (!readOnly && state === 'active') ? ' data-action="toggle-video-part" data-item-id="'+part.id+'" data-hire-id="'+hire.id+'" data-tpl-id="'+tplId+'"' : '';
              var partCheckStyle = readOnly ? ' style="cursor:default"' : '';
              html += '<div class="item-row">';
              html += '<div class="'+partCheckClass+'"'+partCheckable+partCheckStyle+'>'+(partChecked ? '&#10003;' : '')+'</div>';
              html += '<div style="flex:1">';
              html += '<div style="font-size:14px;font-weight:500">'+part.title+'</div>';
              html += '<div style="font-size:12px;color:var(--mut);margin-top:2px">'+part.desc+'</div>';
              if (partChecked) {
                html += '<div class="attribution">Checked by '+CURRENT_USER.name+'</div>';
              }
              html += '</div>';
              html += '<a class="video-link" data-action="watch-video" data-url="'+part.url+'" href="#">Watch Video</a>';
              html += '</div>';
            });
          }
        });
        html += '</div>';
        if (!readOnly && sec.requiresSignOff && state === 'active') {
          var allChecked = isSectionComplete(hire.id, sec);
          if (allChecked) {
            html += '<div class="sec-actions"><button class="btn-primary" data-action="request-signoff" data-sec-id="'+sec.id+'" data-hire-id="'+hire.id+'" data-tpl-id="'+tplId+'">Request Sign-Off</button></div>';
          }
        }
        if (readOnly && state === 'pending_signoff') {
          html += '<div class="sec-actions">';
          html += '<button class="btn-approve" data-action="approve-signoff" data-hire-id="'+hire.id+'" data-section-id="'+sec.id+'" data-tpl-id="'+tplId+'">Approve Section</button>';
          html += '<button class="btn-danger" data-action="send-back" data-hire-id="'+hire.id+'" data-section-id="'+sec.id+'" data-tpl-id="'+tplId+'">Send Back</button>';
          html += '</div>';
        }
      }
    }
  });
  return html;
}
function renderRunner() {
  var hire = MOCK_HIRES.find(function(h) { return h.id === obState.activeHireId; });
  if (!hire) { renderMyList(); return; }
  var content = renderRunnerContent(obState.activeHireId, obState.activeTemplateIdx, false);
  if (!content) { renderMyList(); return; }
  var html = '';
  html += '<span class="back" data-action="back-to-list" style="display:inline-flex;align-items:center;gap:4px;color:var(--info-tx);font-size:14px;font-weight:500;margin-bottom:16px;cursor:pointer">&#8249; My Trainings</span>';
  html += content;
  document.getElementById('my-body').innerHTML = html;
}
function renderManager() {
  if (mgrState.view === 'list') {
    var subTabsHtml = '<div class="sub-tabs">';
    subTabsHtml += '<button class="'+(mgrState.subView==='active'?'on':'')+'" data-action="switch-sub" data-sub="active">Active</button>';
    subTabsHtml += '<button class="'+(mgrState.subView==='completed'?'on':'')+'" data-action="switch-sub" data-sub="completed">Completed</button>';
    subTabsHtml += '</div>';
    document.getElementById('mgr-body').innerHTML = subTabsHtml + renderMgrList();
  } else {
    renderMgrRunner();
  }
}
function isHireComplete(hire) {
  var allTemplatesComplete = hire.assignedTemplates.every(function(tplId) {
    var tpl = MOCK_OB_TEMPLATES.find(function(t) { return t.id === tplId; });
    if (!tpl) return true;
    return tpl.sections.every(function(sec) {
      var state = SECTION_STATES[hire.id] ? SECTION_STATES[hire.id][sec.id] : 'locked';
      if (sec.isFaq) return FAQ_VIEWED[hire.id] === true;
      if (sec.requiresSignOff) return state === 'signed_off';
      return isSectionComplete(hire.id, sec);
    });
  });
  return allTemplatesComplete;
}
function renderMgrList() {
  var html = '';
  var filteredHires = MOCK_HIRES.filter(function(h) {
    var complete = isHireComplete(h);
    return mgrState.subView === 'active' ? !complete : complete;
  });
  if (filteredHires.length === 0) {
    if (mgrState.subView === 'active') {
      html += '<div class="empty"><h3>No active onboarding.</h3><p>New hires will appear here when added to the system.</p></div>';
    } else {
      html += '<div class="empty"><h3>No completed onboardings yet.</h3><p>Finished onboardings will show here after all sections are signed off.</p></div>';
    }
    return html;
  }
  filteredHires.forEach(function(hire) {
    var roleLabel = hire.role ? hire.role.replace(/_/g, ' ') : 'crew';
    var startDate = new Date(hire.startDate);
    var startFmt = startDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    html += '<div class="card" style="cursor:pointer" data-action="open-hire" data-hire-id="'+hire.id+'" data-tpl-idx="0">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">';
    html += '<span style="font-size:14px;font-weight:500">'+hire.name+'</span>';
    html += '<span class="pill" style="background:var(--info-bg);color:var(--info-tx)">'+roleLabel+'</span>';
    html += '</div>';
    html += '<div style="font-size:12px;color:var(--mut);margin-bottom:8px">Started '+startFmt+'</div>';
    hire.assignedTemplates.forEach(function(tplId) {
      var tpl = MOCK_OB_TEMPLATES.find(function(t) { return t.id === tplId; });
      if (!tpl) return;
      var prog = getProgress(hire.id, tpl);
      html += '<div style="font-size:12px;color:var(--mut);margin-bottom:4px">'+tpl.name+'</div>';
      html += '<div style="height:4px;background:var(--brd);border-radius:2px;margin-bottom:4px;overflow:hidden"><div style="height:100%;background:#27ae60;border-radius:2px;width:'+prog.pct+'%"></div></div>';
      html += '<div style="font-size:12px;color:var(--mut);margin-bottom:8px">'+prog.pct+'% &mdash; '+prog.checked+'/'+prog.total+' tasks</div>';
    });
    html += '</div>';
    if (mgrState.subView === 'active') {
      var pickerOpen = assignPickerOpen === hire.id;
      html += '<div style="text-align:center;margin-bottom:8px">';
      html += '<span style="font-size:14px;font-weight:500;color:var(--info-tx);cursor:pointer" data-action="show-assign" data-hire-id="'+hire.id+'">+ Assign Training</span>';
      html += '</div>';
      if (pickerOpen) {
        var unassigned = MOCK_OB_TEMPLATES.filter(function(tpl) {
          return !hire.assignedTemplates.includes(tpl.id);
        });
        html += '<div class="assign-picker">';
        if (unassigned.length === 0) {
          html += '<div style="font-size:14px;color:var(--mut);padding:8px 12px">No additional trainings available.</div>';
        } else {
          unassigned.forEach(function(tpl) {
            html += '<div class="assign-row" data-action="assign-training" data-hire-id="'+hire.id+'" data-tpl-id="'+tpl.id+'">'+tpl.name+'</div>';
          });
        }
        html += '</div>';
      }
    }
  });
  return html;
}
function renderMgrRunner() {
  var hire = MOCK_HIRES.find(function(h) { return h.id === mgrState.activeHireId; });
  if (!hire) { mgrState.view = 'list'; renderManager(); return; }
  var content = renderRunnerContent(mgrState.activeHireId, mgrState.activeTemplateIdx, true);
  if (!content) { mgrState.view = 'list'; renderManager(); return; }
  var html = '';
  html += '<span class="back" data-action="back-to-hires" style="display:inline-flex;align-items:center;gap:4px;color:var(--info-tx);font-size:14px;font-weight:500;margin-bottom:16px;cursor:pointer">&#8249; All Hires</span>';
  html += content;
  document.getElementById('mgr-body').innerHTML = html;
}
document.getElementById('my-body').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var action = btn.dataset.action;
  if (action === 'open-checklist') {
    var hire = getMyHire();
    if (!hire) return;
    obState = { view: 'runner', activeHireId: hire.id, activeTemplateIdx: +(btn.dataset.tplIdx || 0) };
    initSectionStates(hire);
    renderMyTrainings();
  } else if (action === 'back-to-list') {
    obState = { view: 'list', activeHireId: null, activeTemplateIdx: 0 };
    renderMyTrainings();
  } else if (action === 'toggle-section') {
    var secId = btn.dataset.secId;
    var hireId = btn.dataset.hireId;
    var tplId = btn.dataset.tplId;
    var tpl = MOCK_OB_TEMPLATES.find(t => t.id === tplId);
    var sec = tpl ? tpl.sections.find(s => s.id === secId) : null;
    if (EXPANDED_SECTIONS[secId]) {
      delete EXPANDED_SECTIONS[secId];
    } else {
      EXPANDED_SECTIONS[secId] = true;
      if (sec && sec.isFaq) {
        FAQ_VIEWED[hireId] = true;
        tryAdvanceSections(hireId, tplId);
      }
    }
    renderMyTrainings();
  } else if (action === 'toggle-item') {
    var itemId = btn.dataset.itemId;
    var hireId = btn.dataset.hireId;
    var tplId = btn.dataset.tplId;
    if (OB_CHECKS[itemId]) {
      delete OB_CHECKS[itemId];
    } else {
      OB_CHECKS[itemId] = { checked: true, checkedBy: CURRENT_USER.name, checkedAt: new Date() };
    }
    tryAdvanceSections(hireId, tplId);
    renderMyTrainings();
  } else if (action === 'toggle-video-part') {
    var itemId = btn.dataset.itemId;
    var hireId = btn.dataset.hireId;
    var tplId = btn.dataset.tplId;
    if (OB_CHECKS[itemId]) {
      delete OB_CHECKS[itemId];
    } else {
      OB_CHECKS[itemId] = { checked: true, checkedBy: CURRENT_USER.name, checkedAt: new Date() };
    }
    tryAdvanceSections(hireId, tplId);
    renderMyTrainings();
  } else if (action === 'watch-video') {
    e.preventDefault();
    window.open(btn.dataset.url, '_blank');
  } else if (action === 'request-signoff') {
    var secId = btn.dataset.secId;
    var hireId = btn.dataset.hireId;
    var tplId = btn.dataset.tplId;
    if (SECTION_STATES[hireId]) {
      SECTION_STATES[hireId][secId] = 'pending_signoff';
    }
    tryAdvanceSections(hireId, tplId);
    renderMyTrainings();
  } else if (action === 'toggle-faq') {
    var faqId = btn.dataset.faqId;
    if (EXPANDED_FAQS[faqId]) {
      delete EXPANDED_FAQS[faqId];
    } else {
      EXPANDED_FAQS[faqId] = true;
    }
    renderMyTrainings();
  }
});
document.getElementById('mgr-body').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var action = btn.dataset.action;
  if (action === 'switch-sub') {
    mgrState.subView = btn.dataset.sub;
    assignPickerOpen = null;
    renderManager();
  } else if (action === 'open-hire') {
    mgrState = { view: 'runner', subView: mgrState.subView, activeHireId: btn.dataset.hireId, activeTemplateIdx: +(btn.dataset.tplIdx || 0) };
    renderManager();
  } else if (action === 'back-to-hires') {
    mgrState = { view: 'list', subView: mgrState.subView, activeHireId: null, activeTemplateIdx: 0 };
    assignPickerOpen = null;
    renderManager();
  } else if (action === 'approve-signoff') {
    var hireId = btn.dataset.hireId;
    var secId = btn.dataset.sectionId;
    var tplId = btn.dataset.tplId;
    if (SECTION_STATES[hireId]) SECTION_STATES[hireId][secId] = 'signed_off';
    tryAdvanceSections(hireId, tplId);
    renderManager();
  } else if (action === 'send-back') {
    var hireId = btn.dataset.hireId;
    var secId = btn.dataset.sectionId;
    if (SECTION_STATES[hireId]) SECTION_STATES[hireId][secId] = 'active';
    renderManager();
  } else if (action === 'show-assign') {
    var hireId = btn.dataset.hireId;
    assignPickerOpen = assignPickerOpen === hireId ? null : hireId;
    renderManager();
  } else if (action === 'assign-training') {
    var hireId = btn.dataset.hireId;
    var tplId = btn.dataset.tplId;
    var hire = MOCK_HIRES.find(function(h) { return h.id === hireId; });
    if (hire && !hire.assignedTemplates.includes(tplId)) {
      hire.assignedTemplates.push(tplId);
      var newTpl = MOCK_OB_TEMPLATES.find(function(t) { return t.id === tplId; });
      if (newTpl && SECTION_STATES[hire.id]) {
        newTpl.sections.forEach(function(sec, idx) {
          if (!SECTION_STATES[hire.id][sec.id]) {
            SECTION_STATES[hire.id][sec.id] = idx === 0 ? 'active' : 'locked';
          }
        });
      } else {
        initSectionStates(hire);
      }
    }
    assignPickerOpen = null;
    renderManager();
  } else if (action === 'toggle-section') {
    var secId = btn.dataset.secId;
    var hireId = btn.dataset.hireId;
    var tplId = btn.dataset.tplId;
    var tpl = MOCK_OB_TEMPLATES.find(function(t) { return t.id === tplId; });
    var sec = tpl ? tpl.sections.find(function(s) { return s.id === secId; }) : null;
    if (EXPANDED_SECTIONS[secId]) {
      delete EXPANDED_SECTIONS[secId];
    } else {
      EXPANDED_SECTIONS[secId] = true;
      if (sec && sec.isFaq) {
        FAQ_VIEWED[hireId] = true;
        tryAdvanceSections(hireId, tplId);
      }
    }
    renderManager();
  } else if (action === 'toggle-faq') {
    var faqId = btn.dataset.faqId;
    if (EXPANDED_FAQS[faqId]) {
      delete EXPANDED_FAQS[faqId];
    } else {
      EXPANDED_FAQS[faqId] = true;
    }
    renderManager();
  } else if (action === 'watch-video') {
    e.preventDefault();
    window.open(btn.dataset.url, '_blank');
  }
});
document.getElementById('builder-body').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var action = btn.dataset.action;
  if (action === 'new-template') {
    var name = prompt('Template name:');
    if (name && name.trim()) {
      var tpl = createNewOBTemplate(name.trim(), null);
      MOCK_OB_TEMPLATES.push(tpl);
      obBuilderState = { view: 'editor', activeTemplate: tpl };
      renderOBBuilder();
    }
  } else if (action === 'open-template') {
    var tpl = MOCK_OB_TEMPLATES.find(function(t) { return t.id === btn.dataset.tplId; });
    if (tpl) {
      obBuilderState = { view: 'editor', activeTemplate: tpl };
      renderOBBuilder();
    }
  } else if (action === 'back-to-templates') {
    obBuilderState = { view: 'list', activeTemplate: null };
    renderOBBuilder();
  } else if (action === 'delete-template') {
    if (confirm('Delete this template? This cannot be undone.')) {
      var idx = MOCK_OB_TEMPLATES.findIndex(function(t) { return t.id === obBuilderState.activeTemplate.id; });
      if (idx !== -1) MOCK_OB_TEMPLATES.splice(idx, 1);
      obBuilderState = { view: 'list', activeTemplate: null };
      renderOBBuilder();
    }
  } else if (action === 'add-ob-section') {
    var title = prompt('Section name:');
    if (title && title.trim()) {
      obBuilderState.activeTemplate.sections.push(createNewOBSection(title.trim()));
      renderOBBuilder();
    }
  } else if (action === 'delete-ob-section') {
    obBuilderState.activeTemplate.sections = obBuilderState.activeTemplate.sections.filter(function(s) { return s.id !== btn.dataset.secId; });
    renderOBBuilder();
  } else if (action === 'toggle-signoff') {
    var sec = obBuilderState.activeTemplate.sections.find(function(s) { return s.id === btn.dataset.secId; });
    if (sec) { sec.requiresSignOff = !sec.requiresSignOff; renderOBBuilder(); }
  } else if (action === 'toggle-faq-mode') {
    var sec = obBuilderState.activeTemplate.sections.find(function(s) { return s.id === btn.dataset.secId; });
    if (sec) { sec.isFaq = !sec.isFaq; renderOBBuilder(); }
  }
});
document.getElementById('builder-body').addEventListener('input', function(e) {
  if (e.target.dataset.action === 'tpl-name-input') {
    obBuilderState.activeTemplate.name = e.target.value;
  } else if (e.target.dataset.action === 'sec-title-input') {
    var sec = obBuilderState.activeTemplate.sections.find(function(s) { return s.id === e.target.dataset.secId; });
    if (sec) sec.title = e.target.value;
  }
});
document.getElementById('builder-body').addEventListener('change', function(e) {
  if (e.target.dataset.action === 'tpl-role-select') {
    obBuilderState.activeTemplate.role = e.target.value || null;
    renderOBBuilder();
  }
});
if (!isManager()) {
  document.getElementById('t2').style.display = 'none';
  document.getElementById('t3').style.display = 'none';
}
var myHire = getMyHire();
if (myHire) initSectionStates(myHire);
MOCK_HIRES.forEach(function(h) { initSectionStates(h); });
renderMyTrainings();
renderManager();
renderOBBuilder();
document.addEventListener('dblclick', function(e) { e.preventDefault(); });
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
