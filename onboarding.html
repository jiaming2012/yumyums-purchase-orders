<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c447c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<title>Onboarding - Yumyums HQ</title>
<style>
:root{--bg:#f5f5f3;--card:#fff;--txt:#1a1a1a;--mut:#6b6b6b;--brd:rgba(0,0,0,0.08);--info-bg:#e6f1fb;--info-tx:#0c447c;--warn-bg:#faeeda;--warn-tx:#854f0b}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--card:#262626;--txt:#f0f0f0;--mut:#999;--brd:rgba(255,255,255,0.1);--info-bg:#0c447c;--info-tx:#b5d4f4;--warn-bg:#633806;--warn-tx:#fac775}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{margin:0;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}
.app{max-width:480px;margin:0 auto;padding-top:20px}
.back{display:inline-flex;align-items:center;gap:4px;color:var(--info-tx);text-decoration:none;font-size:14px;font-weight:500;margin-bottom:16px;cursor:pointer}
.tabs{display:flex;gap:0;background:var(--card);border-radius:10px;padding:3px;border:0.5px solid var(--brd);margin-bottom:16px}
.tabs button{flex:1;border:none;background:transparent;padding:12px 0;font-size:14px;font-weight:500;color:var(--mut);border-radius:8px;cursor:pointer}
.tabs button.on{background:var(--info-bg);color:var(--info-tx)}
.card{background:var(--card);border:0.5px solid var(--brd);border-radius:12px;padding:16px;margin-bottom:8px}
.cat{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:var(--mut);padding:16px 0 8px}
.sec-header{display:flex;align-items:center;justify-content:space-between;min-height:44px;padding:12px 16px;cursor:pointer;background:var(--card);border-radius:10px;margin-bottom:4px;border:0.5px solid var(--brd)}
.sec-header.locked{cursor:default;opacity:0.5}
.pill{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:8px}
.pill-warn{background:var(--warn-bg);color:var(--warn-tx)}
.pill-ok{background:rgba(39,174,96,0.12);color:#27ae60}
.item-row{display:flex;align-items:flex-start;gap:8px;padding:12px 16px;border-bottom:0.5px solid var(--brd);min-height:44px}
.ob-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--brd);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:2px}
.ob-check.checked{background:rgba(39,174,96,0.12);border-color:#27ae60;color:#27ae60}
.btn-primary{width:100%;padding:12px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:12px}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-secondary{width:100%;padding:12px;background:transparent;color:var(--mut);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px}
.btn-danger{width:100%;padding:12px;background:transparent;color:#c0392b;border:0.5px solid #c0392b;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px}
.btn-approve{width:100%;padding:12px;background:rgba(39,174,96,0.12);color:#27ae60;border:0.5px solid #27ae60;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:12px}
.empty{text-align:center;padding:40px 20px;color:var(--mut)}
.empty h3{font-size:14px;font-weight:500;color:var(--txt);margin:0 0 8px}
.empty p{font-size:12px;margin:0}
.video-link{color:var(--info-tx);font-size:14px;font-weight:500;text-decoration:none;white-space:nowrap}
.faq-q{font-size:14px;font-weight:500;padding:12px 16px;cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--brd)}
.faq-a{font-size:13px;color:var(--mut);padding:8px 16px 16px;line-height:1.5}
.attribution{font-size:11px;color:var(--mut);margin-top:2px}
.sec-items{background:var(--card);border:0.5px solid var(--brd);border-radius:10px;margin-bottom:4px;overflow:hidden}
.sec-items .item-row:last-child{border-bottom:none}
.sec-actions{padding:12px 16px}
.sub-tabs{display:flex;gap:0;margin-bottom:12px}
.sub-tabs button{flex:1;border:none;background:transparent;padding:8px 0;font-size:12px;font-weight:500;color:var(--mut);border-bottom:2px solid transparent;cursor:pointer}
.sub-tabs button.on{color:var(--info-tx);border-bottom-color:var(--info-tx)}
.hire-role{font-size:12px;color:var(--mut);text-transform:capitalize}
.assign-picker{background:var(--card);border:0.5px solid var(--brd);border-radius:12px;padding:8px;margin-top:8px}
.assign-row{padding:10px 12px;cursor:pointer;border-radius:8px;font-size:14px;min-height:44px;display:flex;align-items:center}
.assign-row:active{background:var(--brd)}
.drag-handle{cursor:grab;padding:0 4px;color:var(--mut);font-size:16px;flex-shrink:0;user-select:none}
.ob-item-card{background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.ob-item-header{display:flex;align-items:center;gap:6px;min-height:36px}
.ob-item-body{padding:8px 0 0 28px}
.ob-part-row{display:flex;align-items:flex-start;gap:6px;padding:6px 0;border-bottom:0.5px solid var(--brd)}
.ob-part-row:last-child{border-bottom:none}
.ob-qna-row{padding:8px 0;border-bottom:0.5px solid var(--brd)}
.ob-qna-row:last-child{border-bottom:none}
.ob-field-list{min-height:20px}
.ob-section-list{min-height:20px}
.skeleton-row{background:var(--brd);border-radius:8px;margin-bottom:8px;overflow:hidden;position:relative}
.skeleton-row::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.3) 50%,transparent 100%);animation:skeleton-pulse 1.4s ease-in-out infinite}
@media(prefers-color-scheme:dark){.skeleton-row::after{background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.08) 50%,transparent 100%)}}
@keyframes skeleton-pulse{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.field-err{font-size:12px;color:#c0392b;margin-top:4px;display:block}
.signoff-form{background:var(--card);border:0.5px solid var(--brd);border-radius:10px;padding:16px;margin-bottom:4px}
.signoff-form .field{margin-bottom:12px}
.signoff-form .field label{display:block;font-size:12px;font-weight:600;color:var(--mut);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px}
.signoff-form textarea{width:100%;padding:10px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt);font-family:inherit;outline:none;resize:vertical}
.signoff-form textarea:focus{border-color:var(--info-tx)}
.rating-group{display:flex;gap:6px}
.rating-btn{flex:1;padding:8px 4px;background:transparent;border:0.5px solid var(--brd);border-radius:8px;font-size:12px;font-weight:500;color:var(--mut);cursor:pointer;text-align:center}
.rating-btn.on{background:var(--info-bg);color:var(--info-tx);border-color:var(--info-tx)}
.role-chips{display:flex;gap:4px;flex-wrap:wrap}
.role-chip{display:inline-flex;align-items:center;justify-content:center;min-width:36px;min-height:36px;padding:0 12px;border-radius:18px;border:0.5px solid var(--brd);background:transparent;color:var(--txt);font-size:12px;font-weight:500;cursor:pointer}
.role-chip.on{background:var(--info-bg);color:var(--info-tx);border-color:var(--info-tx)}
</style>
</head>
<body>
<div class="app">
  <a class="back" href="index.html" id="hq-back">&#8249; HQ &nbsp;&#183;&nbsp; Onboarding</a>
  <div class="tabs">
    <button id="t1" class="on" onclick="show(1)">My Trainings</button>
    <button id="t2" onclick="show(2)">Manager</button>
    <button id="t3" onclick="show(3)">Builder</button>
  </div>
  <div id="s1"><div id="my-body"></div></div>
  <div id="s2" style="display:none"><div id="mgr-body"></div></div>
  <div id="s3" style="display:none"><div id="builder-body"></div></div>
</div>
<script>
// === State ===
let CURRENT_USER = null;
let MY_TRAININGS = [];
let CURRENT_TRAINING = null;
let MANAGER_HIRES = [];
let TEMPLATES = [];
let EXPANDED_SECTIONS = {};
let EXPANDED_FAQS = {};
let obState = { view: 'list', activeTrainingId: null, activeTemplateId: null };
let mgrState = { view: 'list', subView: 'active', activeHireId: null, activeHireName: null, activeTemplateId: null };
let obBuilderState = { view: 'list', activeTemplate: null, localCopy: null };
let assignPickerOpen = null;
function obBuilderHasUnsavedChanges() {
  if (!obBuilderState.localCopy) return false;
  if (!obBuilderState.activeTemplate) return true; // new unsaved template
  return JSON.stringify(obBuilderState.localCopy) !== JSON.stringify(obBuilderState.activeTemplate);
}
// Track save-retry counts per item
let SAVE_RETRY = {};
// Track pending sign-off form state per section
let SIGNOFF_FORM = {};

// === API wrapper ===
async function api(method, path, body) {
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(path, opts);
  if (res.status === 401) { window.location.href = '/login.html'; throw new Error('unauthorized'); }
  if (res.status === 204) return null;
  var data = await res.json();
  if (!res.ok) throw data;
  return data;
}

// === Helpers ===
function escapeOBAttr(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function renderSkeletons(containerId, count) {
  var el = document.getElementById(containerId);
  if (!el) return;
  var html = '';
  for (var i = 0; i < count; i++) {
    html += '<div class="skeleton-row" style="height:70px;margin-bottom:8px"></div>';
  }
  el.innerHTML = html;
}
function generateOBId(prefix) {
  return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
}
function createNewOBTemplate(name, roles) {
  return { id: null, name: name, roles: roles||[], sections: [] };
}
function createNewOBSection(title) {
  return { id: generateOBId('sec'), title: title, requires_sign_off: false, sign_off_roles: [], is_faq: false, items: [] };
}
function createNewOBCheckbox(label) {
  return { id: generateOBId('itm'), type: 'checkbox', label: label || '', sub_items: [] };
}
function createNewOBVideoSeries(label) {
  return { id: generateOBId('vs'), type: 'video_series', label: label || '', parts: [] };
}
function createNewOBVideoPart() {
  return { id: generateOBId('vp'), title: '', desc: '', url: '' };
}
function createNewOBFaqItem() {
  return { id: generateOBId('faq'), question: '', answer: '' };
}
function formatDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function formatDateTime(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var h = d.getHours(), m = d.getMinutes(), ap = h >= 12 ? 'p' : 'a';
  h = h % 12 || 12;
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + h + ':' + (m < 10 ? '0' : '') + m + ap;
}

// === Tab switching ===
var _activeTab = 1;
function show(n) {
  if (obBuilderHasUnsavedChanges() && !confirm('You have unsaved changes. Leave without saving?')) return;
  _activeTab = n;
  // Reset state for the target tab
  if (n === 1) { obState = { view: 'list', activeTrainingId: null, activeTemplateId: null }; }
  if (n === 2) { mgrState = { view: 'list', subView: 'active', activeHireId: null, activeHireName: null, activeTemplateId: null }; }
  if (n === 3) { obBuilderState = { view: 'list', activeTemplate: null, localCopy: null }; }
  // Switch tabs — content stays as-is (no flash)
  [1,2,3].forEach(function(i) {
    document.getElementById('s'+i).style.display = i===n ? '' : 'none';
    document.getElementById('t'+i).classList.toggle('on', i===n);
  });
  // Background refresh from API (renders when data arrives)
  if (n === 1) loadMyTrainings();
  if (n === 2) loadManagerHires();
  if (n === 3) loadTemplates();
}

// ==============================
// TAB 1 — My Trainings
// ==============================
async function loadMyTrainings() {
  if (MY_TRAININGS.length > 0) { renderMyList(); }
  else { renderSkeletons('my-body', 3); }
  try {
    MY_TRAININGS = await api('GET', '/api/v1/onboarding/myTrainings');
    renderMyList();
  } catch(e) {
    if (MY_TRAININGS.length === 0) document.getElementById('my-body').innerHTML = '<div class="empty"><h3>Something went wrong.</h3><p>Check your connection and try again.</p></div>';
  }
}

function renderMyList() {
  var el = document.getElementById('my-body');
  if (!MY_TRAININGS || MY_TRAININGS.length === 0) {
    el.innerHTML = '<div class="empty"><h3>No trainings assigned</h3><p>Your manager will assign training when you\'re ready.</p></div>';
    return;
  }
  var html = '';
  MY_TRAININGS.forEach(function(t) {
    var secDone = t.sections_complete || 0;
    var secTotal = t.sections_total || 0;
    var pct = t.progress_percent || (secTotal ? Math.round(secDone / secTotal * 100) : 0);
    html += '<div class="card" style="cursor:pointer" data-action="open-my-training" data-template-id="'+t.template_id+'" data-training-id="'+escapeOBAttr(t.template_id)+'">';
    html += '<div style="font-size:14px;font-weight:500;color:var(--txt);margin-bottom:8px">'+escapeOBAttr(t.template_name)+'</div>';
    html += '<div style="height:4px;background:var(--brd);border-radius:2px;margin-bottom:6px;overflow:hidden"><div style="height:100%;background:#27ae60;border-radius:2px;width:'+pct+'%"></div></div>';
    html += '<div style="font-size:12px;color:var(--mut)">'+secDone+' of '+secTotal+' sections complete</div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

async function openMyTraining(templateId) {
  obState = { view: 'runner', activeTrainingId: CURRENT_USER.id, activeTemplateId: templateId };
  renderSkeletons('my-body', 4);
  try {
    CURRENT_TRAINING = await api('GET', '/api/v1/onboarding/hireTraining/'+CURRENT_USER.id+'?templateId='+templateId);
    renderMyRunner();
  } catch(e) {
    document.getElementById('my-body').innerHTML = '<div class="empty"><h3>Something went wrong.</h3><p>Check your connection and try again.</p></div>';
  }
}

function renderMyRunner() {
  if (!CURRENT_TRAINING) { loadMyTrainings(); return; }
  var html = '';
  html += '<span class="back" data-action="back-to-my-list" style="display:inline-flex;align-items:center;gap:4px;color:var(--info-tx);font-size:14px;font-weight:500;margin-bottom:16px;cursor:pointer">&#8249; My Trainings</span>';
  html += '<div style="font-size:14px;font-weight:600;color:var(--txt);margin-bottom:16px">'+escapeOBAttr(CURRENT_TRAINING.template.name)+'</div>';
  html += renderSections(CURRENT_TRAINING.sections, CURRENT_USER.id, false);
  document.getElementById('my-body').innerHTML = html;
}

function renderSections(sections, hireId, readOnly) {
  var html = '';
  sections.forEach(function(sec) {
    var state = sec.state || 'locked';
    var isLocked = state === 'locked';
    var isExpanded = !isLocked && EXPANDED_SECTIONS[sec.id];
    var headerClass = 'sec-header' + (isLocked ? ' locked' : '');
    var stateHtml = '';
    if (isLocked) {
      stateHtml = '<span style="font-size:12px;color:var(--mut)">&#128274; Locked</span>';
    } else if (state === 'signed_off') {
      var attr = sec.sign_off ? 'By '+escapeOBAttr(sec.sign_off.manager_name)+' @ '+formatDateTime(sec.sign_off.signed_off_at) : '';
      stateHtml = '<div style="text-align:right"><span style="font-size:12px;color:#27ae60;font-weight:500">&#10003; Signed Off</span><div class="attribution">'+attr+'</div></div>';
    } else if (state === 'complete') {
      if (sec.requires_sign_off) {
        stateHtml = '<span class="pill pill-warn">Waiting for Sign-Off</span>';
      } else {
        var completedAt = sec.completed_at ? formatDateTime(sec.completed_at) : formatDateTime(new Date().toISOString());
        stateHtml = '<div style="text-align:right"><span style="font-size:12px;color:#27ae60;font-weight:500">&#10003; Complete</span><div class="attribution">'+completedAt+'</div></div>';
      }
    } else {
      // active
      var totalItems = countSectionItems(sec);
      var checkedItems = countCheckedItems(sec);
      if (sec.is_faq) {
        var faqTotal = (sec.items || []).length;
        var faqViewed = (sec.items || []).filter(function(f) { return f.viewed; }).length;
        if (faqViewed >= faqTotal && faqTotal > 0) {
          stateHtml = '<span style="font-size:12px;color:#27ae60;font-weight:500">&#10003; Complete</span>';
        } else {
          stateHtml = '<span style="font-size:12px;color:var(--mut)">'+faqViewed+'/'+faqTotal+'</span>';
        }
      } else {
        stateHtml = '<span style="font-size:12px;color:var(--mut)">'+checkedItems+'/'+totalItems+'</span>';
      }
    }
    var chevron = isLocked ? '' : '<span style="font-size:12px;color:var(--mut);margin-left:4px">'+(isExpanded ? '&#9650;' : '&#9660;')+'</span>';
    var actionAttr = isLocked ? '' : ' data-action="toggle-section" data-sec-id="'+sec.id+'" data-hire-id="'+hireId+'" data-read-only="'+(readOnly?'1':'0')+'"';
    html += '<div class="'+headerClass+'"'+actionAttr+'>';
    html += '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px">'+escapeOBAttr(sec.title)+'</span>'+chevron+'</div>';
    html += stateHtml;
    html += '</div>';
    if (isExpanded) {
      if (sec.is_faq) {
        html += '<div class="sec-items">';
        (sec.items || []).forEach(function(faqItem) {
          var isOpen = EXPANDED_FAQS[faqItem.id];
          html += '<div class="faq-q" data-action="toggle-faq" data-faq-id="'+faqItem.id+'">'+escapeOBAttr(faqItem.question)+'<span>'+(isOpen?'&#9650;':'&#9660;')+'</span></div>';
          if (isOpen) html += '<div class="faq-a">'+escapeOBAttr(faqItem.answer)+'</div>';
        });
        html += '</div>';
      } else {
        html += '<div class="sec-items">';
        (sec.items || []).forEach(function(item) {
          if (item.type === 'checkbox') {
            var checked = item.checked === true;
            var checkClass = 'ob-check' + (checked ? ' checked' : '');
            var canInteract = !readOnly && state === 'active';
            var checkable = canInteract ? ' data-action="toggle-item" data-item-id="'+item.id+'" data-sec-id="'+sec.id+'" data-hire-id="'+hireId+'"' : '';
            html += '<div class="item-row">';
            html += '<div class="'+checkClass+'"'+checkable+(readOnly?' style="cursor:default"':'')+'>'+(checked?'&#10003;':'')+'</div>';
            html += '<div style="flex:1"><div style="font-size:14px;font-weight:500">'+escapeOBAttr(item.label)+'</div>';
            if (checked && item.checked_by) html += '<div class="attribution">Checked by '+escapeOBAttr(item.checked_by)+'</div>';
            if (item._saveErr) html += '<span class="field-err">'+escapeOBAttr(item._saveErr)+' <span data-action="retry-item" data-item-id="'+item.id+'" data-sec-id="'+sec.id+'" data-hire-id="'+hireId+'" style="cursor:pointer;text-decoration:underline">Tap to retry.</span></span>';
            html += '</div></div>';
          } else if (item.type === 'video_series') {
            html += '<div class="item-row" style="flex-direction:column;gap:4px;padding-bottom:4px">';
            html += '<div style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:var(--mut);padding-bottom:4px">'+escapeOBAttr(item.label)+'</div>';
            html += '</div>';
            (item.video_parts || []).forEach(function(part) {
              var partChecked = part.checked === true;
              var partCheckClass = 'ob-check' + (partChecked ? ' checked' : '');
              var canInteract = !readOnly && state === 'active';
              var partCheckable = canInteract ? ' data-action="toggle-video-part" data-item-id="'+part.id+'" data-sec-id="'+sec.id+'" data-hire-id="'+hireId+'"' : '';
              html += '<div class="item-row">';
              html += '<div class="'+partCheckClass+'"'+partCheckable+(readOnly?' style="cursor:default"':'')+'>'+(partChecked?'&#10003;':'')+'</div>';
              html += '<div style="flex:1">';
              html += '<div style="font-size:14px;font-weight:500">'+escapeOBAttr(part.title)+'</div>';
              html += '<div style="font-size:12px;color:var(--mut);margin-top:2px">'+escapeOBAttr(part.desc)+'</div>';
              if (partChecked && part.checked_by) html += '<div class="attribution">Checked by '+escapeOBAttr(part.checked_by)+'</div>';
              if (part._saveErr) html += '<span class="field-err">'+escapeOBAttr(part._saveErr)+' <span data-action="retry-part" data-item-id="'+part.id+'" data-sec-id="'+sec.id+'" data-hire-id="'+hireId+'" style="cursor:pointer;text-decoration:underline">Tap to retry.</span></span>';
              html += '</div>';
              html += '<a class="video-link" data-action="watch-video" data-url="'+escapeOBAttr(part.url)+'" href="#">Watch Video</a>';
              html += '</div>';
            });
          }
        });
        html += '</div>';
      }
    }
    // Sign-off actions — OUTSIDE the expandable area so always visible
    if (readOnly && state !== 'signed_off' && sec.requires_sign_off && state === 'complete') {
      var canSignOff = true;
      if (sec.sign_off_roles && sec.sign_off_roles.length > 0) {
        var userRoles = (CURRENT_USER && CURRENT_USER.roles) || [];
        canSignOff = CURRENT_USER.is_superadmin || sec.sign_off_roles.some(function(r) { return userRoles.includes(r); });
      }
      if (canSignOff) {
        var sfKey = hireId + '_' + sec.id;
        if (SIGNOFF_FORM[sfKey]) {
          html += renderSignOffForm(sec, hireId);
        } else {
          html += '<div class="sec-actions"><button class="btn-approve" data-action="show-signoff-form" data-sec-id="'+sec.id+'" data-hire-id="'+hireId+'">Sign Off Section</button></div>';
        }
      }
    }
  });
  return html;
}

function countSectionItems(sec) {
  var total = 0;
  (sec.items || []).forEach(function(item) {
    if (item.type === 'checkbox') total++;
    else if (item.type === 'video_series') total += (item.video_parts || []).length;
  });
  return total;
}

function countCheckedItems(sec) {
  var checked = 0;
  (sec.items || []).forEach(function(item) {
    if (item.type === 'checkbox' && item.checked) checked++;
    else if (item.type === 'video_series') (item.video_parts || []).forEach(function(p) { if (p.checked) checked++; });
  });
  return checked;
}

function findItemInTraining(training, itemId, isSec) {
  if (!training) return null;
  for (var s = 0; s < training.sections.length; s++) {
    var sec = training.sections[s];
    if (isSec && sec.id === itemId) return sec;
    for (var i = 0; i < (sec.items||[]).length; i++) {
      var item = sec.items[i];
      if (!isSec && item.id === itemId) return item;
      if (item.type === 'video_series') {
        for (var p = 0; p < (item.video_parts||[]).length; p++) {
          if (!isSec && item.video_parts[p].id === itemId) return item.video_parts[p];
        }
      }
    }
  }
  return null;
}

async function saveProgress(itemId, progressType, checked, sections, hireId) {
  try {
    await api('POST', '/api/v1/onboarding/saveProgress', { item_id: itemId, progress_type: progressType, checked: checked });
    SAVE_RETRY[itemId] = 0;
    return true;
  } catch(e) {
    SAVE_RETRY[itemId] = (SAVE_RETRY[itemId] || 0) + 1;
    return false;
  }
}

function recomputeSectionState(sec) {
  // Re-check if section complete based on local item states
  if (sec.is_faq) {
    var faqTotal = (sec.items || []).length;
    var faqViewed = (sec.items || []).filter(function(f) { return f.viewed; }).length;
    if (faqTotal > 0 && faqViewed === faqTotal) {
      if (sec.state === 'active') {
        sec.state = 'complete';
        sec.completed_at = new Date().toISOString();
        // Do NOT auto-collapse FAQ — user needs time to read the last answer
        unlockNextSection(sec);
      }
    }
    return;
  }
  var total = countSectionItems(sec);
  var checked = countCheckedItems(sec);
  if (total > 0 && checked === total) {
    if (sec.state === 'active') {
      sec.state = 'complete';
      sec.completed_at = new Date().toISOString();
      // Auto-collapse completed section
      delete EXPANDED_SECTIONS[sec.id];
      // Unlock next section
      unlockNextSection(sec);
    }
  } else {
    if (sec.state === 'complete') sec.state = 'active';
  }
}

function unlockNextSection(completedSec) {
  if (!CURRENT_TRAINING || !CURRENT_TRAINING.sections) return;
  var sections = CURRENT_TRAINING.sections;
  var idx = sections.findIndex(function(s) { return s.id === completedSec.id; });
  if (idx < 0 || idx >= sections.length - 1) return;
  var next = sections[idx + 1];
  if (next.state === 'locked') {
    next.state = 'active';
  }
}

        '<textarea data-action="faq-a-input" data-sec-id="'+sec.id+'" data-faq-idx="'+idx+'" placeholder="Answer" rows="2" style="width:calc(100% - 28px);padding:6px 8px;background:var(--card);border:0.5px solid var(--brd);border-radius:6px;font-size:13px;color:var(--txt);font-family:inherit;outline:none;resize:vertical;margin-left:28px;box-sizing:border-box">'+escapeOBAttr(faqItem.answer)+'</textarea>'+
        '</div>';
    });
    faqHtml += '</div>';
    faqHtml += '<button data-action="add-faq-item" data-sec-id="'+sec.id+'" style="margin-top:6px;padding:6px 12px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer">+ Add Q&amp;A</button>';
    html += faqHtml;
  } else {
    var itemsHtml = '<div class="ob-field-list" data-section-id="'+sec.id+'">';
    (sec.items || []).forEach(function(item, idx) {
      if (item.type === 'checkbox') {
        itemsHtml += renderOBCheckboxItem(item, sec.id, idx);
      } else if (item.type === 'video_series') {
        itemsHtml += renderOBVideoItem(item, sec.id, idx);
      }
    });
    itemsHtml += '</div>';
    itemsHtml += '<div style="display:flex;gap:6px;margin-top:6px">'+
      '<button data-action="add-ob-item" data-sec-id="'+sec.id+'" data-item-type="checkbox" style="padding:6px 12px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer">+ Checkbox</button>'+
      '<button data-action="add-ob-item" data-sec-id="'+sec.id+'" data-item-type="video_series" style="padding:6px 12px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer">+ Video Series</button>'+
      '</div>';
    html += itemsHtml;
  }
  html += '</div>';
  return html;
}

function renderOBEditor() {
  var tpl = obBuilderState.localCopy;
  if (!tpl) return '';
  var html = '';
  html += '<span class="back" data-action="back-to-templates" style="display:inline-flex;align-items:center;gap:4px;font-size:14px;font-weight:500;margin-bottom:16px;cursor:pointer">&#8249; Templates</span>';
  html += '<input type="text" value="'+escapeOBAttr(tpl.name)+'" data-action="tpl-name-input" placeholder="Template name" style="width:100%;padding:10px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt);font-family:inherit;outline:none;margin-bottom:8px">';
  var tplRoles = tpl.roles||[];
  html += '<div style="margin-bottom:16px">';
  html += '<div style="font-size:12px;color:var(--mut);margin-bottom:6px">Target Roles</div>';
  html += '<div class="role-chips">';
  ['team_member','manager','admin'].forEach(function(r) {
    html += '<button type="button" class="role-chip'+(tplRoles.includes(r)?' on':'')+'" data-action="tpl-role-chip" data-role="'+r+'">'+r.replace(/_/g,' ')+'</button>';
  });
  html += '</div></div>';
  html += '<div class="ob-section-list">';
  (tpl.sections||[]).forEach(function(sec) {
    html += renderOBSection(sec);
  });
  html += '</div>';
  html += '<button class="btn-primary" data-action="add-ob-section" style="margin-top:8px">+ Add Section</button>';
  if (tpl.id) {
    html += '<button style="width:100%;padding:12px;background:transparent;color:#c0392b;border:0.5px solid #c0392b;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:24px" data-action="delete-template">Delete Template</button>';
  }
  html += '<div style="display:flex;gap:8px;margin-top:24px">';
  html += '<button data-action="save-template" style="flex:1;padding:12px;background:#27ae60;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Save</button>';
  html += '<button class="btn-secondary" data-action="discard-template" style="flex:1;margin-top:0">Discard</button>';
  html += '</div>';
  return html;
}

var obSortableInstances = [];
function initOBSortable() {
  obSortableInstances.forEach(function(s) { s.destroy(); });
  obSortableInstances = [];
  document.querySelectorAll('.ob-field-list').forEach(function(el) {
    var secId = el.dataset.sectionId;
    obSortableInstances.push(Sortable.create(el, {
      handle: '.drag-handle',
      animation: 150,
      onEnd: function(evt) {
        var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === secId; });
        if (sec) {
          var moved = sec.items.splice(evt.oldIndex, 1)[0];
          sec.items.splice(evt.newIndex, 0, moved);
        }
      }
    }));
  });
  var secList = document.querySelector('.ob-section-list');
  if (secList) {
    obSortableInstances.push(Sortable.create(secList, {
      handle: '.ob-sec-drag',
      animation: 150,
      onEnd: function(evt) {
        var moved = obBuilderState.localCopy.sections.splice(evt.oldIndex, 1)[0];
        obBuilderState.localCopy.sections.splice(evt.newIndex, 0, moved);
      }
    }));
  }
}

document.getElementById('my-body').addEventListener('click', async function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var action = btn.dataset.action;
  if (action === 'open-my-training') {
    var templateId = btn.dataset.templateId;
    await openMyTraining(templateId);
  } else if (action === 'back-to-my-list') {
    obState = { view: 'list', activeTrainingId: null, activeTemplateId: null };
    CURRENT_TRAINING = null;
    await loadMyTrainings();
  } else if (action === 'toggle-section') {
    var secId = btn.dataset.secId;
    if (EXPANDED_SECTIONS[secId]) {
      delete EXPANDED_SECTIONS[secId];
    } else {
      EXPANDED_SECTIONS[secId] = true;
    }
    renderMyRunner();
  } else if (action === 'toggle-faq') {
    var faqId = btn.dataset.faqId;
    if (EXPANDED_FAQS[faqId]) {
      delete EXPANDED_FAQS[faqId];
    } else {
      EXPANDED_FAQS[faqId] = true;
      // Mark FAQ item as viewed and persist
      var faqItem = null;
      if (CURRENT_TRAINING && CURRENT_TRAINING.sections) {
        CURRENT_TRAINING.sections.forEach(function(s) {
          if (s.is_faq) (s.items || []).forEach(function(f) { if (f.id === faqId) faqItem = f; });
        });
      }
      if (faqItem && !faqItem.viewed) {
        faqItem.viewed = true;
        var hireId = obState.activeTrainingId || (CURRENT_USER && CURRENT_USER.id);
        var faqSec = null;
        CURRENT_TRAINING.sections.forEach(function(s) {
          if (s.is_faq && (s.items || []).some(function(f) { return f.id === faqId; })) faqSec = s;
        });
        if (hireId) saveProgress(faqId, 'faq', true, CURRENT_TRAINING.sections, hireId);
        if (faqSec) recomputeSectionState(faqSec);
      }
    }
    renderMyRunner();
  } else if (action === 'toggle-item') {
    var itemId = btn.dataset.itemId;
    var secId = btn.dataset.secId;
    var hireId = btn.dataset.hireId;
    var item = findItemInTraining(CURRENT_TRAINING, itemId, false);
    var sec = findItemInTraining(CURRENT_TRAINING, secId, true);
    if (!item || !sec) return;
    var newChecked = !item.checked;
    // Check if this would complete a sign-off section
    if (newChecked && sec.requires_sign_off) {
      var wouldComplete = (sec.items||[]).every(function(it) {
        if (it.id === itemId) return true;
        if (it.type === 'video_series') return (it.video_parts||[]).every(function(vp) { return vp.checked; });
        return it.checked;
      });
      if (wouldComplete && !confirm('This will submit the section for sign-off. You won\'t be able to make changes after. Continue?')) return;
    }
    item.checked = newChecked;
    recomputeSectionState(sec);
    renderMyRunner();
    var ok = await saveProgress(itemId, 'item', newChecked, CURRENT_TRAINING.sections, hireId);
    if (!ok) {
      var retries = SAVE_RETRY[itemId] || 0;
      if (retries >= 2) {
        // revert
        item.checked = !newChecked;
        recomputeSectionState(sec);
      }
      item._saveErr = "Couldn't save.";
      renderMyRunner();
    } else {
      item._saveErr = null;
      renderMyRunner();
    }
  } else if (action === 'toggle-video-part') {
    var partId = btn.dataset.itemId;
    var secId = btn.dataset.secId;
    var hireId = btn.dataset.hireId;
    var part = findItemInTraining(CURRENT_TRAINING, partId, false);
    var sec = findItemInTraining(CURRENT_TRAINING, secId, true);
    if (!part || !sec) return;
    var newChecked = !part.checked;
    // Check if this would complete a sign-off section
    if (newChecked && sec.requires_sign_off) {
      var allItemsDone = (sec.items||[]).every(function(it) {
        if (it.type === 'video_series') {
          return (it.video_parts||[]).every(function(vp) { return vp.id === partId ? true : vp.checked; });
        }
        return it.checked;
      });
      if (allItemsDone && !confirm('This will submit the section for sign-off. You won\'t be able to make changes after. Continue?')) return;
    }
    part.checked = newChecked;
    recomputeSectionState(sec);
    renderMyRunner();
    var ok = await saveProgress(partId, 'video_part', newChecked, CURRENT_TRAINING.sections, hireId);
    if (!ok) {
      var retries = SAVE_RETRY[partId] || 0;
      if (retries >= 2) {
        part.checked = !newChecked;
        recomputeSectionState(sec);
      }
      part._saveErr = "Couldn't save.";
      renderMyRunner();
    } else {
      part._saveErr = null;
      renderMyRunner();
    }
  } else if (action === 'retry-item') {
    // trigger same as toggle-item
    var itemId = btn.dataset.itemId;
    var secId = btn.dataset.secId;
    var hireId = btn.dataset.hireId;
    var item = findItemInTraining(CURRENT_TRAINING, itemId, false);
    var sec = findItemInTraining(CURRENT_TRAINING, secId, true);
    if (!item || !sec) return;
    SAVE_RETRY[itemId] = 0;
    var ok = await saveProgress(itemId, 'item', item.checked, CURRENT_TRAINING.sections, hireId);
    if (ok) { item._saveErr = null; }
    else { item._saveErr = "Couldn't save."; }
    renderMyRunner();
  } else if (action === 'retry-part') {
    var partId = btn.dataset.itemId;
    var secId = btn.dataset.secId;
    var hireId = btn.dataset.hireId;
    var part = findItemInTraining(CURRENT_TRAINING, partId, false);
    if (!part) return;
    SAVE_RETRY[partId] = 0;
    var ok = await saveProgress(partId, 'video_part', part.checked, CURRENT_TRAINING.sections, hireId);
    if (ok) { part._saveErr = null; }
    else { part._saveErr = "Couldn't save."; }
    renderMyRunner();
  } else if (action === 'watch-video') {
    e.preventDefault();
    window.open(btn.dataset.url, '_blank');
  }
});

document.getElementById('mgr-body').addEventListener('click', async function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var action = btn.dataset.action;
  if (action === 'switch-sub') {
    mgrState.subView = btn.dataset.sub;
    renderManagerList();
  } else if (action === 'open-hire') {
    var hireId = btn.dataset.hireId;
    var hire = (MANAGER_HIRES||[]).find(function(h) { return h.hire_id === hireId; });
    if (!hire) return;
    mgrState = { view: 'detail', subView: mgrState.subView, activeHireId: hireId, activeHireName: hire.display_name, activeTemplateId: null };
    renderHireDetail(hire);
  } else if (action === 'view-training') {
    var hireId = btn.dataset.hireId;
    var hireName = btn.dataset.hireName;
    var templateId = btn.dataset.templateId;
    await openHireTraining(hireId, hireName, templateId);
  } else if (action === 'show-assign-picker') {
    var hireId = btn.dataset.hireId;
    var hire = (MANAGER_HIRES||[]).find(function(h) { return h.hire_id === hireId; });
    var assignedIds = (hire && hire.assigned_templates || []).map(function(t) { return t.template_id; });
    renderAssignPicker(hireId, assignedIds);
  } else if (action === 'assign-template') {
    var hireId = btn.dataset.hireId;
    var templateId = btn.dataset.templateId;
    try {
      await api('POST', '/api/v1/onboarding/assignTemplate', { hire_id: hireId, template_id: templateId });
      MANAGER_HIRES = await api('GET', '/api/v1/onboarding/managerHires');
      var hire = (MANAGER_HIRES||[]).find(function(h) { return h.hire_id === hireId; });
      if (hire) renderHireDetail(hire);
      else renderManagerList();
    } catch(e) {
      alert('Failed to assign template. Try again.');
    }
  } else if (action === 'unassign-template') {
    var hireId = btn.dataset.hireId;
    var templateId = btn.dataset.templateId;
    if (!confirm('Unassign this template? Progress will be lost.')) return;
    try {
      await api('POST', '/api/v1/onboarding/unassignTemplate', { hire_id: hireId, template_id: templateId });
      MANAGER_HIRES = await api('GET', '/api/v1/onboarding/managerHires');
      var hire = (MANAGER_HIRES||[]).find(function(h) { return h.hire_id === hireId; });
      if (hire) renderHireDetail(hire);
      else renderManagerList();
    } catch(e) {
      alert('Failed to unassign template. Try again.');
    }
  } else if (action === 'back-to-hire-detail') {
    var hireId = btn.dataset.hireId;
    var hire = (MANAGER_HIRES||[]).find(function(h) { return h.hire_id === hireId; });
    if (hire) {
      mgrState = { view: 'detail', subView: mgrState.subView, activeHireId: hireId, activeHireName: hire.display_name, activeTemplateId: null };
      renderHireDetail(hire);
    } else {
      renderManagerList();
    }
  } else if (action === 'back-to-hires') {
    mgrState = { view: 'list', subView: mgrState.subView, activeHireId: null, activeHireName: null, activeTemplateId: null };
    CURRENT_TRAINING = null;
    renderManagerList();
  } else if (action === 'toggle-section') {
    var secId = btn.dataset.secId;
    if (EXPANDED_SECTIONS[secId]) {
      delete EXPANDED_SECTIONS[secId];
    } else {
      EXPANDED_SECTIONS[secId] = true;
    }
    renderMgrRunner();
  } else if (action === 'toggle-faq') {
    var faqId = btn.dataset.faqId;
    if (EXPANDED_FAQS[faqId]) {
      delete EXPANDED_FAQS[faqId];
    } else {
      EXPANDED_FAQS[faqId] = true;
    }
    renderMgrRunner();
  } else if (action === 'watch-video') {
    e.preventDefault();
    window.open(btn.dataset.url, '_blank');
  } else if (action === 'show-signoff-form') {
    var secId = btn.dataset.secId;
    var hireId = btn.dataset.hireId;
    var sfKey = hireId + '_' + secId;
    SIGNOFF_FORM[sfKey] = { notes: '', rating: '' };
    renderMgrRunner();
  } else if (action === 'signoff-rating') {
    var secId = btn.dataset.secId;
    var hireId = btn.dataset.hireId;
    var sfKey = hireId + '_' + secId;
    if (!SIGNOFF_FORM[sfKey]) SIGNOFF_FORM[sfKey] = { notes: '', rating: '' };
    SIGNOFF_FORM[sfKey].rating = btn.dataset.rating;
    renderMgrRunner();
  } else if (action === 'cancel-signoff') {
    var secId = btn.dataset.secId;
    var hireId = btn.dataset.hireId;
    var sfKey = hireId + '_' + secId;
    delete SIGNOFF_FORM[sfKey];
    renderMgrRunner();
  } else if (action === 'confirm-signoff') {
    var secId = btn.dataset.secId;
    var hireId = btn.dataset.hireId;
    var sfKey = hireId + '_' + secId;
    var formState = SIGNOFF_FORM[sfKey];
    if (!formState) return;
    if (!formState.rating) {
      formState.err = 'Selecting Readiness is required.';
      renderMgrRunner();
      return;
    }
    formState.err = '';
    btn.disabled = true;
    try {
      await api('POST', '/api/v1/onboarding/signOff', { section_id: secId, hire_id: hireId, notes: formState.notes.trim(), rating: formState.rating });
      delete SIGNOFF_FORM[sfKey];
      // Update local state
      if (CURRENT_TRAINING) {
        var sec = findItemInTraining(CURRENT_TRAINING, secId, true);
        if (sec) {
          sec.state = 'signed_off';
          sec.sign_off = { manager_name: CURRENT_USER ? (CURRENT_USER.display_name || CURRENT_USER.first_name) : 'Manager', signed_off_at: new Date().toISOString() };
        }
      }
      renderMgrRunner();
    } catch(ex) {
      if (!SIGNOFF_FORM[sfKey]) SIGNOFF_FORM[sfKey] = formState;
      SIGNOFF_FORM[sfKey].err = 'Something went wrong. Try again.';
      renderMgrRunner();
    }
  }
});

document.getElementById('builder-body').addEventListener('click', async function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var action = btn.dataset.action;
  if (action === 'tpl-role-chip' && obBuilderState.localCopy) {
    btn.classList.toggle('on');
    var chips = document.querySelectorAll('[data-action="tpl-role-chip"].on');
    var roles = Array.from(chips).map(function(c) { return c.dataset.role; });
    obBuilderState.localCopy.roles = roles;
    return;
  }
  if (action === 'new-template') {
    var name = prompt('Template name:');
    if (name && name.trim()) {
      var tpl = createNewOBTemplate(name.trim(), null);
      obBuilderState = { view: 'editor', activeTemplate: null, localCopy: tpl };
      renderOBBuilder();
    }
  } else if (action === 'open-template') {
    var tplId = btn.dataset.tplId;
    var tpl = (TEMPLATES||[]).find(function(t) { return String(t.id) === String(tplId); });
    if (tpl) {
      obBuilderState = { view: 'editor', activeTemplate: tpl, localCopy: JSON.parse(JSON.stringify(tpl)) };
      renderOBBuilder();
    }
  } else if (action === 'back-to-templates') {
    if (obBuilderHasUnsavedChanges() && !confirm('You have unsaved changes. Leave without saving?')) return;
    obBuilderState = { view: 'list', activeTemplate: null, localCopy: null };
    await loadTemplates();
  } else if (action === 'save-template') {
    var tpl = obBuilderState.localCopy;
    if (!tpl) return;
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      if (tpl.id) {
        await api('PUT', '/api/v1/onboarding/updateTemplate/'+tpl.id, { name: tpl.name, roles: tpl.roles || [], sections: tpl.sections });
        var idx = (TEMPLATES||[]).findIndex(function(t) { return t.id === tpl.id; });
        if (idx !== -1) TEMPLATES[idx] = JSON.parse(JSON.stringify(tpl));
        obBuilderState.activeTemplate = TEMPLATES[idx];
      } else {
        var created = await api('POST', '/api/v1/onboarding/createTemplate', { name: tpl.name, roles: tpl.roles || [], sections: tpl.sections });
        tpl.id = created.id;
        TEMPLATES.push(JSON.parse(JSON.stringify(tpl)));
        obBuilderState.activeTemplate = TEMPLATES[TEMPLATES.length - 1];
      }
      obBuilderState.localCopy = JSON.parse(JSON.stringify(obBuilderState.activeTemplate));
      obBuilderState.view = 'list';
      renderOBBuilder();
    } catch(ex) {
      btn.disabled = false;
      btn.textContent = 'Save';
      alert('Save failed. Please try again.');
    }
  } else if (action === 'discard-template') {
    if (obBuilderState.activeTemplate) {
      obBuilderState.localCopy = JSON.parse(JSON.stringify(obBuilderState.activeTemplate));
    } else {
      obBuilderState = { view: 'list', activeTemplate: null, localCopy: null };
      await loadTemplates();
      return;
    }
    renderOBBuilder();
  } else if (action === 'delete-template') {
    var tpl = obBuilderState.localCopy;
    if (!tpl || !tpl.id) return;
    if (confirm('Delete this template? This cannot be undone.')) {
      try {
        await api('PUT', '/api/v1/onboarding/updateTemplate/'+tpl.id+'/delete', {});
      } catch(ex) { /* best effort */ }
      TEMPLATES = (TEMPLATES||[]).filter(function(t) { return t.id !== tpl.id; });
      obBuilderState = { view: 'list', activeTemplate: null, localCopy: null };
      renderOBBuilder();
    }
  } else if (action === 'add-ob-section') {
    var title = prompt('Section name:');
    if (title && title.trim()) {
      obBuilderState.localCopy.sections.push(createNewOBSection(title.trim()));
      renderOBBuilder();
    }
  } else if (action === 'delete-ob-section') {
    obBuilderState.localCopy.sections = obBuilderState.localCopy.sections.filter(function(s) { return s.id !== btn.dataset.secId; });
    renderOBBuilder();
  } else if (action === 'toggle-signoff') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === btn.dataset.secId; });
    if (sec) {
      sec.requires_sign_off = !sec.requires_sign_off;
      if (!sec.requires_sign_off) sec.sign_off_roles = [];
      renderOBBuilder();
    }
  } else if (action === 'toggle-signoff-role') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === btn.dataset.secId; });
    if (sec) {
      if (!sec.sign_off_roles) sec.sign_off_roles = [];
      var role = btn.dataset.role;
      var idx = sec.sign_off_roles.indexOf(role);
      if (idx === -1) sec.sign_off_roles.push(role);
      else sec.sign_off_roles.splice(idx, 1);
      btn.classList.toggle('on');
    }
  } else if (action === 'toggle-faq-mode') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === btn.dataset.secId; });
    if (sec) { sec.is_faq = !sec.is_faq; renderOBBuilder(); }
  } else if (action === 'add-ob-item') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === btn.dataset.secId; });
    if (sec) {
      var itemType = btn.dataset.itemType;
      if (itemType === 'checkbox') sec.items.push(createNewOBCheckbox(''));
      else if (itemType === 'video_series') sec.items.push(createNewOBVideoSeries(''));
      renderOBBuilder();
    }
  } else if (action === 'delete-ob-item') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === btn.dataset.secId; });
    if (sec) { sec.items.splice(+btn.dataset.itemIdx, 1); renderOBBuilder(); }
  } else if (action === 'add-sub-item') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === btn.dataset.secId; });
    if (sec) {
      var item = sec.items[+btn.dataset.itemIdx];
      if (item) {
        if (!item.sub_items) item.sub_items = [];
        item.sub_items.push({ id: generateOBId('sub'), label: '' });
        renderOBBuilder();
      }
    }
  } else if (action === 'delete-sub-item') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === btn.dataset.secId; });
    if (sec) {
      var item = sec.items[+btn.dataset.itemIdx];
      if (item && item.sub_items) { item.sub_items.splice(+btn.dataset.subIdx, 1); renderOBBuilder(); }
    }
  } else if (action === 'add-video-part') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === btn.dataset.secId; });
    if (sec) {
      var item = sec.items[+btn.dataset.itemIdx];
      if (item) {
        if (!item.parts) item.parts = [];
        item.parts.push(createNewOBVideoPart());
        renderOBBuilder();
      }
    }
  } else if (action === 'delete-video-part') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === btn.dataset.secId; });
    if (sec) {
      var item = sec.items[+btn.dataset.itemIdx];
      if (item && item.parts) { item.parts.splice(+btn.dataset.partIdx, 1); renderOBBuilder(); }
    }
  } else if (action === 'add-faq-item') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === btn.dataset.secId; });
    if (sec) { sec.items.push(createNewOBFaqItem()); renderOBBuilder(); }
  } else if (action === 'delete-faq-item') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === btn.dataset.secId; });
    if (sec) { sec.items.splice(+btn.dataset.faqIdx, 1); renderOBBuilder(); }
  }
});

document.getElementById('builder-body').addEventListener('input', function(e) {
  if (!obBuilderState.localCopy) return;
  if (e.target.dataset.action === 'tpl-name-input') {
    obBuilderState.localCopy.name = e.target.value;
  } else if (e.target.dataset.action === 'sec-title-input') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === e.target.dataset.secId; });
    if (sec) sec.title = e.target.value;
  } else if (e.target.dataset.action === 'item-label-input') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === e.target.dataset.secId; });
    if (sec) { var item = sec.items[+e.target.dataset.itemIdx]; if (item) item.label = e.target.value; }
  } else if (e.target.dataset.action === 'sub-item-label-input') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === e.target.dataset.secId; });
    if (sec) { var item = sec.items[+e.target.dataset.itemIdx]; if (item && item.sub_items) item.sub_items[+e.target.dataset.subIdx].label = e.target.value; }
  } else if (e.target.dataset.action === 'part-title-input') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === e.target.dataset.secId; });
    if (sec) { var item = sec.items[+e.target.dataset.itemIdx]; if (item && item.parts) item.parts[+e.target.dataset.partIdx].title = e.target.value; }
  } else if (e.target.dataset.action === 'part-desc-input') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === e.target.dataset.secId; });
    if (sec) { var item = sec.items[+e.target.dataset.itemIdx]; if (item && item.parts) item.parts[+e.target.dataset.partIdx].desc = e.target.value; }
  } else if (e.target.dataset.action === 'part-url-input') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === e.target.dataset.secId; });
    if (sec) { var item = sec.items[+e.target.dataset.itemIdx]; if (item && item.parts) item.parts[+e.target.dataset.partIdx].url = e.target.value; }
  } else if (e.target.dataset.action === 'faq-q-input') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === e.target.dataset.secId; });
    if (sec && sec.items[+e.target.dataset.faqIdx]) sec.items[+e.target.dataset.faqIdx].question = e.target.value;
  } else if (e.target.dataset.action === 'faq-a-input') {
    var sec = (obBuilderState.localCopy.sections||[]).find(function(s) { return s.id === e.target.dataset.secId; });
    if (sec && sec.items[+e.target.dataset.faqIdx]) sec.items[+e.target.dataset.faqIdx].answer = e.target.value;
  }
});

(async function init() {
  try {
    CURRENT_USER = await api('GET', '/api/v1/me');
  } catch(e) {
    return;
  }
  var isManager = (CURRENT_USER.roles||[]).some(function(r){return r==='admin'||r==='manager'||r==='superadmin';}) || CURRENT_USER.is_superadmin;
  if (!isManager) {
    document.getElementById('t2').style.display = 'none';
    document.getElementById('t3').style.display = 'none';
  }
  // Check URL for ?tab=manager to navigate directly to Manager tab
  var urlTab = new URLSearchParams(window.location.search).get('tab');
  if (isManager && urlTab === 'manager') {
    show(2);
  } else {
    loadMyTrainings();
  }
  if (isManager) {
    loadManagerHires();
    loadTemplates();
  }
  window.addEventListener('beforeunload', function(e) {
    if (obBuilderHasUnsavedChanges()) { e.preventDefault(); e.returnValue = ''; }
  });
  document.getElementById('hq-back').addEventListener('click', function(e) {
    if (obBuilderHasUnsavedChanges()) {
      e.preventDefault();
      if (confirm('You have unsaved changes. Leave without saving?')) {
        window.location.href = 'index.html';
      }
    }
  });
})();
