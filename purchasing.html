<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c447c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Yumyums">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Yumyums Purchase Orders</title>
<style>
:root{--bg:#f5f5f3;--card:#fff;--txt:#1a1a1a;--mut:#6b6b6b;--brd:rgba(0,0,0,0.08);--info-bg:#e6f1fb;--info-tx:#0c447c;--warn-bg:#faeeda;--warn-tx:#854f0b}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--card:#262626;--txt:#f0f0f0;--mut:#999;--brd:rgba(255,255,255,0.1);--info-bg:#0c447c;--info-tx:#b5d4f4;--warn-bg:#633806;--warn-tx:#fac775}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{margin:0;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom)}
.app{max-width:480px;margin:0 auto;padding-top:12px}
.back{display:flex;align-items:center;gap:6px;margin-bottom:12px;color:var(--info-tx);font-size:14px;font-weight:500;text-decoration:none;-webkit-tap-highlight-color:transparent}
.back::before{content:'‹';font-size:20px;line-height:1;margin-top:-1px}
.tabs{display:flex;gap:4px;background:var(--card);border-radius:10px;padding:4px;margin-bottom:12px}
.tabs button{flex:1;border:none;padding:10px;font-size:13px;border-radius:7px;background:transparent;color:var(--txt);font-weight:500}
.tabs button.on{background:var(--info-bg);color:var(--info-tx)}
.card{background:var(--card);border-radius:12px;overflow:hidden;margin-bottom:8px}
.hd{padding:14px 16px;border-bottom:0.5px solid var(--brd)}
.hd h1{font-size:15px;font-weight:500;margin:0}
.sub{font-size:12px;color:var(--mut);margin-top:4px;display:flex;justify-content:space-between;align-items:center}
.pill{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--warn-bg);color:var(--warn-tx)}
.pill.lk{background:var(--brd);color:var(--mut)}
.list{max-height:60vh;overflow-y:auto}
.cat{position:sticky;top:0;background:var(--bg);padding:6px 16px;font-size:11px;font-weight:500;color:var(--mut);text-transform:uppercase;letter-spacing:0.5px;z-index:1}
.row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--brd)}
.row .nm{font-size:14px}
.row .mt{font-size:11px;color:var(--mut)}
.stp{display:flex;align-items:center;gap:10px}
.stp button{width:32px;height:32px;border-radius:50%;border:0.5px solid var(--brd);background:transparent;font-size:16px;color:var(--txt);font-weight:500}
.stp button:active{background:var(--info-bg)}
.stp span{min-width:18px;text-align:center;font-size:14px;font-weight:500}
.ft{padding:12px 16px;border-top:0.5px solid var(--brd)}
.ft button{width:100%;padding:12px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:8px;font-size:14px;font-weight:500}
.lk-row{display:flex;justify-content:space-between;padding:10px 16px;border-bottom:0.5px solid var(--brd);font-size:13px}
.lk-row span:last-child{color:var(--mut)}
.po{padding:14px 16px}
.po-h{display:flex;justify-content:space-between;font-size:14px;font-weight:500;margin-bottom:8px}
.po-l{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);line-height:2}
.tot{display:flex;justify-content:space-between;padding:14px 16px;font-size:14px;font-weight:500}
.item-card{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid var(--brd)}
.item-card.dim{opacity:0.5}
.item-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--brd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:var(--mut)}
.item-thumb img{width:100%;height:100%;border-radius:8px;object-fit:cover;cursor:pointer}
.photo-lightbox{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.9);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column}
.photo-lightbox img{max-width:95vw;max-height:85vh;object-fit:contain;border-radius:8px}
.photo-lightbox .lb-close{position:fixed;top:16px;right:16px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;padding:8px;z-index:1001}
.item-info{flex:1;min-width:0}
.item-info .nm{font-size:14px;font-weight:600;line-height:1.2}
.item-info .mt{font-size:12px;color:var(--mut);margin-top:2px}
.item-info .attr{font-size:11px;color:var(--mut);margin-top:2px}
.suggest-banner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--warn-bg);color:var(--warn-tx);border-radius:12px;margin-bottom:8px;font-size:14px;font-weight:500}
.suggest-banner button{background:none;border:none;font-size:20px;color:var(--warn-tx);padding:4px 8px;cursor:pointer}
.suggest-list{background:var(--card);border-radius:12px;margin-bottom:8px;overflow:hidden}
.suggest-list .sl-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:0.5px solid var(--brd);font-size:14px;font-weight:500}
.suggest-list .sl-hd button{background:none;border:none;color:var(--mut);font-size:13px;cursor:pointer}
.suggest-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:0.5px solid var(--brd);font-size:14px}
.suggest-row input[type=checkbox]{width:20px;height:20px;margin:0;accent-color:var(--info-tx)}
.suggest-row .sq{font-size:12px;color:var(--mut);white-space:nowrap}
.sl-low{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:#c0392b;color:#fff;white-space:nowrap}
.sl-med{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--warn-bg);color:var(--warn-tx);white-space:nowrap}
.suggest-ft{padding:12px 16px}
.suggest-ft button{width:100%;padding:12px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:8px;font-size:14px;font-weight:500}
.order-hd{padding:14px 16px;border-bottom:0.5px solid var(--brd)}
.order-hd h1{font-size:15px;font-weight:500;margin:0}
.order-hd .sub{font-size:12px;color:var(--mut);margin-top:4px;display:flex;justify-content:space-between;align-items:center}
.add-btn{display:block;width:100%;padding:14px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:12px;font-size:14px;font-weight:500;margin-top:8px;cursor:pointer;text-align:center}
.item-modal{position:fixed;inset:0;z-index:9999;background:var(--bg);display:none;flex-direction:column}
.item-modal.open{display:flex}
.item-modal .modal-hd{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:0.5px solid var(--brd)}
.item-modal .modal-hd input{flex:1;padding:10px 12px;border:1px solid var(--brd);border-radius:8px;font-size:14px;background:var(--card);color:var(--txt)}
.item-modal .modal-hd button{background:none;border:none;color:var(--info-tx);font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}
.item-modal .modal-list{flex:1;overflow-y:auto;padding:0}
.picker-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--brd)}
.picker-row .pr-name{font-size:14px}
.picker-row .pr-badge{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--info-bg);color:var(--info-tx)}
.picker-row .pr-add{padding:6px 14px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
.dup-popup{position:fixed;bottom:0;left:0;right:0;z-index:10000;background:var(--card);border-radius:16px 16px 0 0;padding:20px 16px env(safe-area-inset-bottom);box-shadow:0 -4px 20px rgba(0,0,0,0.15)}
.dup-popup .dp-title{font-size:15px;font-weight:600;margin-bottom:4px}
.dup-popup .dp-meta{font-size:13px;color:var(--mut);margin-bottom:16px}
.dup-popup .dp-actions{display:flex;gap:12px}
.dup-popup .dp-actions button{flex:1;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.dup-popup .dp-go{background:var(--info-bg);color:var(--info-tx)}
.dup-popup .dp-dismiss{background:var(--brd);color:var(--txt)}
.dup-backdrop{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.3);display:none}
.empty-state{text-align:center;padding:48px 24px;color:var(--mut)}
.empty-state .es-icon{font-size:32px;margin-bottom:12px}
.empty-state .es-title{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:4px}
.stub{padding:32px 24px;text-align:center;color:var(--mut);font-size:14px}
.loading{text-align:center;padding:32px;color:var(--mut);font-size:14px}
.error-card{padding:16px;background:var(--card);border-radius:12px;text-align:center;color:#c0392b;font-size:14px;margin-bottom:8px}
</style>
</head>
<body>
<div class="app">
<a class="back" href="index.html">HQ &nbsp;&#183;&nbsp; Purchase Orders</a>
<div class="tabs">
  <button id="t1" class="on" data-action="tab" data-tab="1">Order</button>
  <button id="t2" data-action="tab" data-tab="2">Shopping</button>
  <button id="t3" data-action="tab" data-tab="3">PO</button>
  <button id="t4" data-action="tab" data-tab="4">History</button>
</div>

<div id="s1"><!-- Order tab: rendered by JS --></div>
<div id="s2" style="display:none"><div class="card"><div class="stub">Shopping list will appear here after the PO is approved</div></div></div>
<div id="s3" style="display:none"><div class="card"><div class="stub">Locked PO will appear here after the weekly cutoff</div></div></div>
<div id="s4" style="display:none"><div class="card"><div class="stub">Past shopping runs will appear here</div></div></div>
</div>

<!-- Item picker modal -->
<div class="item-modal" id="item-modal">
  <div class="modal-hd">
    <input type="text" id="picker-search" placeholder="Search items..." autocomplete="off">
    <button data-action="close-picker">Back to order</button>
  </div>
  <div class="modal-list" id="picker-list"></div>
</div>

<!-- Duplicate popup -->
<div class="dup-backdrop" id="dup-backdrop" data-action="dismiss-dup"></div>
<div class="dup-popup" id="dup-popup" style="display:none">
  <div class="dp-title" id="dp-title"></div>
  <div class="dp-meta" id="dp-meta"></div>
  <div class="dp-actions">
    <button class="dp-go" data-action="goto-item">Go to item</button>
    <button class="dp-dismiss" data-action="dismiss-dup">Dismiss</button>
  </div>
</div>

<script>
let PO_STATE = null;
let SUGGESTIONS = [];
let ALL_ITEMS = [];
let SUGGESTION_OPEN = false;
let DEBOUNCE_TIMER = null;
let DUP_ITEM_ID = null;
const DEBOUNCE_MS = 600;
const SEARCH_DEBOUNCE_MS = 300;

async function api(path, opts) {
  var res = await fetch(path, opts);
  if (res.status === 401) { window.location.href = '/login.html'; throw new Error('unauthorized'); }
  if (res.status === 204) return null;
  var data = await res.json();
  if (!res.ok) throw Object.assign(new Error(data.error || 'api_error'), { status: res.status, data: data });
  return data;
}

function weekLabel(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  return 'Week of ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);
}

async function init() {
  var s1 = document.getElementById('s1');
  s1.innerHTML = '<div class="loading">Loading order...</div>';
  try {
    var results = await Promise.all([
      api('/api/v1/purchasing/orders', { method: 'POST', headers: {'Content-Type':'application/json'} }),
      api('/api/v1/inventory/items')
    ]);
    PO_STATE = results[0];
    ALL_ITEMS = results[1] || [];
    SUGGESTIONS = await api('/api/v1/purchasing/orders/' + PO_STATE.id + '/suggestions') || [];
    renderOrder();
  } catch (e) {
    if (e.message !== 'unauthorized') {
      s1.innerHTML = '<div class="error-card">Couldn\'t load the order. Pull down to refresh.</div>';
    }
  }
}

function renderOrder() {
  var s1 = document.getElementById('s1');
  var items = PO_STATE.line_items || [];
  var contributors = [];
  items.forEach(function(it) { if (it.added_by_name && contributors.indexOf(it.added_by_name) === -1) contributors.push(it.added_by_name); });
  var contribText = contributors.length === 1 ? '1 contributor' : contributors.length + ' contributors';
  var itemCount = items.length === 1 ? '1 item' : items.length + ' items';

  var html = '<div class="card">';
  html += '<div class="order-hd">';
  html += '<h1>' + weekLabel(PO_STATE.week_start) + '</h1>';
  html += '<div class="sub"><span>' + contribText + ' &middot; ' + itemCount + '</span><span class="pill">Cutoff Sun 6pm</span></div>';
  html += '</div>';

  if (SUGGESTIONS.length > 0) {
    html += '<div class="suggest-banner" data-action="toggle-suggestions">';
    html += '<span>' + SUGGESTIONS.length + ' item' + (SUGGESTIONS.length === 1 ? '' : 's') + ' need restock</span>';
    html += '<button data-action="toggle-suggestions">' + (SUGGESTION_OPEN ? '&minus;' : '+') + '</button>';
    html += '</div>';
  }

  if (SUGGESTION_OPEN && SUGGESTIONS.length > 0) {
    html += '<div class="suggest-list">';
    html += '<div class="sl-hd"><span>' + SUGGESTIONS.length + ' restock suggestion' + (SUGGESTIONS.length === 1 ? '' : 's') + '</span><button data-action="dismiss-suggestions">Dismiss</button></div>';
    SUGGESTIONS.forEach(function(s) {
      var alreadyOnPO = (PO_STATE.line_items || []).some(function(li) { return li.purchase_item_id === s.purchase_item_id; });
      html += '<div class="suggest-row">';
      html += '<input type="checkbox" data-suggest-id="' + s.purchase_item_id + '"' + (alreadyOnPO ? ' disabled checked' : '') + '>';
      html += '<span>' + s.item_name + '</span>';
      var lvlClass = s.stock_level === 'Low' ? 'sl-low' : 'sl-med';
      html += '<span class="' + lvlClass + '">' + s.stock_level + '</span>';
      html += '<span class="sq">Suggested: ' + s.suggested_qty + (s.unit ? ' ' + s.unit : '') + '</span>';
      html += '</div>';
    });
    html += '<div class="suggest-ft"><button data-action="add-selected">Add Selected</button></div>';
    html += '</div>';
  }

  if (items.length === 0) {
    html += '<div class="empty-state">';
    html += '<div class="es-icon">🛒</div>';
    html += '<div class="es-title">Nothing on the order yet</div>';
    html += '<div>Add items from inventory or tap the restock suggestions above</div>';
    html += '</div>';
  } else {
    var grouped = {};
    var groupOrder = [];
    items.forEach(function(it) {
      var g = it.group_name || 'Other';
      if (!grouped[g]) { grouped[g] = []; groupOrder.push(g); }
      grouped[g].push(it);
    });
    groupOrder.forEach(function(g) {
      html += '<div class="cat">' + g + '</div>';
      grouped[g].forEach(function(it) { html += renderItemCard(it); });
    });
  }

  html += '</div>';
  html += '<button class="add-btn" data-action="open-picker">+ Add item</button>';

  s1.innerHTML = html;
}

function renderItemCard(item) {
  var thumb = item.photo_url
    ? '<div class="item-thumb"><img src="' + item.photo_url + '" alt="' + item.item_name + '" data-action="photo-zoom" data-photo-url="' + item.photo_url + '" data-photo-name="' + item.item_name + '"></div>'
    : '<div class="item-thumb">' + item.item_name.charAt(0).toUpperCase() + '</div>';
  var loc = item.store_location ? ' &middot; ' + item.store_location : '';
  var ini = initials(item.added_by_name || 'You');
  var dimClass = item.quantity === 0 ? ' dim' : '';
  return '<div class="item-card' + dimClass + '" data-item-id="' + item.purchase_item_id + '">'
    + thumb
    + '<div class="item-info"><div class="nm">' + item.item_name + '</div>'
    + '<div class="mt">' + (item.unit || '') + loc + '</div>'
    + '<div class="attr">Added by: ' + ini + '</div></div>'
    + '<div class="stp">'
    + '<button data-action="qty-dec" data-item-id="' + item.purchase_item_id + '">&minus;</button>'
    + '<span aria-label="Quantity: ' + item.quantity + '">' + item.quantity + '</span>'
    + '<button data-action="qty-inc" data-item-id="' + item.purchase_item_id + '">+</button>'
    + '</div></div>';
}

function openPhotoLightbox(url, name) {
  var lb = document.createElement('div');
  lb.className = 'photo-lightbox';
  lb.innerHTML = '<button class="lb-close" data-action="close-lightbox">&times;</button>'
    + '<img src="' + url + '" alt="' + (name || '') + '">';
  lb.addEventListener('click', function(e) {
    if (e.target === lb) closePhotoLightbox();
  });
  document.body.appendChild(lb);
}

function closePhotoLightbox() {
  var lb = document.querySelector('.photo-lightbox');
  if (lb) lb.remove();
}

function show(n) {
  [1,2,3,4].forEach(function(i) {
    document.getElementById('s'+i).style.display = i===n ? 'block' : 'none';
    document.getElementById('t'+i).className = i===n ? 'on' : '';
  });
}

function updateQty(itemId, delta) {
  if (!PO_STATE) return;
  var item = (PO_STATE.line_items || []).find(function(it) { return it.purchase_item_id === itemId; });
  if (!item) return;
  var newQty = Math.max(0, item.quantity + delta);
  item.quantity = newQty;
  var card = document.querySelector('.item-card[data-item-id="' + itemId + '"]');
  if (card) {
    card.className = 'item-card' + (newQty === 0 ? ' dim' : '');
    var span = card.querySelector('.stp span');
    if (span) { span.textContent = newQty; span.setAttribute('aria-label', 'Quantity: ' + newQty); }
  }
  debouncedSave();
}

function debouncedSave() {
  clearTimeout(DEBOUNCE_TIMER);
  DEBOUNCE_TIMER = setTimeout(savePOItems, DEBOUNCE_MS);
}

async function savePOItems() {
  if (!PO_STATE) return;
  var items = (PO_STATE.line_items || [])
    .filter(function(it) { return it.quantity > 0; })
    .map(function(it) { return { purchase_item_id: it.purchase_item_id, quantity: it.quantity, unit: it.unit || '' }; });
  try {
    var updated = await api('/api/v1/purchasing/orders/' + PO_STATE.id + '/items', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: items })
    });
    if (updated) { PO_STATE = updated; renderOrder(); }
  } catch (e) {
    var s1 = document.getElementById('s1');
    var errDiv = document.createElement('div');
    errDiv.className = 'error-card';
    errDiv.textContent = "Couldn't save. Check connection and try again.";
    s1.insertBefore(errDiv, s1.firstChild);
    setTimeout(function() { if (errDiv.parentNode) errDiv.parentNode.removeChild(errDiv); }, 4000);
  }
}

function addItemToPO(itemId) {
  if (!PO_STATE) return;
  var catalogItem = ALL_ITEMS.find(function(it) { return it.id === itemId; });
  if (!catalogItem) return;
  var existing = (PO_STATE.line_items || []).find(function(it) { return it.purchase_item_id === itemId; });
  if (existing) return;
  PO_STATE.line_items = PO_STATE.line_items || [];
  PO_STATE.line_items.push({
    purchase_item_id: itemId,
    item_name: catalogItem.description,
    group_name: catalogItem.group_name || null,
    photo_url: null,
    store_location: null,
    quantity: 1,
    unit: '',
    added_by_name: 'You'
  });
  SUGGESTIONS = SUGGESTIONS.filter(function(s) { return s.purchase_item_id !== itemId; });
  renderOrder();
  savePOItems();
}

function addSelectedSuggestions() {
  if (!PO_STATE) return;
  var checkboxes = document.querySelectorAll('.suggest-row input[type=checkbox]:checked:not(:disabled)');
  checkboxes.forEach(function(cb) {
    var sid = cb.dataset.suggestId;
    var suggestion = SUGGESTIONS.find(function(s) { return s.purchase_item_id === sid; });
    if (!suggestion) return;
    var existing = (PO_STATE.line_items || []).find(function(it) { return it.purchase_item_id === sid; });
    if (existing) return;
    PO_STATE.line_items = PO_STATE.line_items || [];
    PO_STATE.line_items.push({
      purchase_item_id: suggestion.purchase_item_id,
      item_name: suggestion.item_name,
      group_name: suggestion.group_name || null,
      photo_url: suggestion.photo_url || null,
      store_location: suggestion.store_location || null,
      quantity: suggestion.suggested_qty,
      unit: suggestion.unit || '',
      added_by_name: 'You'
    });
  });
  SUGGESTIONS = SUGGESTIONS.filter(function(s) {
    return !(PO_STATE.line_items || []).some(function(li) { return li.purchase_item_id === s.purchase_item_id; });
  });
  SUGGESTION_OPEN = false;
  renderOrder();
  savePOItems();
}

function openItemModal() {
  var modal = document.getElementById('item-modal');
  modal.classList.add('open');
  var input = document.getElementById('picker-search');
  input.value = '';
  renderPickerList('');
  setTimeout(function() { input.focus(); }, 100);
}

function closeItemModal() {
  document.getElementById('item-modal').classList.remove('open');
  document.getElementById('picker-search').value = '';
}

function renderPickerList(query) {
  var q = (query || '').toLowerCase();
  var filtered = ALL_ITEMS.filter(function(it) {
    return !q || (it.description || '').toLowerCase().indexOf(q) !== -1;
  }).slice(0, 30);

  var html = '';
  if (filtered.length === 0) {
    html = '<div class="loading">No items found</div>';
  } else {
    filtered.forEach(function(it) {
      var onPO = PO_STATE && (PO_STATE.line_items || []).find(function(li) { return li.purchase_item_id === it.id; });
      html += '<div class="picker-row">';
      html += '<span class="pr-name">' + it.description + '</span>';
      if (onPO) {
        html += '<span class="pr-badge" data-action="picker-item-on-po" data-item-id="' + it.id + '">On PO: ' + onPO.quantity + (onPO.unit ? ' ' + onPO.unit : '') + '</span>';
      } else {
        html += '<button class="pr-add" data-action="add-to-po" data-item-id="' + it.id + '">+ Add</button>';
      }
      html += '</div>';
    });
  }
  document.getElementById('picker-list').innerHTML = html;
}

function showDuplicatePopup(itemId) {
  var item = PO_STATE && (PO_STATE.line_items || []).find(function(li) { return li.purchase_item_id === itemId; });
  if (!item) return;
  DUP_ITEM_ID = itemId;
  document.getElementById('dp-title').textContent = item.item_name + ' already on PO';
  document.getElementById('dp-meta').textContent = 'Qty: ' + item.quantity + ' \u00b7 Added by: ' + initials(item.added_by_name || 'You');
  document.getElementById('dup-popup').style.display = 'block';
  document.getElementById('dup-backdrop').style.display = 'block';
}

function dismissDuplicatePopup() {
  document.getElementById('dup-popup').style.display = 'none';
  document.getElementById('dup-backdrop').style.display = 'none';
}

function gotoItem(itemId) {
  closeItemModal();
  dismissDuplicatePopup();
  setTimeout(function() {
    var card = document.querySelector('.item-card[data-item-id="' + itemId + '"]');
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;
  if (action === 'tab') show(+el.dataset.tab);
  if (action === 'toggle-suggestions') { SUGGESTION_OPEN = !SUGGESTION_OPEN; renderOrder(); }
  if (action === 'dismiss-suggestions') { SUGGESTION_OPEN = false; renderOrder(); }
  if (action === 'add-selected') addSelectedSuggestions();
  if (action === 'qty-inc') updateQty(el.dataset.itemId, 1);
  if (action === 'qty-dec') updateQty(el.dataset.itemId, -1);
  if (action === 'open-picker') openItemModal();
  if (action === 'close-picker') closeItemModal();
  if (action === 'add-to-po') { addItemToPO(el.dataset.itemId); closeItemModal(); }
  if (action === 'picker-item-on-po') showDuplicatePopup(el.dataset.itemId);
  if (action === 'goto-item') { gotoItem(DUP_ITEM_ID); }
  if (action === 'dismiss-dup') dismissDuplicatePopup();
  if (action === 'photo-zoom') openPhotoLightbox(el.dataset.photoUrl, el.dataset.photoName);
  if (action === 'close-lightbox') closePhotoLightbox();
});

var searchTimer = null;
document.getElementById('picker-search').addEventListener('input', function(e) {
  clearTimeout(searchTimer);
  var val = e.target.value;
  searchTimer = setTimeout(function() { renderPickerList(val); }, SEARCH_DEBOUNCE_MS);
});

document.addEventListener('dblclick', function(e) { e.preventDefault(); });
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
init();
</script>
<script src="log.js"></script><script src="ptr.js"></script>
