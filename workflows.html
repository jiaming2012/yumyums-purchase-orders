function fireworks(){
  var canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:10000;pointer-events:none';
  canvas.width=window.innerWidth*2;canvas.height=window.innerHeight*2;
  document.body.appendChild(canvas);
  var ctx=canvas.getContext('2d');
  ctx.scale(2,2);
  var W=window.innerWidth,H=window.innerHeight;
  var particles=[];
  var colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6eb4','#a66cff','#ff9f43','#00d2d3'];
  function burst(x,y){
    for(var i=0;i<40;i++){
      var angle=Math.random()*Math.PI*2;
      var speed=2+Math.random()*5;
      particles.push({x:x,y:y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,color:colors[Math.floor(Math.random()*colors.length)],size:2+Math.random()*3,gravity:0.06+Math.random()*0.04});
    }
  }
  // Launch 5 bursts with staggered timing
  burst(W*0.5,H*0.3);
  setTimeout(function(){burst(W*0.25,H*0.4)},200);
  setTimeout(function(){burst(W*0.75,H*0.35)},350);
  setTimeout(function(){burst(W*0.4,H*0.25)},500);
  setTimeout(function(){burst(W*0.6,H*0.45)},650);
  var frame;
  function animate(){
    ctx.clearRect(0,0,W,H);
    var alive=false;
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      if(p.life<=0)continue;
      alive=true;
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;
      p.life-=0.015;p.vx*=0.99;
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    if(alive){frame=requestAnimationFrame(animate)}
    else{cancelAnimationFrame(frame);canvas.remove()}
  }
  animate();
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';requestAnimationFrame(function(){t.style.opacity='1'});setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.style.display='none'},300)},2000)}

function formatTime(d){if(!d)return'';var h=d.getHours(),m=d.getMinutes(),ap=h>=12?'p':'a';h=h%12||12;return h+':'+(m<10?'0':'')+m+ap}

function openCamera(onCapture) {
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.capture = 'environment';
  inp.style.cssText = 'position:fixed;top:-100px;left:-100px;opacity:0;pointer-events:none';
  document.body.appendChild(inp);
  var cleanup = setTimeout(function() { if (inp.parentNode) inp.parentNode.removeChild(inp); }, 30000);
  inp.addEventListener('change', function() {
    clearTimeout(cleanup);
    var file = inp.files && inp.files[0];
    if (inp.parentNode) inp.parentNode.removeChild(inp);
    if (file) onCapture(file);
  });
  inp.click();
}

function showPhotoPreview(objectURL, onConfirm, onRetake) {
  var modal = document.createElement('div');
  modal.className = 'photo-modal';
  modal.innerHTML = '<img class="photo-preview" src="' + objectURL + '">' +
    '<div class="photo-modal-actions">' +
    '<button class="photo-confirm-btn" aria-label="Confirm photo">\u2713</button>' +
    '<button class="photo-retake-btn">\u21bb Retake</button>' +
    '</div>';
  document.body.appendChild(modal);
  modal.querySelector('.photo-confirm-btn').onclick = function() {
    modal.remove(); onConfirm(objectURL);
  };
  modal.querySelector('.photo-retake-btn').onclick = function() {
    modal.remove(); onRetake();
  };
}

}

function createNewTemplate() {
  return {
    id: generateId('tpl'),
    name: '',
    active_days: null,
    requires_approval: true,
    assignable_to: ['admin', 'manager', 'team_member'],
    sections: []
  };
}

function createNewSection(title) {
  return {
    id: generateId('sec'),
    title: title,
    order: state.activeTemplate ? state.activeTemplate.sections.length : 0,
    condition: null,
    fields: []
  };
}

function createNewField(type) {
  const field = {
    id: generateId('fld'),
    type: type,
    label: '',
    required: false,
    order: 0,
    config: getDefaultConfig(type),
    fail_trigger: null,
    corrective_action: null,
    condition: null
  };
  if (type === 'temperature') {
    field.fail_trigger = { type: 'out_of_range', min: 0, max: 500 };
    field.corrective_action = { label: 'Corrective action taken', type: 'text', required: true };
  }
  return field;
}

function renderBuilder() {
  const body = document.getElementById('builder-body');
  if (!body) return;
  if (state.view === 'list') {
    body.innerHTML = renderTemplateList();
  } else {
    body.innerHTML = renderEditor();
  }
  if (state.view === 'editor') initSortable();
}

function renderTemplateList() {
  if (MOCK_TEMPLATES.length === 0) {
    return `<div class="empty-state"><h2>No checklists yet</h2><p>Create your first checklist to get started.</p></div>
<div style="padding:0 0 8px"><button class="btn-primary">+ New checklist</button></div>`;
  }
  const rows = MOCK_TEMPLATES.map(tpl => {
    const secCount = tpl.sections.length;
    const secLabel = secCount === 1 ? '1 section' : secCount + ' sections';
    return `<div class="row" data-template-id="${tpl.id}" style="cursor:pointer"><div><div class="nm">${tpl.name || '(Untitled)'}</div><div class="mt">${secLabel}</div></div></div>`;
  }).join('');
  return `<div class="cat">Checklists</div>
<div class="card">${rows}</div>
<button class="btn-primary">+ New checklist</button>`;
}

function renderEditor() {
  const tpl = state.activeTemplate;
  const approvalChecked = tpl.requires_approval ? 'checked' : '';
  const sectionsHtml = tpl.sections.map(sec => renderSection(sec)).join('');
  return `<button class="editor-back">Checklists</button>
<div class="meta-card">
  <div class="hd">
    <div class="field" style="margin-bottom:0">
      <label>Checklist name</label>
      <input type="text" id="tpl-name-input" value="${escapeAttr(tpl.name)}" placeholder="e.g. Morning Opening Checklist">
    </div>
  </div>
  <div class="toggle-row">
    <div><div class="lbl">Requires approval</div><div class="sub">Manager must approve before checklist is considered complete</div></div>
    <label class="toggle"><input type="checkbox" id="approval-toggle" ${approvalChecked}><span class="slider"></span></label>
  </div>
</div>
${sectionsHtml}
<button class="add-section-btn">+ Add section</button>
<button class="btn-primary" id="save-btn">Save checklist</button>`;
}

function renderFieldTypePicker(secId) {
  return `<div class="field-type-picker">
    <div class="row" data-type="checkbox" data-section-id="${secId}"><span class="nm">Checkbox</span></div>
    <div class="row" data-type="yes_no" data-section-id="${secId}"><span class="nm">Yes / No</span></div>
    <div class="row" data-type="text" data-section-id="${secId}"><span class="nm">Text note</span></div>
    <div class="row" data-type="temperature" data-section-id="${secId}"><span class="nm">Temperature (°F)</span></div>
    <div class="row" data-type="photo" data-section-id="${secId}"><span class="nm">Photo</span></div>
  </div>`;
}

function renderSection(sec) {
  const fieldsHtml = sec.fields.map(f => renderField(f, sec.id)).join('');
  return `<div class="sec-hd" data-section-id="${sec.id}">
  <span>${escapeHtml(sec.title)}</span>
  <button class="sec-delete" data-section-id="${sec.id}" aria-label="Delete section">✕</button>
</div>
<div style="padding:0 16px 8px">
  ${renderDayChips(sec.condition ? sec.condition.days : null, sec.id, 'section')}
</div>
<div class="field-list" data-section-id="${sec.id}">${fieldsHtml}</div>
<button class="add-field-btn" data-section-id="${sec.id}">+ Add field</button>
${state.fieldPickerSection === sec.id ? renderFieldTypePicker(sec.id) : ''}
<div class="section-divider"></div>`;
}

function renderFieldExpanded(fld, secId) {
  let typeControls = '';
  if (fld.type === 'temperature') {
    typeControls = `<div style="display:flex;gap:8px;margin-top:12px">
      <div class="field" style="flex:1">
        <label>MIN (°F)</label>
        <input type="number" class="fld-temp-min" value="${fld.config.min}"
               data-field-id="${fld.id}" data-section-id="${secId}">
      </div>
      <div class="field" style="flex:1">
        <label>MAX (°F)</label>
        <input type="number" class="fld-temp-max" value="${fld.config.max}"
               data-field-id="${fld.id}" data-section-id="${secId}">
      </div>
    </div>`;
  } else if (fld.type === 'photo') {
    typeControls = `<div class="toggle-row" style="padding:10px 0;border:none">
      <div>
        <div class="lbl">Required</div>
        <div class="sub">Crew must upload a photo before submitting</div>
      </div>
      <label class="toggle">
        <input type="checkbox" class="fld-photo-required"
               ${fld.required ? 'checked' : ''}
               data-field-id="${fld.id}" data-section-id="${secId}">
        <span class="slider"></span>
      </label>
    </div>`;
  }
  // checkbox, yes_no, text: no type-specific controls beyond the label input
  return `<div class="field-settings">
    <div class="field">
      <label>LABEL</label>
      <input type="text" class="fld-label" value="${escapeAttr(fld.label)}"
             data-field-id="${fld.id}" data-section-id="${secId}"
             placeholder="Enter field label">
    </div>
    ${typeControls}
    ${renderDayChips(fld.condition && fld.condition.days ? fld.condition.days : null, fld.id, 'field', !!(fld.condition && fld.condition.days))}
    ${renderSkipLogic(fld, secId)}
  </div>`;
}

function renderField(fld, secId) {
  const isExpanded = state.expandedField === fld.id;
  return `<div class="field-row ${isExpanded ? 'expanded' : ''}" data-field-id="${fld.id}" data-section-id="${secId}">
    <span class="drag-handle" aria-label="Drag to reorder">☰</span>
    <span class="field-row-tap">${escapeHtml(fld.label || fld.type)}</span>
    <span class="field-type-pill">${fld.type.replace('_',' ')}</span>
    <button class="field-delete" aria-label="Delete field" data-field-id="${fld.id}" data-section-id="${secId}">✕</button>
    ${isExpanded ? renderFieldExpanded(fld, secId) : ''}
  </div>`;
}

function toggleFieldExpanded(fldId) {
  state.expandedField = state.expandedField === fldId ? null : fldId;
  renderBuilder();
}

function toggleFieldPicker(secId) {
  state.fieldPickerSection = state.fieldPickerSection === secId ? null : secId;
  renderBuilder();
}

function addField(secId, type) {
  const sec = state.activeTemplate.sections.find(s => s.id === secId);
  if (!sec) return;
  const field = createNewField(type);
  field.order = sec.fields.length;
  sec.fields.push(field);
  state.fieldPickerSection = null;
  renderBuilder();
}

function deleteField(secId, fldId) {
  const sec = state.activeTemplate.sections.find(s => s.id === secId);
  if (!sec) return;
  sec.fields = sec.fields.filter(f => f.id !== fldId);
  sec.fields.forEach((f, i) => { f.order = i; });
  if (state.expandedField === fldId) state.expandedField = null;
  renderBuilder();
}

function updateField(secId, fldId, patch) {
  const sec = state.activeTemplate.sections.find(s => s.id === secId);
  const fld = sec.fields.find(f => f.id === fldId);
  Object.assign(fld, patch);
  // Do NOT call renderBuilder() for text input changes (causes cursor jump)
  // Only re-render for toggle changes
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeAttr(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function openEditor(tplId) {
  if (tplId) {
    state.activeTemplate = MOCK_TEMPLATES.find(t => t.id === tplId) || null;
    if (!state.activeTemplate) return;
  } else {
    const newTpl = createNewTemplate();
    MOCK_TEMPLATES.push(newTpl);
    state.activeTemplate = newTpl;
  }
  state.view = 'editor';
  renderBuilder();
}

function backToList() {
  state.view = 'list';
  state.activeTemplate = null;
  state.expandedField = null;
  state.fieldPickerSection = null;
  renderBuilder();
}

const DAYS = ['M','T','W','T','F','Sa','Su'];
const DAY_INDICES = [1, 2, 3, 4, 5, 6, 0]; // Mon=1, Tue=2, ..., Sat=6, Sun=0

function renderDayChips(activeDays, targetId, targetType, hasCustomDays) {
  const days = activeDays || [];
  const isCustom = targetType === 'section' ? true : !!hasCustomDays;
  return `
    <div class="field" style="margin-top:12px">
      <label>SHOW ON DAYS</label>
      ${targetType === 'field' ? `
      <div style="margin-bottom:8px">
        <button class="day-inherit-btn ${!isCustom ? 'on' : ''}" data-target-id="${targetId}" data-target-type="${targetType}" data-action="inherit" style="padding:6px 12px;border-radius:8px;border:0.5px solid var(--brd);background:${!isCustom ? 'var(--info-bg)' : 'transparent'};color:${!isCustom ? 'var(--info-tx)' : 'var(--mut)'};font-size:12px;font-weight:500;margin-right:6px;cursor:pointer">When section is visible</button>
        <button class="day-inherit-btn ${isCustom ? 'on' : ''}" data-target-id="${targetId}" data-target-type="${targetType}" data-action="custom" style="padding:6px 12px;border-radius:8px;border:0.5px solid var(--brd);background:${isCustom ? 'var(--info-bg)' : 'transparent'};color:${isCustom ? 'var(--info-tx)' : 'var(--mut)'};font-size:12px;font-weight:500;cursor:pointer">Custom days</button>
      </div>` : ''}
      <div class="day-chips-row" ${targetType === 'field' && !isCustom ? 'style="display:none"' : ''}>
        ${DAYS.map((label, i) => `
          <button class="day-chip ${days.includes(DAY_INDICES[i]) ? 'on' : ''}"
                  data-day="${DAY_INDICES[i]}" data-target-id="${targetId}"
                  data-target-type="${targetType}">${label}</button>
        `).join('')}
      </div>
    </div>`;
}

function getPrecedingFields(template, sectionId, fieldId) {
  const fields = [];
  for (const sec of template.sections) {
    for (const fld of sec.fields) {
      if (sec.id === sectionId && fld.id === fieldId) return fields;
      fields.push({ id: fld.id, label: fld.label || fld.type, type: fld.type, sectionTitle: sec.title });
    }
  }
  return fields;
}

function getValuesForFieldType(type) {
  if (type === 'checkbox') return [{value: true, label: 'Checked'}, {value: false, label: 'Unchecked'}];
  if (type === 'yes_no') return [{value: true, label: 'Yes'}, {value: false, label: 'No'}];
  if (type === 'text') return [{value: '', label: 'Empty'}, {value: '_notempty', label: 'Not empty'}];
  if (type === 'temperature') return [{value: '_in_range', label: 'In range'}, {value: '_out_of_range', label: 'Out of range'}];
  if (type === 'photo') return [{value: true, label: 'Uploaded'}, {value: false, label: 'Not uploaded'}];
  return [];
}

function renderSkipLogic(fld, secId) {
  const preceding = getPrecedingFields(state.activeTemplate, secId, fld.id);
  if (preceding.length === 0) return '';

  const selectedFieldId = fld.condition && fld.condition.field_id ? fld.condition.field_id : '';
  const selectedValue = fld.condition && fld.condition.value !== undefined ? fld.condition.value : '';

  const selectedField = preceding.find(f => f.id === selectedFieldId);
  const valueOptions = selectedField ? getValuesForFieldType(selectedField.type) : [];

  return `
    <div class="skip-logic-row">
      <label style="display:block;font-size:12px;font-weight:500;color:var(--mut);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px">SHOW THIS FIELD ONLY WHEN</label>
      <select class="skip-field-select" data-field-id="${fld.id}" data-section-id="${secId}"
              style="width:100%;padding:11px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt);margin-bottom:8px">
        <option value="">select a field...</option>
        ${preceding.map(f => `<option value="${f.id}" ${f.id === selectedFieldId ? 'selected' : ''}>${escapeHtml(f.sectionTitle)}: ${escapeHtml(f.label)}</option>`).join('')}
      </select>
      ${selectedFieldId ? `
        <select class="skip-value-select" data-field-id="${fld.id}" data-section-id="${secId}"
                style="width:100%;padding:11px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt)">
          <option value="">select a value...</option>
          ${valueOptions.map(v => `<option value="${JSON.stringify(v.value).replace(/"/g, '&quot;')}" ${JSON.stringify(v.value) === JSON.stringify(selectedValue) ? 'selected' : ''}>${v.label}</option>`).join('')}
        </select>
      ` : ''}
      ${selectedFieldId ? `<button class="skip-clear" data-field-id="${fld.id}" data-section-id="${secId}" style="margin-top:8px;background:none;border:none;color:#c0392b;font-size:12px;cursor:pointer;padding:4px 0">Remove condition</button>` : ''}
    </div>`;
}

let sortableInstances = [];

function initSortable() {
  sortableInstances.forEach(s => s.destroy());
  sortableInstances = [];
  document.querySelectorAll('.field-list').forEach(el => {
    const secId = el.dataset.sectionId;
    sortableInstances.push(Sortable.create(el, {
      handle: '.drag-handle',
      animation: 150,
      onEnd(evt) {
        const sec = state.activeTemplate.sections.find(s => s.id === secId);
        const moved = sec.fields.splice(evt.oldIndex, 1)[0];
        sec.fields.splice(evt.newIndex, 0, moved);
        sec.fields.forEach((f, i) => f.order = i);
        // No re-render — SortableJS already moved the DOM node
      }
    }));
  });
}

function addSection() {
  const title = prompt('Section name:');
  if (title && title.trim()) {
    const sec = createNewSection(title.trim());
    state.activeTemplate.sections.push(sec);
    renderBuilder();
  }
}

function deleteSection(secId) {
  state.activeTemplate.sections = state.activeTemplate.sections.filter(s => s.id !== secId);
  renderBuilder();
}

function updateTemplateName(name) {
  state.activeTemplate.name = name;
}

function toggleApproval() {
  state.activeTemplate.requires_approval = !state.activeTemplate.requires_approval;
}

// Event delegation — attached ONCE, not inside render
document.getElementById('builder-body').addEventListener('click', function(e) {
  // Template row -> open editor
  const tplRow = e.target.closest('[data-template-id]');
  if (tplRow && !e.target.closest('.sec-delete') && !e.target.closest('.field-delete')) {
    openEditor(tplRow.dataset.templateId);
    return;
  }

  // Editor back button
  if (e.target.closest('.editor-back')) {
    backToList();
    return;
  }

  // Delete section
  const secDelete = e.target.closest('.sec-delete');
  if (secDelete) {
    deleteSection(secDelete.dataset.sectionId);
    return;
  }

  // Add section
  if (e.target.closest('.add-section-btn')) {
    addSection();
    return;
  }

  // Add field — toggle field type picker
  const addFieldBtn = e.target.closest('.add-field-btn');
  if (addFieldBtn) {
    toggleFieldPicker(addFieldBtn.dataset.sectionId);
    return;
  }

  // Field type picker row — add field of selected type
  const pickerRow = e.target.closest('.field-type-picker .row');
  if (pickerRow) {
    addField(pickerRow.dataset.sectionId, pickerRow.dataset.type);
    return;
  }

  // Delete field
  const fieldDelete = e.target.closest('.field-delete');
  if (fieldDelete) {
    deleteField(fieldDelete.dataset.sectionId, fieldDelete.dataset.fieldId);
    return;
  }

  // Tap field row to expand/collapse settings
  const fieldRowTap = e.target.closest('.field-row-tap');
  if (fieldRowTap) {
    const fieldRow = e.target.closest('.field-row');
    if (fieldRow) {
      toggleFieldExpanded(fieldRow.dataset.fieldId);
    }
    return;
  }

  // Skip logic — clear condition
  if (e.target.closest('.skip-clear')) {
    const btn = e.target.closest('.skip-clear');
    const fldId = btn.dataset.fieldId;
    const secId = btn.dataset.sectionId;
    const sec = state.activeTemplate.sections.find(s => s.id === secId);
    const fld = sec.fields.find(f => f.id === fldId);
    if (fld.condition) {
      delete fld.condition.field_id;
      delete fld.condition.operator;
      delete fld.condition.value;
      if (!fld.condition.days) fld.condition = null;
    }
    renderBuilder();
    return;
  }

  // Day inherit/custom toggle for fields
  if (e.target.closest('.day-inherit-btn')) {
    const btn = e.target.closest('.day-inherit-btn');
    const targetId = btn.dataset.targetId;
    const action = btn.dataset.action;
    const sec = state.activeTemplate.sections.find(s =>
      s.fields.some(f => f.id === targetId));
    const fld = sec.fields.find(f => f.id === targetId);
    if (action === 'inherit') {
      // Remove custom days — field inherits from section
      if (fld.condition) { delete fld.condition.days; if (!fld.condition.field_id) fld.condition = null; }
    } else {
      // Switch to custom — initialize with empty days array
      if (!fld.condition) fld.condition = { days: [] };
      else if (!fld.condition.days) fld.condition.days = [];
    }
    renderBuilder();
    return;
  }

  // Day chip toggle
  if (e.target.closest('.day-chip')) {
    const chip = e.target.closest('.day-chip');
    const dayIndex = +chip.dataset.day;
    const targetId = chip.dataset.targetId;
    const targetType = chip.dataset.targetType;

    if (targetType === 'section') {
      const sec = state.activeTemplate.sections.find(s => s.id === targetId);
      if (!sec.condition) sec.condition = { days: [] };
      const idx = sec.condition.days.indexOf(dayIndex);
      if (idx === -1) sec.condition.days.push(dayIndex);
      else sec.condition.days.splice(idx, 1);
      if (sec.condition.days.length === 0) sec.condition = null;
    } else {
      const sec = state.activeTemplate.sections.find(s =>
        s.fields.some(f => f.id === targetId));
      const fld = sec.fields.find(f => f.id === targetId);
      if (!fld.condition) fld.condition = { days: [] };
      else if (fld.condition.field_id) {
        // Already has skip logic — add days alongside
        if (!fld.condition.days) fld.condition.days = [];
      }
      const days = fld.condition.days || (fld.condition.days = []);
      const idx = days.indexOf(dayIndex);
      if (idx === -1) days.push(dayIndex);
      else days.splice(idx, 1);
      if (days.length === 0) delete fld.condition.days;
      if (!fld.condition.days && !fld.condition.field_id) fld.condition = null;
    }
    renderBuilder();
    return;
  }

  // Save template (in-memory only per D-11)
  if (e.target.closest('#save-btn')) {
    showToast('Checklist saved ✓');
    return;
  }

  // New template button
  if (e.target.closest('.btn-primary') && state.view === 'list') {
    openEditor(null);
    return;
  }
});

// Input delegation — real-time field text updates without cursor jump
document.getElementById('builder-body').addEventListener('input', function(e) {
  const secId = e.target.dataset.sectionId;
  const fldId = e.target.dataset.fieldId;
  if (!secId || !fldId) return;

  if (e.target.classList.contains('fld-label')) {
    updateField(secId, fldId, { label: e.target.value });
    return;
  }

  if (e.target.classList.contains('fld-temp-min')) {
    const sec = state.activeTemplate.sections.find(s => s.id === secId);
    const fld = sec && sec.fields.find(f => f.id === fldId);
    if (fld) {
      updateField(secId, fldId, {
        config: Object.assign({}, fld.config, { min: +e.target.value }),
        fail_trigger: fld.fail_trigger ? Object.assign({}, fld.fail_trigger, { min: +e.target.value }) : fld.fail_trigger
      });
    }
    return;
  }

  if (e.target.classList.contains('fld-temp-max')) {
    const sec = state.activeTemplate.sections.find(s => s.id === secId);
    const fld = sec && sec.fields.find(f => f.id === fldId);
    if (fld) {
      updateField(secId, fldId, {
        config: Object.assign({}, fld.config, { max: +e.target.value }),
        fail_trigger: fld.fail_trigger ? Object.assign({}, fld.fail_trigger, { max: +e.target.value }) : fld.fail_trigger
      });
    }
    return;
  }
});

// Change delegation — attached ONCE
document.getElementById('builder-body').addEventListener('change', function(e) {
  // Template name input
  if (e.target.id === 'tpl-name-input') {
    updateTemplateName(e.target.value);
    return;
  }

  // Requires approval toggle
  if (e.target.id === 'approval-toggle') {
    toggleApproval();
    return;
  }

  // Photo required toggle
  if (e.target.classList.contains('fld-photo-required')) {
    const secId = e.target.dataset.sectionId;
    const fldId = e.target.dataset.fieldId;
    if (secId && fldId) {
      updateField(secId, fldId, { required: e.target.checked });
      renderBuilder();
    }
    return;
  }

  // Skip logic — field selector
  if (e.target.classList.contains('skip-field-select')) {
    const select = e.target;
    const fldId = select.dataset.fieldId;
    const secId = select.dataset.sectionId;
    const sec = state.activeTemplate.sections.find(s => s.id === secId);
    const fld = sec.fields.find(f => f.id === fldId);
    if (select.value) {
      if (!fld.condition) fld.condition = {};
      fld.condition.field_id = select.value;
      fld.condition.operator = 'equals';
      delete fld.condition.value; // Reset value when field changes
    } else {
      // Clear skip logic but preserve days
      if (fld.condition) {
        delete fld.condition.field_id;
        delete fld.condition.operator;
        delete fld.condition.value;
        if (!fld.condition.days) fld.condition = null;
      }
    }
    renderBuilder();
    return;
  }

  // Skip logic — value selector
  if (e.target.classList.contains('skip-value-select')) {
    const select = e.target;
    const fldId = select.dataset.fieldId;
    const secId = select.dataset.sectionId;
    const sec = state.activeTemplate.sections.find(s => s.id === secId);
    const fld = sec.fields.find(f => f.id === fldId);
    fld.condition.value = JSON.parse(select.value);
    // No re-render needed — just state update
    return;
  }
});

const CURRENT_USER = { name: MOCK_CURRENT_USER.name, initials: 'JM' };
const MOCK_RESPONSES = {}; // { [fieldId]: { value: any, answeredBy: string, answeredAt: Date } }
const FAIL_NOTES = {}; // { [fieldId]: { note: string, severity: string } }
const SUBMITTED_TEMPLATES = {}; // { [tplId]: true }
const PENDING_APPROVALS = {}; // { [tplId]: { tplId, tplName, submittedBy, responses, failNotes, ... } }
const APPROVED_SUBMISSIONS = {}; // { [tplId]: { ...entry, approvedBy, approvedAt } }
const REJECTED_SUBMISSIONS = {}; // { [tplId]: { ...entry, rejectedBy, rejectedAt, rejectedItems } }
const REJECTION_FLAGS = {}; // { [fldId]: { comment, requirePhoto } } — flags on the live checklist

// Named mutation helpers (used inline in event handlers and referenced by name for traceability)
function clearRejectionFlag(fldId) { if (REJECTION_FLAGS[fldId]) delete REJECTION_FLAGS[fldId]; }

function setYesNo(fldId, value) {
  clearRejectionFlag(fldId);
  MOCK_RESPONSES[fldId] = { value: value, answeredBy: CURRENT_USER.name, answeredAt: new Date() };
  if (!value) { if (!FAIL_NOTES[fldId]) FAIL_NOTES[fldId] = { note: '', severity: '' }; }
  else { if (FAIL_NOTES[fldId]) delete FAIL_NOTES[fldId]; }
}
function setTextAnswer(fldId, value) {
  // text-input handler — no re-render (cursor jump prevention)
  if (value.trim()) MOCK_RESPONSES[fldId] = { value: value.trim(), answeredBy: CURRENT_USER.name, answeredAt: new Date() };
  else delete MOCK_RESPONSES[fldId];
}
function setFailNote(fldId, patch) {
  if (!FAIL_NOTES[fldId]) FAIL_NOTES[fldId] = { note: '', severity: '' };
  Object.assign(FAIL_NOTES[fldId], patch);
}
function setSeverity(fldId, severity) {
  if (!FAIL_NOTES[fldId]) FAIL_NOTES[fldId] = { note: '', severity: '' };
  FAIL_NOTES[fldId].severity = severity;
}
function submitChecklist(tplId) {
  var tpl = MOCK_TEMPLATES.find(function(t) { return t.id === tplId; });
  if (tpl && tpl.requires_approval) {
    var allFields = tpl.sections.flatMap(function(s) { return s.fields; });
    var answeredCount = allFields.filter(function(f) { return MOCK_RESPONSES[f.id] !== undefined; }).length;
    var photoCount = allFields.filter(function(f) { return f.type === 'photo' && MOCK_RESPONSES[f.id]; }).length;
    var failCount = Object.keys(FAIL_NOTES).filter(function(k) { return allFields.some(function(f) { return f.id === k; }); }).length;
    PENDING_APPROVALS[tplId] = {
      tplId: tplId, tplName: tpl.name,
      submittedBy: CURRENT_USER.name, submittedAt: new Date().toISOString(),
      totalFields: allFields.length, answeredCount: answeredCount,
      failCount: failCount, photoCount: photoCount,
      responses: Object.assign({}, MOCK_RESPONSES),
      failNotes: Object.assign({}, FAIL_NOTES)
    };
  } else {
    SUBMITTED_TEMPLATES[tplId] = true;
  }
}

function handlePhotoCaptureClick(fldId) {
  openCamera(function(file) {
    var objectURL = URL.createObjectURL(file);
    clearRejectionFlag(fldId);
    var old = MOCK_RESPONSES[fldId];
    if (old && old.value && typeof old.value === 'string' && old.value.startsWith('blob:') && old.value !== objectURL) URL.revokeObjectURL(old.value);
    MOCK_RESPONSES[fldId] = { value: objectURL, answeredBy: CURRENT_USER.name, answeredAt: new Date() };
    renderFillOut();
    updateProgress();
  });
}

function handleFailPhotoCaptureClick(fldId) {
  openCamera(function(file) {
    var objectURL = URL.createObjectURL(file);
    if (!FAIL_NOTES[fldId]) FAIL_NOTES[fldId] = { note: '', severity: '' };
    var oldPhoto = FAIL_NOTES[fldId].photo;
    if (oldPhoto && oldPhoto.startsWith('blob:') && oldPhoto !== objectURL) URL.revokeObjectURL(oldPhoto);
    FAIL_NOTES[fldId].photo = objectURL;
    var failCard = document.querySelector('.fail-card[data-fld-id="' + fldId + '"]');
    var tplField = fillState.activeTemplate.sections.flatMap(function(s){return s.fields}).find(function(f){return f.id===fldId});
    if (failCard && tplField) {
      var tmp = document.createElement('div');
      tmp.innerHTML = renderFailCard(tplField, FAIL_NOTES[fldId]);
      failCard.replaceWith(tmp.firstChild);
    }
  });
}

function evaluateFailTrigger(fail_trigger, value) {
  if (!fail_trigger) return false;
  if (value === null || value === undefined || value === '') return false;
  if (fail_trigger.type === 'out_of_range') {
    var num = parseFloat(value);
    if (isNaN(num)) return false;
    var hasMin = fail_trigger.min !== undefined && fail_trigger.min !== null;
    var hasMax = fail_trigger.max !== undefined && fail_trigger.max !== null;
    if (hasMin && hasMax) return num < fail_trigger.min || num > fail_trigger.max;
    if (hasMin) return num < fail_trigger.min;
    if (hasMax) return num > fail_trigger.max;
  }
  return false;
}

function renderFailCard(fld, failNote) {
  var note = failNote ? failNote.note || '' : '';
  var severity = failNote ? failNote.severity || '' : '';
  var severities = ['minor', 'major', 'critical'];
  var pillsHtml = severities.map(function(s) {
    return '<button class="severity-pill' + (severity === s ? ' on' : '') + '" data-action="set-severity" data-severity="' + s + '" data-fld-id="' + fld.id + '">' + s.charAt(0).toUpperCase() + s.slice(1) + '</button>';
  }).join('');
  var failPhoto = (FAIL_NOTES[fld.id] && FAIL_NOTES[fld.id].photo) ? FAIL_NOTES[fld.id].photo : null;
  var photoHtml = failPhoto
    ? '<img class="photo-thumb" src="' + failPhoto + '" alt="Evidence photo"><button class="photo-retake-link" data-action="fail-photo-retake" data-fld-id="' + fld.id + '">Retake</button>'
    : '<button class="photo-stub-btn" data-action="fail-photo-capture" data-fld-id="' + fld.id + '">\ud83d\udcf7 Add photo</button>';
  return '<div class="fail-card" data-fld-id="' + fld.id + '">' +
    '<div style="font-size:12px;font-weight:500;color:#c0392b;margin-bottom:8px">Corrective action required</div>' +
    '<textarea class="fail-note-input" rows="3" placeholder="Describe what you did\u2026" data-action="fail-note-input" data-fld-id="' + fld.id + '">' + escapeHtml(note) + '</textarea>' +
    '<div style="margin-top:8px;display:flex;align-items:center;gap:8px">' +
      photoHtml +
    '</div>' +
    '<div class="severity-pills">' + pillsHtml + '</div>' +
  '</div>';
}

let fillState = {
  view: 'list',
  activeTemplate: null
};

function getTodayTemplates() {
  const today = new Date().getDay(); // 0=Sun, 1=Mon, ..., 6=Sat
  return MOCK_TEMPLATES.filter(tpl => {
    if (!tpl.active_days || tpl.active_days.length === 0) return true;
    return tpl.active_days.includes(today);
  });
}

function renderFillOut() {
  const body = document.getElementById('fill-body');
  if (!body) return;
  if (fillState.view === 'list') {
    body.innerHTML = renderChecklistList();
  } else {
    body.innerHTML = renderRunner();
    attachRunnerListeners();
  }
}

function renderApprovals() {
  var body = document.getElementById('approvals-body');
  if (!body) return;
  var keys = Object.keys(PENDING_APPROVALS);
  if (keys.length === 0) {
    body.innerHTML = '<div class="empty-state"><h2>No pending approvals.</h2><p>All submitted checklists have been reviewed.</p></div>';
    return;
  }
  body.innerHTML = keys.map(function(tplId) {
    var entry = PENDING_APPROVALS[tplId];
    var tpl = MOCK_TEMPLATES.find(function(t){return t.id===tplId});
    if (!tpl) return '';
    // Build item list from template fields
    var itemsHtml = tpl.sections.map(function(sec) {
      var secItems = sec.fields.map(function(fld) {
        var resp = entry.responses[fld.id];
        var answered = resp !== undefined;
        var isRejected = entry._rejectedItems && entry._rejectedItems[fld.id];
        var rejectForm = isRejected ?
          '<div class="reject-item-form">' +
          '<textarea class="reject-item-input" data-reject-fld="' + fld.id + '" placeholder="Comment for crew\u2026" rows="2">' + escapeHtml(entry._rejectedItems[fld.id].comment || '') + '</textarea>' +
          '<label class="require-photo-toggle"><input type="checkbox" data-reject-photo-fld="' + fld.id + '" ' + (entry._rejectedItems[fld.id].requirePhoto ? 'checked' : '') + '> Require photo evidence</label></div>' : '';
        return '<div class="review-item">' +
          '<span class="review-check">' + (answered ? '✓' : '○') + '</span>' +
          '<span class="review-label">' + escapeHtml(fld.label || fld.type) + '</span>' +
          '<button class="review-reject-btn ' + (isRejected ? 'selected' : '') + '" data-action="toggle-reject-item" data-tpl-id="' + tplId + '" data-fld-id="' + fld.id + '">' + (isRejected ? 'Flagged' : 'Flag') + '</button>' +
          '</div>' + rejectForm;
      }).join('');
      return '<div class="cat" style="font-size:11px;padding:6px 16px">' + escapeHtml(sec.title) + '</div>' + secItems;
    }).join('');
    var rejCount = entry._rejectedItems ? Object.keys(entry._rejectedItems).length : 0;
    return '<div class="approval-card card" data-tpl-id="' + tplId + '">' +
      '<div class="hd"><h1>' + escapeHtml(entry.tplName) + '</h1>' +
      '<div class="sub">' + escapeHtml(entry.submittedBy) + ' · ' + formatTime(new Date(entry.submittedAt)) + '</div></div>' +
      itemsHtml +
      '<div class="approval-actions" style="padding:16px;margin-top:16px;background:var(--bg);border-radius:0 0 12px 12px">' +
      '<button class="btn-approve" data-action="approve" data-tpl-id="' + tplId + '">Approve</button>' +
      '<button class="btn-reject" data-action="reject-submit" data-tpl-id="' + tplId + '" style="margin-top:8px">' + (rejCount > 0 ? 'Reject ' + rejCount + ' item' + (rejCount > 1 ? 's' : '') : 'Reject') + '</button>' +
      '</div></div>';
  }).join('');
}

function renderChecklistList() {
  const today = getTodayTemplates();
  if (today.length === 0) {
    return `<div class="empty-state"><h2>No checklists today</h2><p>Check back tomorrow or contact your manager.</p></div>`;
  }
  var totalFields = 0, totalAnswered = 0;
  const rows = today.map(tpl => {
    const secCount = tpl.sections.length;
    const fields = tpl.sections.flatMap(s => s.fields);
    const fieldCount = fields.length;
    const answeredCount = fields.filter(f => MOCK_RESPONSES[f.id] !== undefined).length;
    totalFields += fieldCount;
    totalAnswered += answeredCount;
    const pct = fieldCount ? Math.round(answeredCount / fieldCount * 100) : 0;
    const pendingBadge = PENDING_APPROVALS[tpl.id] ? '<div class="approval-badge">Pending Approval</div>' : '';
    const submittedBadge = SUBMITTED_TEMPLATES[tpl.id] ? '<div style="font-size:12px;color:#27ae60;margin-top:4px;font-weight:500">Submitted \u2713</div>' : '';
    return `<div class="row" data-fill-template-id="${tpl.id}" style="cursor:pointer"><div style="flex:1"><div class="nm">${escapeHtml(tpl.name)}</div><div class="mt">${secCount} section${secCount !== 1 ? 's' : ''} · ${answeredCount}/${fieldCount} items</div><div style="height:4px;background:var(--brd);border-radius:2px;margin-top:6px;overflow:hidden"><div style="height:100%;background:#27ae60;border-radius:2px;width:${pct}%"></div></div>${pendingBadge}${submittedBadge}</div></div>`;
  }).join('');
  const aggPct = totalFields ? Math.round(totalAnswered / totalFields * 100) : 0;
  return `<div class="cat">TODAY'S CHECKLISTS</div>
<div style="padding:8px 16px 12px">
  <div style="height:8px;background:var(--brd);border-radius:4px;overflow:hidden"><div style="height:100%;background:#27ae60;border-radius:4px;width:${aggPct}%;transition:width .3s"></div></div>
  <div style="font-size:12px;color:var(--mut);margin-top:4px">${totalAnswered} of ${totalFields} items complete across ${today.length} checklist${today.length !== 1 ? 's' : ''}</div>
</div>
<div class="card">${rows}</div>`;
}

function renderRunner() {
  const tpl = fillState.activeTemplate;
  clearHiddenFieldAnswers();
  const visibleFields = tpl.sections.filter(s => isSectionVisible(s)).flatMap(s => s.fields.filter(f => isFieldVisible(f)));
  const answered = visibleFields.filter(f => MOCK_RESPONSES[f.id] !== undefined).length;
  const allFields = visibleFields;
  const sectionsHtml = tpl.sections.map(sec => renderRunnerSection(sec)).join('');
  const isSubmitted = !!SUBMITTED_TEMPLATES[tpl.id];
  const isPending = !!PENDING_APPROVALS[tpl.id];
  const submitHtml = isSubmitted
    ? `<button class="btn-primary" data-action="submit" data-tpl-id="${tpl.id}" style="width:100%;padding:14px;margin:16px 0;background:var(--info-tx);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;opacity:0.5;pointer-events:none">Submit checklist</button><span class="submit-confirm">Checklist submitted. Thanks, ${CURRENT_USER.initials}!</span>`
    : isPending
      ? `<button class="btn-primary" data-action="submit" data-tpl-id="${tpl.id}" style="width:100%;padding:14px;margin:16px 0;background:var(--info-tx);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;opacity:0.5;pointer-events:none">Submit checklist</button><span class="submit-confirm">Submitted for approval. Waiting for manager review.</span>`
      : `<button class="btn-primary" id="submit-btn" data-action="submit" data-tpl-id="${tpl.id}" style="margin-top:8px">Submit checklist</button>`;
  return `<button class="editor-back" id="fill-back">Checklists</button>
<div style="padding:10px 16px 0" class="progress-line">
  <div style="height:6px;background:var(--brd);border-radius:3px;overflow:hidden;margin-bottom:6px"><div style="height:100%;background:#27ae60;border-radius:3px;width:${allFields.length?Math.round(answered/allFields.length*100):0}%;transition:width .3s"></div></div>
  <div style="font-size:13px;color:var(--mut)">${answered} of ${allFields.length} items complete</div>
</div>
${sectionsHtml}
${submitHtml}`;
}

function isSectionVisible(sec) {
  if (!sec.condition || !sec.condition.days || sec.condition.days.length === 0) return true;
  return sec.condition.days.includes(new Date().getDay());
}

function isFieldVisible(fld) {
  // Day-of-week check
  if (fld.condition && fld.condition.days && fld.condition.days.length > 0) {
    if (!fld.condition.days.includes(new Date().getDay())) return false;
  }
  // Skip logic check
  if (fld.condition && fld.condition.field_id) {
    var depResp = MOCK_RESPONSES[fld.condition.field_id];
    if (!depResp) return false; // dependent field not answered yet — hide
    var depVal = String(depResp.value);
    var expected = String(fld.condition.value);
    if (fld.condition.operator === 'equals' && depVal !== expected) return false;
    if (fld.condition.operator === 'not_equals' && depVal === expected) return false;
  }
  return true;
}

function clearHiddenFieldAnswers() {
  if (!fillState.activeTemplate) return;
  fillState.activeTemplate.sections.forEach(function(sec) {
    if (!isSectionVisible(sec)) {
      sec.fields.forEach(function(f) { delete MOCK_RESPONSES[f.id]; delete FAIL_NOTES[f.id]; });
    } else {
      sec.fields.forEach(function(f) {
        if (!isFieldVisible(f)) { delete MOCK_RESPONSES[f.id]; delete FAIL_NOTES[f.id]; }
      });
    }
  });
}

function renderRunnerSection(sec) {
  if (!isSectionVisible(sec)) return '';
  const fieldsHtml = sec.fields.map(f => isFieldVisible(f) ? renderRunnerField(f) : '').join('');
  if (!fieldsHtml) return '';
  return `<div class="sec-hd"><span>${escapeHtml(sec.title)}</span></div><div class="card">${fieldsHtml}</div>`;
}

function renderRunnerField(fld) {
  const answered = MOCK_RESPONSES[fld.id] !== undefined;
  const resp = answered ? MOCK_RESPONSES[fld.id] : null;
  const attribution = answered ? `<div class="fill-attribution">${escapeHtml(resp.answeredBy)} · ${formatTime(resp.answeredAt)}</div>` : '';
  const rejFlag = REJECTION_FLAGS[fld.id];
  const photoNeeded = rejFlag && rejFlag.requirePhoto && (!resp || !resp.value || typeof resp.value !== 'string' || !resp.value.startsWith('blob:'));
  const correctionBanner = rejFlag ? `<div class="correction-banner">⚠ Rejected: ${escapeHtml(rejFlag.comment)}${photoNeeded ? ' · 📷 Photo required before resubmit' : rejFlag.requirePhoto ? ' · ✓ Photo uploaded' : ''}</div>` : '';

  if (fld.type === 'checkbox') {
    return `<div class="fill-field" data-field-id="${fld.id}">
  ${correctionBanner}
  <div class="fill-field-row">
    <div class="fill-field-label" style="margin-bottom:0">${escapeHtml(fld.label)}</div>
    <button class="check-btn ${answered ? 'checked' : ''}" data-field-id="${fld.id}" aria-label="Toggle checkbox">${answered ? '✓' : ''}</button>
  </div>
  ${attribution}
</div>`;
  }

  if (fld.type === 'yes_no') {
    const isYes = answered && resp.value === true;
    const isNo = answered && resp.value === false;
    const failCard = isNo ? renderFailCard(fld, FAIL_NOTES[fld.id] || null) : '';
    return `<div class="fill-field" data-field-id="${fld.id}">
  ${correctionBanner}
  <div class="fill-field-label">${escapeHtml(fld.label)}</div>
  <div class="yn-pills">
    <button class="yn-pill${isYes ? ' on' : ''}" data-action="set-yes" data-fld-id="${fld.id}">Yes</button>
    <button class="yn-pill${isNo ? ' on' : ''}" data-action="set-no" data-fld-id="${fld.id}">No</button>
  </div>
  ${attribution}
</div>${failCard}`;
  }

  if (fld.type === 'text') {
    return `<div class="fill-field" data-field-id="${fld.id}">
  ${correctionBanner}
  <label class="fill-field-label" for="txt-${fld.id}">${escapeHtml(fld.label)}</label>
  <textarea id="txt-${fld.id}" class="fill-textarea" data-action="text-input" data-fld-id="${fld.id}" data-field-id="${fld.id}" rows="3" placeholder="Enter notes...">${answered ? escapeHtml(resp.value) : ''}</textarea>
  ${attribution}
</div>`;
  }

  if (fld.type === 'temperature') {
    const tempVal = answered ? resp.value : '';
    const isFail = evaluateFailTrigger(fld.fail_trigger, tempVal);
    const warnLabel = isFail && fld.fail_trigger
      ? `<span class="temp-warn">Out of range (${fld.fail_trigger.min}\u2013${fld.fail_trigger.max}\u00b0F)</span>`
      : '';
    const failCard = isFail ? renderFailCard(fld, FAIL_NOTES[fld.id] || null) : '';
    return `<div class="fill-field" data-field-id="${fld.id}">
  ${correctionBanner}
  <label class="fill-field-label" for="temp-${fld.id}">${escapeHtml(fld.label)}</label>
  <div class="temp-input-row" style="padding-left:0;padding-right:0">
    <input type="number" id="temp-${fld.id}" class="fill-temp-input" data-action="temp-input" data-fld-id="${fld.id}" data-field-id="${fld.id}" value="${tempVal}" placeholder="0" style="width:80px;padding:10px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:18px;color:var(--txt);font-family:inherit;outline:none;-webkit-appearance:none">
    <span class="temp-unit" style="font-size:14px;color:var(--mut);margin-left:4px">°F</span>
  </div>
  ${warnLabel}
  ${attribution}
</div>${failCard}`;
  }

  if (fld.type === 'photo') {
    const photoResp = MOCK_RESPONSES[fld.id];
    const photoUrl = photoResp ? photoResp.value : null;
    const photoAttribution = photoResp ? `<div class="fill-attribution">${escapeHtml(photoResp.answeredBy)} \u00b7 ${formatTime(photoResp.answeredAt)}</div>` : '';
    if (photoUrl) {
      return `<div class="fill-field" data-field-id="${fld.id}">
  ${correctionBanner}
  <div class="fill-field-label">${escapeHtml(fld.label)}</div>
  <div class="fill-field-row" style="gap:12px;margin-top:4px">
    <img class="photo-thumb" src="${photoUrl}" alt="Photo">
    <button class="photo-retake-link" data-action="photo-retake" data-fld-id="${fld.id}">Retake</button>
  </div>
  ${photoAttribution}
</div>`;
    }
    return `<div class="fill-field" data-field-id="${fld.id}">
  ${correctionBanner}
  <div class="fill-field-label">${escapeHtml(fld.label)}</div>
  <button class="photo-capture-btn" data-action="photo-capture" data-fld-id="${fld.id}" style="margin-top:4px">\ud83d\udcf7 Tap to take photo</button>
  <div style="font-size:12px;color:var(--mut);margin-top:4px">Tap to take photo</div>
</div>`;
  }

  return `<div class="fill-field" data-field-id="${fld.id}"><div class="fill-field-label">${escapeHtml(fld.label)}</div></div>`;
}

function attachRunnerListeners() {
  // Text textarea: save on blur, no re-render
  document.querySelectorAll('.fill-textarea').forEach(el => {
    el.addEventListener('blur', function() {
      const fldId = this.dataset.fieldId;
      if (this.value.trim()) {
        MOCK_RESPONSES[fldId] = { value: this.value.trim(), answeredBy: CURRENT_USER.name, answeredAt: new Date() };
      } else {
        delete MOCK_RESPONSES[fldId];
      }
      updateProgress();
    });
  });
  // Temperature: handled by input delegation — no blur listener needed
}

function updateProgress() {
  if (!fillState.activeTemplate) return;
  const allFields = fillState.activeTemplate.sections.filter(s => isSectionVisible(s)).flatMap(s => s.fields.filter(f => isFieldVisible(f)));
  const answered = allFields.filter(f => MOCK_RESPONSES[f.id] !== undefined).length;
  const el = document.querySelector('#fill-body .progress-line');
  if (el) {
    var pct = allFields.length ? Math.round(answered / allFields.length * 100) : 0;
    el.innerHTML = '<div style="height:6px;background:var(--brd);border-radius:3px;overflow:hidden;margin-bottom:6px"><div style="height:100%;background:#27ae60;border-radius:3px;width:' + pct + '%;transition:width .3s"></div></div><div style="font-size:13px;color:var(--mut)">' + answered + ' of ' + allFields.length + ' items complete</div>';
  }
}

document.getElementById('fill-body').addEventListener('click', function(e) {
  // Checklist list row → open runner
  const fillRow = e.target.closest('[data-fill-template-id]');
  if (fillRow) {
    const tpl = MOCK_TEMPLATES.find(t => t.id === fillRow.dataset.fillTemplateId);
    if (tpl) {
      fillState.activeTemplate = tpl;
      fillState.view = 'runner';
      location.hash = 'checklist=' + tpl.id;
      renderFillOut();
    }
    return;
  }

  // Back button in runner
  if (e.target.closest('#fill-back')) {
    fillState.view = 'list';
    fillState.activeTemplate = null;
    location.hash = '';
    renderFillOut();
    return;
  }

  // Checkbox button
  const checkBtn = e.target.closest('.check-btn');
  if (checkBtn) {
    const fldId = checkBtn.dataset.fieldId;
    if (MOCK_RESPONSES[fldId]) {
      delete MOCK_RESPONSES[fldId];
    } else {
      clearRejectionFlag(fldId);
      MOCK_RESPONSES[fldId] = { value: true, answeredBy: CURRENT_USER.name, answeredAt: new Date() };
    }
    const fieldDiv = document.querySelector(`.fill-field[data-field-id="${fldId}"]`);
    const tplField = fillState.activeTemplate.sections.flatMap(s => s.fields).find(f => f.id === fldId);
    if (fieldDiv && tplField) fieldDiv.outerHTML = renderRunnerField(tplField);
    updateProgress();
    return;
  }

  // data-action routing
  const actionEl = e.target.closest('[data-action]');
  if (actionEl) {
    const action = actionEl.dataset.action;
    const fldId = actionEl.dataset.fldId;

    if (action === 'set-yes') {
      clearRejectionFlag(fldId);
      MOCK_RESPONSES[fldId] = { value: true, answeredBy: CURRENT_USER.name, answeredAt: new Date() };
      if (FAIL_NOTES[fldId]) delete FAIL_NOTES[fldId];
      const fieldDiv = document.querySelector(`.fill-field[data-field-id="${fldId}"]`);
      const tplField = fillState.activeTemplate.sections.flatMap(s => s.fields).find(f => f.id === fldId);
      if (fieldDiv && tplField) {
        // replace field AND any adjacent fail-card
        var next = fieldDiv.nextElementSibling;
        if (next && next.classList.contains('fail-card')) next.remove();
        fieldDiv.outerHTML = renderRunnerField(tplField);
      }
      updateProgress();
      return;
    }

    if (action === 'set-no') {
      clearRejectionFlag(fldId);
      MOCK_RESPONSES[fldId] = { value: false, answeredBy: CURRENT_USER.name, answeredAt: new Date() };
      if (!FAIL_NOTES[fldId]) FAIL_NOTES[fldId] = { note: '', severity: '' };
      const fieldDiv = document.querySelector(`.fill-field[data-field-id="${fldId}"]`);
      const tplField = fillState.activeTemplate.sections.flatMap(s => s.fields).find(f => f.id === fldId);
      if (fieldDiv && tplField) {
        var next = fieldDiv.nextElementSibling;
        if (next && next.classList.contains('fail-card')) next.remove();
        fieldDiv.outerHTML = renderRunnerField(tplField);
      }
      updateProgress();
      return;
    }

    if (action === 'set-severity') {
      const severity = actionEl.dataset.severity;
      if (!FAIL_NOTES[fldId]) FAIL_NOTES[fldId] = { note: '', severity: '' };
      FAIL_NOTES[fldId].severity = severity;
      // Re-render just the fail card
      const failCard = e.target.closest('.fail-card');
      if (failCard) {
        const tplField = fillState.activeTemplate.sections.flatMap(s => s.fields).find(f => f.id === fldId);
        if (tplField) {
          const tmp = document.createElement('div');
          tmp.innerHTML = renderFailCard(tplField, FAIL_NOTES[fldId]);
          failCard.replaceWith(tmp.firstChild);
        }
      }
      return;
    }

    if (action === 'photo-capture' || action === 'photo-retake') {
      handlePhotoCaptureClick(fldId);
      return;
    }

    if (action === 'fail-photo-capture' || action === 'fail-photo-retake') {
      handleFailPhotoCaptureClick(fldId);
      return;
    }

    if (action === 'submit') {
      const tplId = actionEl.dataset.tplId;
      if (SUBMITTED_TEMPLATES[tplId] || PENDING_APPROVALS[tplId]) return;
      // Enforce required photos from rejection flags
      var missingPhotos = Object.keys(REJECTION_FLAGS).filter(function(fid) {
        var flag = REJECTION_FLAGS[fid];
        if (!flag.requirePhoto) return false;
        var resp = MOCK_RESPONSES[fid];
        return !resp || !resp.value || typeof resp.value !== 'string' || !resp.value.startsWith('blob:');
      });
      if (missingPhotos.length > 0) {
        showToast('Photo required for ' + missingPhotos.length + ' flagged item(s)');
        return;
      }
      var tplForSubmit = MOCK_TEMPLATES.find(function(t){return t.id===tplId});
      var allFlds = fillState.activeTemplate.sections.filter(function(s){return isSectionVisible(s)}).flatMap(function(s){return s.fields.filter(function(f){return isFieldVisible(f)})});
      var allDone = allFlds.every(function(f){return MOCK_RESPONSES[f.id] !== undefined});
      var isApproval = tplForSubmit && tplForSubmit.requires_approval;
      if (isApproval) {
        submitChecklist(tplId);
      } else {
        SUBMITTED_TEMPLATES[tplId] = true;
      }
      var toastMsg = isApproval ? 'Submitted for approval' : 'Checklist submitted. Thanks, ' + CURRENT_USER.initials + '!';
      if (allDone) {
        fireworks();
        setTimeout(function(){
          showToast(toastMsg);
          fillState.view = 'list'; fillState.activeTemplate = null; location.hash = '';
          renderFillOut();
        }, 2500);
      } else {
        showToast(toastMsg);
        fillState.view = 'list'; fillState.activeTemplate = null; location.hash = '';
        renderFillOut();
      }
      return;
    }
  }

  // Legacy yes/no buttons (yn-btn class — keep for backward compat if any remain)
  const ynBtn = e.target.closest('.yn-btn');
  if (ynBtn) {
    const fldId = ynBtn.dataset.fieldId;
    const val = ynBtn.dataset.value === 'true';
    MOCK_RESPONSES[fldId] = { value: val, answeredBy: CURRENT_USER.name, answeredAt: new Date() };
    const fieldDiv = document.querySelector(`.fill-field[data-field-id="${fldId}"]`);
    const tplField = fillState.activeTemplate.sections.flatMap(s => s.fields).find(f => f.id === fldId);
    if (fieldDiv && tplField) fieldDiv.outerHTML = renderRunnerField(tplField);
    updateProgress();
    return;
  }

  // Legacy submit button
  if (e.target.closest('#submit-btn') && !e.target.closest('[data-action]')) {
    var allFlds2 = fillState.activeTemplate.sections.flatMap(function(s){return s.fields});
    var allDone2 = allFlds2.every(function(f){return MOCK_RESPONSES[f.id] !== undefined});
    if (allDone2) {
      fireworks();
      setTimeout(function(){
        showToast('Checklist submitted \u2713');
        fillState.view = 'list';
        fillState.activeTemplate = null;
        location.hash = '';
        renderFillOut();
      }, 2500);
    } else {
      showToast('Checklist submitted \u2713');
      fillState.view = 'list';
      fillState.activeTemplate = null;
      location.hash = '';
      renderFillOut();
    }
    return;
  }
});

// Fill-body input delegation
document.getElementById('fill-body').addEventListener('input', function(e) {
  const actionEl = e.target.closest('[data-action]');
  if (!actionEl) return;
  const action = actionEl.dataset.action;
  const fldId = actionEl.dataset.fldId || actionEl.dataset.fieldId;

  if (action === 'text-input') {
    setTextAnswer(fldId, e.target.value); // NO re-render
    updateProgress();
    return;
  }

  if (action === 'temp-input') {
    // Update state without re-render first
    const val = e.target.value;
    if (val !== '') {
      MOCK_RESPONSES[fldId] = { value: +val, answeredBy: CURRENT_USER.name, answeredAt: new Date() };
    } else {
      delete MOCK_RESPONSES[fldId];
    }
    // Re-render to show/hide fail card and warn label
    const pos = e.target.selectionStart;
    renderFillOut();
    // Restore focus + cursor
    const el = document.querySelector('[data-action="temp-input"][data-fld-id="' + fldId + '"]');
    if (el) { el.focus(); try { el.setSelectionRange(pos, pos); } catch(x){} }
    updateProgress();
    return;
  }

  if (action === 'fail-note-input') {
    setFailNote(fldId, { note: e.target.value }); // NO re-render — cursor jump prevention
    return;
  }
});

// ─── Approvals Tab ────────────────────────────────────────────────────────────

document.getElementById('approvals-body').addEventListener('click', function(e) {
  var actionEl = e.target.closest('[data-action]');
  if (!actionEl) return;
  var action = actionEl.dataset.action;

  if (action === 'approve') {
    var tplId = actionEl.dataset.tplId;
    var entry = PENDING_APPROVALS[tplId];
    if (!entry) return;
    APPROVED_SUBMISSIONS[tplId] = Object.assign({}, entry, {
      approvedBy: MOCK_CURRENT_USER.name, approvedAt: new Date().toISOString()
    });
    delete PENDING_APPROVALS[tplId];
    SUBMITTED_TEMPLATES[tplId] = true;
    showToast('Approved ✓');
    renderApprovals();
    renderFillOut();
    return;
  }

  if (action === 'toggle-reject-item') {
    var tplId = actionEl.dataset.tplId;
    var fldId = actionEl.dataset.fldId;
    var entry = PENDING_APPROVALS[tplId];
    if (!entry) return;
    if (!entry._rejectedItems) entry._rejectedItems = {};
    if (entry._rejectedItems[fldId]) {
      delete entry._rejectedItems[fldId];
    } else {
      entry._rejectedItems[fldId] = { comment: '', requirePhoto: false };
    }
    renderApprovals();
    return;
  }

  if (action === 'reject-submit') {
    var tplId = actionEl.dataset.tplId;
    var entry = PENDING_APPROVALS[tplId];
    if (!entry || !entry._rejectedItems || Object.keys(entry._rejectedItems).length === 0) {
      showToast('Flag at least one item to reject');
      return;
    }
    // Collect comments from textareas
    var card = actionEl.closest('.approval-card');
    card.querySelectorAll('.reject-item-input').forEach(function(ta) {
      var fid = ta.dataset.rejectFld;
      if (entry._rejectedItems[fid]) entry._rejectedItems[fid].comment = ta.value.trim();
    });
    card.querySelectorAll('[data-reject-photo-fld]').forEach(function(cb) {
      var fid = cb.dataset.rejectPhotoFld;
      if (entry._rejectedItems[fid]) entry._rejectedItems[fid].requirePhoto = cb.checked;
    });
    // Check all flagged items have a comment
    var missing = Object.keys(entry._rejectedItems).filter(function(fid) {
      return !entry._rejectedItems[fid].comment;
    });
    if (missing.length > 0) {
      missing.forEach(function(fid) {
        var ta = card.querySelector('[data-reject-fld="' + fid + '"]');
        if (ta) ta.style.borderColor = '#c0392b';
      });
      showToast('Add a comment for each flagged item');
      return;
    }
    // Apply rejection: uncheck flagged items, set correction flags
    Object.keys(entry._rejectedItems).forEach(function(fid) {
      var rej = entry._rejectedItems[fid];
      delete MOCK_RESPONSES[fid];
      delete FAIL_NOTES[fid];
      REJECTION_FLAGS[fid] = { comment: rej.comment, requirePhoto: rej.requirePhoto };
    });
    delete PENDING_APPROVALS[tplId];
    delete SUBMITTED_TEMPLATES[tplId];
    showToast('Rejected — crew must fix ' + Object.keys(entry._rejectedItems).length + ' item(s)');
    renderApprovals();
    renderFillOut();
    return;
  }
});

// ─── Tab switching ────────────────────────────────────────────────────────────

function show(n) {
  [1, 2, 3].forEach(function(i) {
    var sec = document.getElementById('s' + i);
    if (sec) sec.style.display = i === n ? 'block' : 'none';
    var btn = document.getElementById('t' + i);
    if (btn) btn.classList.toggle('on', i === n);
  });
  if (n === 2) renderApprovals();
}

function checkBuilderAccess() {
  var isManagerPlus = MOCK_CURRENT_USER.role === 'admin' || MOCK_CURRENT_USER.role === 'manager';
  if (!MOCK_CURRENT_USER.permissions.includes('workflow_builder')) {
    var t3 = document.getElementById('t3');
    if (t3) t3.style.display = 'none';
  }
  if (!isManagerPlus) {
    var t2 = document.getElementById('t2');
    if (t2) t2.style.display = 'none';
  }
}

checkBuilderAccess();
renderBuilder();
renderApprovals();
// Restore active checklist from URL hash on page load
(function(){var h=location.hash.match(/checklist=([^&]+)/);if(h){var tpl=MOCK_TEMPLATES.find(function(t){return t.id===h[1]});if(tpl){fillState.activeTemplate=tpl;fillState.view='runner'}}})();
renderFillOut();
document.addEventListener('dblclick', e => e.preventDefault());
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
