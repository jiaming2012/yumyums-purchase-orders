  return `<div class="cat">TODAY'S CHECKLISTS</div>
<div style="padding:8px 16px 12px">
  <div style="height:8px;background:var(--brd);border-radius:4px;overflow:hidden"><div style="height:100%;background:#27ae60;border-radius:4px;width:${aggPct}%;transition:width .3s"></div></div>
  <div style="font-size:12px;color:var(--mut);margin-top:4px">${totalAnswered} of ${totalFields} items complete across ${today.length} checklist${today.length !== 1 ? 's' : ''}</div>
</div>
<div class="card">${rows}</div>
<div style="padding:8px 0;text-align:center"><button data-action="view-history" style="background:none;border:none;color:var(--info-tx);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;min-height:44px">View history</button></div>`;
}

function renderRunner() {
  const tpl = fillState.activeTemplate;
  clearHiddenFieldAnswers();
  const visibleFields = (tpl.sections || []).filter(s => isSectionVisible(s)).flatMap(s => (s.fields || []).filter(f => isFieldVisible(f)));
  const answered = visibleFields.filter(f => FIELD_RESPONSES[f.id] !== undefined && !REJECTION_FLAGS[f.id]).length;
  const allFields = visibleFields;
  // Check submission status BEFORE rendering sections — only today's submissions count
  var todayStr = new Date().toISOString().slice(0, 10);
  var submission = MY_SUBMISSIONS ? MY_SUBMISSIONS.find(function(s) {
    if (s.template_id !== tpl.id) return false;
    var subDate = s.submitted_at ? new Date(s.submitted_at).toISOString().slice(0, 10) : '';
    return subDate === todayStr;
  }) : null;
  var isSubmitted = submission && (submission.status === 'submitted');
  var isPending = submission && (submission.status === 'pending_approval' || submission.status === 'pending');
  var isApproved = submission && (submission.status === 'approved');
  fillState.readonly = isSubmitted || isPending || isApproved;
  const sectionsHtml = (tpl.sections || []).map(sec => renderRunnerSection(sec)).join('');
  const unsubmitBtn = `<button data-action="unsubmit" data-tpl-id="${tpl.id}" data-submission-id="${submission ? submission.id : ''}" style="width:100%;padding:14px;margin:16px 0 0;background:#c0392b;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer">Unsubmit</button>`;
  const submitHtml = isApproved
    ? `<div class="submit-confirm" style="margin-top:16px;color:#27ae60;font-weight:600">Approved \u2713</div>`
    : isSubmitted
    ? `<div class="submit-confirm" style="margin-top:16px">Checklist submitted. Thanks, ${getUserInitials()}!</div>${unsubmitBtn}`
    : isPending
      ? `<div class="submit-confirm" style="margin-top:16px">Submitted for approval by ${submission.submitted_by_name || getUserName()}. Waiting for manager review.</div>${unsubmitBtn}`
      : `<button class="btn-primary" id="submit-btn" data-action="submit" data-tpl-id="${tpl.id}" style="margin-top:8px">Submit checklist</button>`;
  return `<button class="editor-back" id="fill-back">Checklists</button>
<div style="padding:10px 16px 0" class="progress-line">
  <div style="height:6px;background:var(--brd);border-radius:3px;overflow:hidden;margin-bottom:6px"><div style="height:100%;background:#27ae60;border-radius:3px;width:${allFields.length?Math.round(answered/allFields.length*100):0}%;transition:width .3s"></div></div>
  <div style="font-size:13px;color:var(--mut)">${answered} of ${allFields.length} items complete</div>
</div>
${sectionsHtml}
${submitHtml}`;
}

function isSectionVisible(sec) {
  if (!sec.condition || !sec.condition.days || sec.condition.days.length === 0) return true;
  return sec.condition.days.includes(new Date().getDay());
}

function isFieldVisible(fld) {
  // Day-of-week check
  if (fld.condition && fld.condition.days && fld.condition.days.length > 0) {
    if (!fld.condition.days.includes(new Date().getDay())) return false;
  }
  // Skip logic check
  if (fld.condition && fld.condition.field_id) {
    var depResp = FIELD_RESPONSES[fld.condition.field_id];
    if (!depResp) return false; // dependent field not answered yet — hide
    var depVal = String(depResp.value);
    var expected = String(fld.condition.value);
    if (fld.condition.operator === 'equals' && depVal !== expected) return false;
    if (fld.condition.operator === 'not_equals' && depVal === expected) return false;
  }
  return true;
}

function clearHiddenFieldAnswers() {
  if (!fillState.activeTemplate) return;
  fillState.activeTemplate.sections.forEach(function(sec) {
    if (!isSectionVisible(sec)) {
      sec.fields.forEach(function(f) { delete FIELD_RESPONSES[f.id]; delete FAIL_NOTES[f.id]; });
    } else {
      sec.fields.forEach(function(f) {
        if (!isFieldVisible(f)) { delete FIELD_RESPONSES[f.id]; delete FAIL_NOTES[f.id]; }
      });
    }
  });
}

function renderRunnerSection(sec) {
  if (!isSectionVisible(sec)) return '';
  const fieldsHtml = (sec.fields || []).map(f => isFieldVisible(f) ? renderRunnerField(f) : '').join('');
  if (!fieldsHtml) return '';
  return `<div class="sec-hd"><span>${escapeHtml(sec.title)}</span></div><div class="card">${fieldsHtml}</div>`;
}

function renderRunnerField(fld) {
  const answered = FIELD_RESPONSES[fld.id] !== undefined;
  const resp = answered ? FIELD_RESPONSES[fld.id] : null;
  const attribution = answered ? `<div class="fill-attribution">${escapeHtml(resp.answeredBy)} · ${formatTime(resp.answeredAt)}</div>` : '';

  // Read-only mode: show values without interactive controls
  if (fillState.readonly) {
    var displayVal = '';
    if (fld.type === 'checkbox') {
      displayVal = answered ? '✓' : '—';
    } else if (fld.type === 'yes_no') {
      displayVal = !answered ? '—' : (resp.value === true || resp.value === 'true') ? 'Yes' : 'No';
    } else if (fld.type === 'temperature') {
      var unit = fld.config && fld.config.unit ? fld.config.unit : 'F';
      displayVal = answered ? resp.value + '°' + unit : '—';
    } else if (fld.type === 'text') {
      displayVal = answered ? escapeHtml(String(resp.value)) : '—';
    } else {
      displayVal = answered ? String(resp.value) : '—';
    }
    var failNote = FAIL_NOTES[fld.id];
    var failHtml = failNote && failNote.note ? `<div style="margin-top:4px;font-size:12px;color:var(--warn-tx)">Corrective action: ${escapeHtml(failNote.note)} (${escapeHtml(failNote.severity || '')})</div>` : '';
    return `<div class="fill-field" data-field-id="${fld.id}">
  <div class="fill-field-row">
    <div class="fill-field-label" style="margin-bottom:0">${escapeHtml(fld.label)}</div>
    <span style="font-weight:500">${displayVal}</span>
  </div>
  ${attribution}${failHtml}
</div>`;
  }

  const rejFlag = REJECTION_FLAGS[fld.id];
  const photoNeeded = rejFlag && rejFlag.requirePhoto && (!resp || !resp.value || typeof resp.value !== 'string' || !resp.value.startsWith('https://'));
  const correctionBanner = rejFlag ? `<div class="correction-banner">⚠ Rejected: ${escapeHtml(rejFlag.comment)}${photoNeeded ? ' · 📷 Photo required before resubmit' : rejFlag.requirePhoto ? ' · ✓ Photo uploaded' : ''}</div>` : '';

  if (fld.type === 'checkbox') {
    var subs = fld.sub_steps && fld.sub_steps.length > 0 ? fld.sub_steps : null;
    var subStepsHtml = '';
    if (subs) {
      var subState = (resp && resp.sub_steps) ? resp.sub_steps : {};
      var allSubsDone = subs.every(function(s) { return !!subState[s.id]; });
      subStepsHtml = subs.map(function(s) {
        var done = !!subState[s.id];
        return '<div class="sub-step-row"><span class="sub-step-label-text' + (done ? ' style="text-decoration:line-through;color:var(--mut)"' : '') + '">' + escapeHtml(s.label) + '</span>' +
          '<button class="sub-step-check ' + (done ? 'done' : '') + '" data-action="toggle-sub-step" data-field-id="' + fld.id + '" data-sub-id="' + s.id + '">' + (done ? '✓' : '') + '</button></div>';
      }).join('');
      // For sub-step checkboxes, parent is auto-checked when all subs done
      var parentChecked = allSubsDone;
      return '<div class="fill-field" data-field-id="' + fld.id + '">' +
        correctionBanner +
        '<div class="fill-field-row">' +
        '<div class="fill-field-label" style="margin-bottom:0">' + escapeHtml(fld.label) + '</div>' +
        '<button class="check-btn ' + (parentChecked ? 'checked' : '') + '" data-field-id="' + fld.id + '" data-has-subs="true" aria-label="Toggle checkbox">' + (parentChecked ? '✓' : '') + '</button>' +
        '</div>' +
        (parentChecked ? attribution : '') +
        subStepsHtml +
        '</div>';
    }
    return `<div class="fill-field" data-field-id="${fld.id}">
  ${correctionBanner}
  <div class="fill-field-row">
    <div class="fill-field-label" style="margin-bottom:0">${escapeHtml(fld.label)}</div>
    <button class="check-btn ${answered ? 'checked' : ''}" data-field-id="${fld.id}" aria-label="Toggle checkbox">${answered ? '✓' : ''}</button>
  </div>
  ${attribution}
</div>`;
  }

  if (fld.type === 'yes_no') {
    const isYes = answered && (resp.value === true || resp.value === 'true');
    const isNo = answered && (resp.value === false || resp.value === 'false');
    const failCard = isNo ? renderFailCard(fld, FAIL_NOTES[fld.id] || null) : '';
    return `<div class="fill-field" data-field-id="${fld.id}">
  ${correctionBanner}
  <div class="fill-field-label">${escapeHtml(fld.label)}</div>
  <div class="yn-pills">
    <button class="yn-pill${isYes ? ' on' : ''}" data-action="set-yes" data-fld-id="${fld.id}">Yes</button>
    <button class="yn-pill${isNo ? ' on' : ''}" data-action="set-no" data-fld-id="${fld.id}">No</button>
  </div>
  ${attribution}
</div>${failCard}`;
  }

  if (fld.type === 'text') {
    return `<div class="fill-field" data-field-id="${fld.id}">
  ${correctionBanner}
  <label class="fill-field-label" for="txt-${fld.id}">${escapeHtml(fld.label)}</label>
  <textarea id="txt-${fld.id}" class="fill-textarea" data-action="text-input" data-fld-id="${fld.id}" data-field-id="${fld.id}" rows="3" placeholder="Enter notes...">${answered ? escapeHtml(resp.value) : ''}</textarea>
  ${attribution}
</div>`;
  }

  if (fld.type === 'temperature') {
    const tempVal = answered ? resp.value : '';
    const isFail = evaluateFailTrigger(fld.fail_trigger, tempVal);
    const warnLabel = isFail && fld.fail_trigger
      ? `<span class="temp-warn">Out of range (${fld.fail_trigger.min}\u2013${fld.fail_trigger.max}\u00b0F)</span>`
      : '';
    const failCard = isFail ? renderFailCard(fld, FAIL_NOTES[fld.id] || null) : '';
    return `<div class="fill-field" data-field-id="${fld.id}">
  ${correctionBanner}
  <label class="fill-field-label" for="temp-${fld.id}">${escapeHtml(fld.label)}</label>
  <div class="temp-input-row" style="padding-left:0;padding-right:0">
    <input type="number" id="temp-${fld.id}" class="fill-temp-input" data-action="temp-input" data-fld-id="${fld.id}" data-field-id="${fld.id}" value="${tempVal}" placeholder="0" style="width:80px;padding:10px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:18px;color:var(--txt);font-family:inherit;outline:none;-webkit-appearance:none">
    <span class="temp-unit" style="font-size:14px;color:var(--mut);margin-left:4px">°F</span>
  </div>
  ${warnLabel}
  ${attribution}
</div>${failCard}`;
  }

  if (fld.type === 'photo') {
    var photoUrl = answered && resp && typeof resp.value === 'string' && resp.value.startsWith('https://') ? resp.value : null;
    var captureAreaHtml = photoUrl
      ? '<div class="photo-thumb-wrap">' +
        '<a class="photo-thumb-link" href="' + photoUrl + '" target="_blank">' +
        '<img class="photo-thumb" src="' + photoUrl + '" alt="Captured photo">' +
        '</a>' +
        '<button class="photo-retake-link" data-action="photo-retake" data-fld-id="' + fld.id + '">Retake</button>' +
        '</div>'
      : '<button class="photo-capture-btn" data-action="photo-capture" data-fld-id="' + fld.id + '">📷 Take Photo</button>';
    return '<div class="fill-field" data-field-id="' + fld.id + '">' +
      correctionBanner +
      '<div class="fill-field-label">' + escapeHtml(fld.label) + '</div>' +
      '<div class="photo-capture-area" style="margin-top:6px">' + captureAreaHtml + '</div>' +
      attribution +
      '</div>';
  }

  return `<div class="fill-field" data-field-id="${fld.id}"><div class="fill-field-label">${escapeHtml(fld.label)}</div></div>`;
}

function attachRunnerListeners() {
  // Text textarea: save on blur, no re-render
  document.querySelectorAll('.fill-textarea').forEach(el => {
    el.addEventListener('blur', function() {
      const fldId = this.dataset.fieldId;
      if (this.value.trim()) {
        FIELD_RESPONSES[fldId] = { value: this.value.trim(), answeredBy: getUserName(), answeredAt: new Date() };
        debouncedSaveField(fldId, this.value.trim());
      } else {
        delete FIELD_RESPONSES[fldId];
      }
      updateProgress();
    });
  });
  // Temperature: handled by input delegation — no blur listener needed
}

function countCompletedFields() {
  // Derive answered count from FIELD_RESPONSES minus any fields with active rejection flags
  if (!fillState.activeTemplate) return { answered: 0, total: 0 };
  const allFields = fillState.activeTemplate.sections.filter(s => isSectionVisible(s)).flatMap(s => s.fields.filter(f => isFieldVisible(f)));
  const answered = allFields.filter(f => FIELD_RESPONSES[f.id] !== undefined && !REJECTION_FLAGS[f.id]).length;
  return { answered, total: allFields.length };
}

function updateProgress() {
  const { answered, total } = countCompletedFields();
  const el = document.querySelector('#fill-body .progress-line');
  if (el) {
    var pct = total ? Math.round(answered / total * 100) : 0;
    el.innerHTML = '<div style="height:6px;background:var(--brd);border-radius:3px;overflow:hidden;margin-bottom:6px"><div style="height:100%;background:#27ae60;border-radius:3px;width:' + pct + '%;transition:width .3s"></div></div><div style="font-size:13px;color:var(--mut)">' + answered + ' of ' + total + ' items complete</div>';
  }
}

document.getElementById('fill-body').addEventListener('click', function(e) {
  // Checklist list row → open runner
  const fillRow = e.target.closest('[data-fill-template-id]');
  if (fillRow) {
    const tpl = MY_CHECKLISTS.find(t => t.id === fillRow.dataset.fillTemplateId);
    if (tpl) {
      fillState.activeTemplate = tpl;
      fillState.view = 'runner';
      location.hash = 'checklist=' + tpl.id;
      // Restore field state (including fail notes) for this template's fields
      var tplFieldIds = new Set((tpl.sections || []).flatMap(function(s) { return (s.fields || []).map(function(f) { return f.id; }); }));
      hydrateFieldState(tplFieldIds);
      renderFillOut();
    }
    return;
  }

  // View history link
  if (e.target.closest('[data-action="view-history"]')) {
    var container = document.getElementById('checklist-list');
    if (container) {
      container.innerHTML = '<div style="padding:8px 0"><div style="font-size:13px;color:var(--mut);padding:8px 16px">Loading history\u2026</div></div>';
      api('GET', 'myHistory').then(function(history) {
        if (!history || history.length === 0) {
          container.innerHTML = '<div class="empty-state"><h2>No history yet</h2><p>Your submitted checklists will appear here.</p></div>';
          return;
        }
        var rows = history.map(function(s) {
          return '<div class="row"><div><div class="nm">' + escapeHtml(s.template_name || 'Checklist') + '</div>' +
            '<div class="mt">' + formatDateTime(new Date(s.submitted_at || s.submittedAt)) + ' \u00b7 ' + escapeHtml(s.status || '') + '</div></div></div>';
        }).join('');
        container.innerHTML = '<div class="cat">HISTORY</div><div class="card">' + rows + '</div>' +
          '<div style="padding:8px 0;text-align:center"><button data-action="back-to-today" style="background:none;border:none;color:var(--info-tx);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;min-height:44px">\u2190 Back to today</button></div>';
      }).catch(function() {
        container.innerHTML = '<div class="inline-error">Couldn\u2019t load history. <button class="retry-btn" onclick="renderMyChecklists()">Retry</button></div>';
      });
    }
    return;
  }

  // Back to today
  if (e.target.closest('[data-action="back-to-today"]')) {
    renderMyChecklists();
    return;
  }

  // Back button in runner
  if (e.target.closest('#fill-back')) {
    fillState.view = 'list';
    fillState.activeTemplate = null;
    fillState.readonly = false;
    location.hash = '';
    renderFillOut();
    return;
  }

  // Checkbox button
  const checkBtn = e.target.closest('.check-btn');
  if (checkBtn) {
    const fldId = checkBtn.dataset.fieldId;
    const hasSubs = checkBtn.dataset.hasSubs === 'true';
    if (hasSubs) {
      // Parent with sub-steps: unchecking clears all sub-steps; can't directly check parent
      if (FIELD_RESPONSES[fldId]) {
        delete FIELD_RESPONSES[fldId]; // clears parent + sub_steps state
        debouncedSaveField(fldId, null);
      }
    } else if (FIELD_RESPONSES[fldId]) {
      delete FIELD_RESPONSES[fldId];
      debouncedSaveField(fldId, null);
    } else {
      clearRejectionFlag(fldId);
      FIELD_RESPONSES[fldId] = { value: true, answeredBy: getUserName(), answeredAt: new Date() };
      debouncedSaveField(fldId, true);
    }
    const fieldDiv = document.querySelector(`.fill-field[data-field-id="${fldId}"]`);
    const tplField = fillState.activeTemplate.sections.flatMap(s => s.fields).find(f => f.id === fldId);
    if (fieldDiv && tplField) fieldDiv.outerHTML = renderRunnerField(tplField);
    updateProgress();
    return;
  }

  // data-action routing
  const actionEl = e.target.closest('[data-action]');
  if (actionEl) {
    const action = actionEl.dataset.action;
    const fldId = actionEl.dataset.fldId;

    if (action === 'toggle-sub-step') {
      var parentFldId = actionEl.dataset.fieldId;
      var subId = actionEl.dataset.subId;
      var tplField = fillState.activeTemplate.sections.flatMap(function(s){return s.fields}).find(function(f){return f.id===parentFldId});
      if (!tplField || !tplField.sub_steps) return;
      // Get or create response with sub_steps map
      if (!FIELD_RESPONSES[parentFldId]) {
        FIELD_RESPONSES[parentFldId] = { value: false, answeredBy: getUserName(), answeredAt: new Date(), sub_steps: {} };
      }
      var resp = FIELD_RESPONSES[parentFldId];
      if (!resp.sub_steps) resp.sub_steps = {};
      // Toggle
      if (resp.sub_steps[subId]) {
        delete resp.sub_steps[subId];
      } else {
        resp.sub_steps[subId] = true;
      }
      // Auto-check parent if all subs done
      var allDone = tplField.sub_steps.every(function(s){ return !!resp.sub_steps[s.id]; });
      resp.value = allDone;
      if (allDone) { resp.answeredAt = new Date(); clearRejectionFlag(parentFldId); }
      debouncedSaveField(parentFldId, { value: resp.value, sub_steps: resp.sub_steps });
      var fieldDiv = document.querySelector('.fill-field[data-field-id="' + parentFldId + '"]');
      if (fieldDiv) fieldDiv.outerHTML = renderRunnerField(tplField);
      updateProgress();
      return;
    }

    if (action === 'set-yes') {
      clearRejectionFlag(fldId);
      FIELD_RESPONSES[fldId] = { value: true, answeredBy: getUserName(), answeredAt: new Date() };
      debouncedSaveField(fldId, true);
      if (FAIL_NOTES[fldId]) delete FAIL_NOTES[fldId];
      const fieldDiv = document.querySelector(`.fill-field[data-field-id="${fldId}"]`);
      const tplField = fillState.activeTemplate.sections.flatMap(s => s.fields).find(f => f.id === fldId);
      if (fieldDiv && tplField) {
        // replace field AND any adjacent fail-card
        var next = fieldDiv.nextElementSibling;
        if (next && next.classList.contains('fail-card')) next.remove();
        fieldDiv.outerHTML = renderRunnerField(tplField);
      }
      updateProgress();
      return;
    }

    if (action === 'set-no') {
      clearRejectionFlag(fldId);
      FIELD_RESPONSES[fldId] = { value: false, answeredBy: getUserName(), answeredAt: new Date() };
      debouncedSaveField(fldId, false);
      if (!FAIL_NOTES[fldId]) FAIL_NOTES[fldId] = { note: '', severity: '' };
      const fieldDiv = document.querySelector(`.fill-field[data-field-id="${fldId}"]`);
      const tplField = fillState.activeTemplate.sections.flatMap(s => s.fields).find(f => f.id === fldId);
      if (fieldDiv && tplField) {
        var next = fieldDiv.nextElementSibling;
        if (next && next.classList.contains('fail-card')) next.remove();
        fieldDiv.outerHTML = renderRunnerField(tplField);
      }
      updateProgress();
      return;
    }

    if (action === 'set-severity') {
      const severity = actionEl.dataset.severity;
      if (!FAIL_NOTES[fldId]) FAIL_NOTES[fldId] = { note: '', severity: '' };
      FAIL_NOTES[fldId].severity = severity;
      autoSaveFailNote(fldId);
      // Re-render just the fail card
      const failCard = e.target.closest('.fail-card');
      if (failCard) {
        const tplField = fillState.activeTemplate.sections.flatMap(s => s.fields).find(f => f.id === fldId);
        if (tplField) {
          const tmp = document.createElement('div');
          tmp.innerHTML = renderFailCard(tplField, FAIL_NOTES[fldId]);
          failCard.replaceWith(tmp.firstChild);
        }
      }
      return;
    }

    if (action === 'photo-capture' || action === 'photo-retake') {
      handlePhotoCaptureClick(fldId);
      return;
    }

    if (action === 'fail-photo-capture' || action === 'fail-photo-retake') {
      handleFailPhotoCaptureClick(fldId);
      return;
    }

    if (action === 'unsubmit') {
      // Unsubmit not supported in this version — show message
      showToast('Unsubmit not yet available');
      return;
    }

    if (action === 'submit') {
      const tplId = actionEl.dataset.tplId;
      var btn = document.getElementById('submit-btn');
      var allFlds = fillState.activeTemplate.sections.filter(function(s){return isSectionVisible(s)}).flatMap(function(s){return s.fields.filter(function(f){return isFieldVisible(f)})});

      // Validate: fields with triggered fail conditions must have a corrective action
      var missingCorrective = allFlds.filter(function(f) {
        var resp = FIELD_RESPONSES[f.id];
        if (!resp || !f.fail_trigger) return false;
        var triggered = evaluateFailTrigger(f.fail_trigger, resp.value);
        if (!triggered) return false;
        var fn = FAIL_NOTES[f.id];
        return !fn || !fn.note || !fn.note.trim() || !fn.severity;
      });
      if (missingCorrective.length > 0) {
        var fieldNames = missingCorrective.map(function(f) { return f.label; }).join(', ');
        showToast('Select severity for: ' + fieldNames);
        // Scroll to first missing fail card
        var firstFld = document.querySelector('[data-field-id="' + missingCorrective[0].id + '"]');
        if (firstFld) firstFld.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      // Cancel any pending auto-saves — their drafts will be moved by submitChecklist
      Object.keys(SAVE_DEBOUNCE).forEach(function(k) { clearTimeout(SAVE_DEBOUNCE[k]); delete SAVE_DEBOUNCE[k]; });
      Object.keys(FAIL_NOTE_DEBOUNCE).forEach(function(k) { clearTimeout(FAIL_NOTE_DEBOUNCE[k]); delete FAIL_NOTE_DEBOUNCE[k]; });
      _pendingSaves = 0;
      var statusEl = document.getElementById('save-status');
      if (statusEl) { statusEl.style.display = 'none'; statusEl.style.opacity = '0'; }
      if (btn) { btn.textContent = 'Submitting\u2026'; btn.disabled = true; }
      var allDone = allFlds.every(function(f){return FIELD_RESPONSES[f.id] !== undefined});
      var prevSubmission = MY_SUBMISSIONS ? MY_SUBMISSIONS.find(function(s){return s.template_id===tplId}) : null;
      var isReapproval = prevSubmission && prevSubmission.status === 'rejected';
      Object.keys(REJECTION_FLAGS).forEach(function(k){ delete REJECTION_FLAGS[k]; });
      updateSaveStatus(1);
      submitChecklistToAPI(tplId, allFlds, isReapproval).then(function(result) {
        updateSaveStatus(-1);
        var submissionId = result && result.id;
        // Update MY_SUBMISSIONS optimistically
        var existing = MY_SUBMISSIONS ? MY_SUBMISSIONS.find(function(s){return s.template_id===tplId}) : null;
        if (existing) {
          existing.status = fillState.activeTemplate.requires_approval ? 'pending_approval' : 'submitted';
          existing.id = submissionId || existing.id;
        } else if (MY_SUBMISSIONS) {
          MY_SUBMISSIONS.push({ id: submissionId, template_id: tplId, status: fillState.activeTemplate.requires_approval ? 'pending_approval' : 'submitted', submitted_at: new Date().toISOString() });
        }
        var isApproval = fillState.activeTemplate && fillState.activeTemplate.requires_approval;
        var toastMsg = isApproval ? 'Submitted for approval' : 'Checklist submitted. Thanks, ' + getUserInitials() + '!';
        if (allDone && isReapproval) {
          showSuccessCheck();
          setTimeout(function(){
            showToast(toastMsg);
            fillState.view = 'list'; fillState.activeTemplate = null; location.hash = '';
            renderFillOut();
          }, 2000);
        } else if (allDone) {
          fireworks();
          setTimeout(function(){
            showToast(toastMsg);
            fillState.view = 'list'; fillState.activeTemplate = null; location.hash = '';
            renderFillOut();
          }, 2500);
        } else {
          showToast(toastMsg);
          fillState.view = 'list'; fillState.activeTemplate = null; location.hash = '';
          renderFillOut();
        }
      }).catch(function(err) {
        updateSaveStatus(-1);
        if (btn) { btn.textContent = 'Submit checklist'; btn.disabled = false; }
        if (err && err.offline) {
          showToast('Queued for sync when back online');
          fillState.view = 'list'; fillState.activeTemplate = null; location.hash = '';
          renderFillOut();
          renderSyncBanner();
        } else if (err && err.status === 409) {
          var errDiv = document.createElement('div');
          errDiv.className = 'inline-error';
          errDiv.style.margin = '8px 0';
          errDiv.innerHTML = 'This checklist was archived while you were offline. Your responses have not been submitted. <button class="retry-btn" onclick="this.closest(\'.inline-error\').remove()">Dismiss</button>';
          if (btn) btn.parentNode.insertBefore(errDiv, btn);
        } else {
          showToast('Submission failed. Check your connection and try again.');
        }
      });
      return;
    }
  }

  // Legacy yes/no buttons (yn-btn class — keep for backward compat if any remain)
  const ynBtn = e.target.closest('.yn-btn');
  if (ynBtn) {
    const fldId = ynBtn.dataset.fieldId;
    const val = ynBtn.dataset.value === 'true';
    FIELD_RESPONSES[fldId] = { value: val, answeredBy: getUserName(), answeredAt: new Date() };
    debouncedSaveField(fldId, val);
    const fieldDiv = document.querySelector(`.fill-field[data-field-id="${fldId}"]`);
    const tplField = fillState.activeTemplate.sections.flatMap(s => s.fields).find(f => f.id === fldId);
    if (fieldDiv && tplField) fieldDiv.outerHTML = renderRunnerField(tplField);
    updateProgress();
    return;
  }
});

// Fill-body input delegation
document.getElementById('fill-body').addEventListener('input', function(e) {
  const actionEl = e.target.closest('[data-action]');
  if (!actionEl) return;
  const action = actionEl.dataset.action;
  const fldId = actionEl.dataset.fldId || actionEl.dataset.fieldId;

  if (action === 'text-input') {
    setTextAnswer(fldId, e.target.value); // NO re-render
    updateProgress();
    return;
  }

  if (action === 'temp-input') {
    const val = e.target.value;
    if (val !== '') {
      FIELD_RESPONSES[fldId] = { value: +val, answeredBy: getUserName(), answeredAt: new Date() };
      debouncedSaveField(fldId, +val);
    } else {
      delete FIELD_RESPONSES[fldId];
    }
    // Update fail card and warn label in-place (no full re-render — preserves cursor)
    const fieldDiv = e.target.closest('.fill-field');
    if (fieldDiv) {
      const tplField = fillState.activeTemplate.sections.flatMap(s => s.fields).find(f => f.id === fldId);
      if (tplField) {
        const isFail = typeof evaluateFailTrigger === 'function' && evaluateFailTrigger(tplField.fail_trigger, val !== '' ? +val : '');
        // Toggle warn label
        var warnEl = fieldDiv.querySelector('.temp-warn');
        if (isFail && tplField.fail_trigger) {
          if (!warnEl) { warnEl = document.createElement('span'); warnEl.className = 'temp-warn'; fieldDiv.appendChild(warnEl); }
          warnEl.textContent = 'Out of range (' + tplField.fail_trigger.min + '\u2013' + tplField.fail_trigger.max + '\u00b0F)';
        } else if (warnEl) { warnEl.remove(); }
        // Toggle fail card
        var failCard = fieldDiv.nextElementSibling;
        if (isFail) {
          if (!failCard || !failCard.classList.contains('fail-card')) {
            var tmp = document.createElement('div');
            tmp.innerHTML = typeof renderFailCard === 'function' ? renderFailCard(tplField, FAIL_NOTES[fldId] || null) : '';
            if (tmp.firstElementChild) fieldDiv.after(tmp.firstElementChild);
          }
        } else if (failCard && failCard.classList.contains('fail-card')) { failCard.remove(); }
      }
    }
    updateProgress();
    return;
  }

  if (action === 'fail-note-input') {
    setFailNote(fldId, { note: e.target.value }); // NO re-render — cursor jump prevention
    return;
  }
});

// ─── Approvals Tab ────────────────────────────────────────────────────────────

document.getElementById('approvals-body').addEventListener('click', function(e) {
  var actionEl = e.target.closest('[data-action]');
  if (!actionEl) return;
  var action = actionEl.dataset.action;

  if (action === 'approve') {
    var submissionId = actionEl.dataset.submissionId;
    if (!submissionId) return;
    var btn = actionEl;
    btn.textContent = 'Approving\u2026'; btn.disabled = true;
    updateSaveStatus(1);
    api('POST', 'approveSubmission', { submission_id: submissionId }).then(function() {
      updateSaveStatus(-1);
      showToast('Approved \u2713');
      store.setAll('pending', PENDING.filter(function(s) { return s.id !== submissionId; }));
      PENDING = store.get('pending');
      renderApprovals();
      loadMyChecklists();
    }).catch(function() {
      updateSaveStatus(-1);
      btn.textContent = 'Approve submission'; btn.disabled = false;
      showToast('Approval failed. Try again.');
    });
    return;
  }

  if (action === 'toggle-reject-item') {
    var submissionId = actionEl.dataset.submissionId;
    var fldId = actionEl.dataset.fldId;
    var submission = PENDING ? PENDING.find(function(s) { return s.id === submissionId; }) : null;
    if (!submission) return;
    var field = submission.fields ? submission.fields.find(function(f) { return f.id === fldId; }) : null;
    if (!field) return;
    // Preserve existing comments before re-render
    var card = actionEl.closest('.approval-card');
    if (card) {
      card.querySelectorAll('.reject-item-input').forEach(function(ta) {
        var fid = ta.dataset.rejectFld;
        var f = submission.fields ? submission.fields.find(function(x) { return x.id === fid; }) : null;
        if (f) f._rejectComment = ta.value.trim();
      });
    }
    field._pendingReject = !field._pendingReject;
    if (!field._pendingReject) { delete field._rejectComment; delete field._rejectRequirePhoto; }
    renderApprovals();
    return;
  }

  if (action === 'reject-submit') {
    var submissionId = actionEl.dataset.submissionId;
    var submission = PENDING ? PENDING.find(function(s) { return s.id === submissionId; }) : null;
    if (!submission) return;
    var rejectedFields = submission.fields ? submission.fields.filter(function(f) { return f._pendingReject; }) : [];
    if (rejectedFields.length === 0) {
      showToast('Flag at least one item to reject');
      return;
    }
    // Collect comments from DOM
    var card = actionEl.closest('.approval-card');
    if (card) {
      card.querySelectorAll('.reject-item-input').forEach(function(ta) {
        var fid = ta.dataset.rejectFld;
        var field = submission.fields.find(function(f) { return f.id === fid; });
        if (field) field._rejectComment = ta.value.trim();
      });
      card.querySelectorAll('[data-reject-photo-fld]').forEach(function(cb) {
        var fid = cb.dataset.rejectPhotoFld;
        var field = submission.fields.find(function(f) { return f.id === fid; });
        if (field) field._rejectRequirePhoto = cb.checked;
      });
    }
    // Check all flagged items have comments
    var missing = rejectedFields.filter(function(f) { return !f._rejectComment; });
    if (missing.length > 0) {
      if (card) {
        missing.forEach(function(f) {
          var ta = card.querySelector('[data-reject-fld="' + f.id + '"]');
          if (ta) ta.style.borderColor = '#c0392b';
        });
      }
      showToast('Add a comment for each flagged item');
      return;
    }
    var btn = actionEl;
    btn.textContent = 'Sending\u2026'; btn.disabled = true;
    // Send per-item rejections
    var rejectPromises = rejectedFields.map(function(f) {
      return api('POST', 'rejectItem', {
        submission_id: submissionId,
        field_id: f.id,
        comment: f._rejectComment,
        require_photo: !!f._rejectRequirePhoto
      });
    });
    updateSaveStatus(1);
    Promise.all(rejectPromises).then(function() {
      updateSaveStatus(-1);
      showToast('Rejected \u2014 crew must fix ' + rejectedFields.length + ' item(s)');
      store.setAll('pending', PENDING.filter(function(s) { return s.id !== submissionId; }));
      PENDING = store.get('pending');
      renderApprovals();
    }).catch(function() {
      updateSaveStatus(-1);
      btn.textContent = 'Send rejection'; btn.disabled = false;
      showToast('Rejection failed. Try again.');
    });
    return;
  }
});

// ─── Tab switching ────────────────────────────────────────────────────────────

function show(n) {
  if (wfBuilderHasUnsavedChanges() && !confirm('You have unsaved changes. Leave without saving?')) return;
  [1, 2, 3].forEach(function(i) {
    var sec = document.getElementById('s' + i);
    if (sec) sec.style.display = i === n ? 'block' : 'none';
    var btn = document.getElementById('t' + i);
    if (btn) btn.classList.toggle('on', i === n);
  });
  // Refresh data on each tab visit (D-22)
  if (n === 1) {
    fillState.view = 'list';
    fillState.activeTemplate = null;
    fillState.readonly = false;
    location.hash = '';
    renderFillOut();
    loadMyChecklists();
  }
  if (n === 2) {
    loadPendingApprovals();
  }
  if (n === 3) {
    state.view = 'list';
    state.activeTemplate = null;
    state.originalTemplate = null;
    loadTemplates();
  }
}

function checkBuilderAccess() {
  if (!CURRENT_USER) return;
  var roles = CURRENT_USER.roles || [];
  var isAdmin = roles.includes('admin') || roles.includes('superadmin') || CURRENT_USER.is_superadmin;
  var isManagerPlus = isAdmin || roles.includes('manager');
  // Approvals tab: manager+ only
  if (!isManagerPlus) {
    var t2 = document.getElementById('t2');
    if (t2) t2.style.display = 'none';
  }
  // Builder tab: admin+ only (D-11)
  if (!isAdmin) {
    var t3 = document.getElementById('t3');
    if (t3) t3.style.display = 'none';
  }
}

// ─── Reactive subscribers (per D-15) — re-render when store collections change ──

store.on('myChecklists', function() {
  MY_CHECKLISTS = store.get('myChecklists');
  if (fillState.view === 'list') renderMyChecklists();
});

store.on('mySubmissions', function() {
  MY_SUBMISSIONS = store.get('mySubmissions');
});

store.on('draftResponses', function() {
  DRAFT_RESPONSES = store.get('draftResponses');
});

store.on('pending', function() {
  PENDING = store.get('pending');
  renderApprovals();
});

store.on('templates', function() {
  TEMPLATES = store.get('templates');
  renderBuilderList();
});

// Initialize: load current user from /api/v1/me, then load tab data
(async function init() {
  try {
    CURRENT_USER = await fetch('/api/v1/me').then(function(r) {
      if (r.status === 401) { window.location = '/login.html'; return null; }
      return r.ok ? r.json() : null;
    });
  } catch(e) {
    CURRENT_USER = null;
  }
  // Initialize LamportClock from IndexedDB (persistent device_id)
  try {
    const db = await getDB();
    LAMPORT_CLOCK = await LamportClock.init(db);
  } catch(e) {
    console.error('LamportClock init error:', e);
  }
  checkBuilderAccess();
  renderBuilder();
  // Load My Checklists tab (initial tab)
  loadMyChecklists();
  // Drain any offline queue from previous sessions
  renderSyncBanner();
  drainQueue();
  // Connect WebSocket for real-time sync
  wsConnect();
  window.addEventListener('beforeunload', function(e) {
    if (wfBuilderHasUnsavedChanges()) { e.preventDefault(); e.returnValue = ''; }
  });
  document.getElementById('hq-back').addEventListener('click', function(e) {
    if (wfBuilderHasUnsavedChanges()) {
      e.preventDefault();
      if (confirm('You have unsaved changes. Leave without saving?')) {
        window.location.href = 'index.html';
      }
    }
  });
})();

document.addEventListener('dblclick', e => e.preventDefault());
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
