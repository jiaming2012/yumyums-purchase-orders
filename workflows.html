<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c447c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>Yumyums Workflows</title>
<style>
:root{--bg:#f5f5f3;--card:#fff;--txt:#1a1a1a;--mut:#6b6b6b;--brd:rgba(0,0,0,0.08);--info-bg:#e6f1fb;--info-tx:#0c447c;--warn-bg:#faeeda;--warn-tx:#854f0b}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--card:#262626;--txt:#f0f0f0;--mut:#999;--brd:rgba(255,255,255,0.1);--info-bg:#0c447c;--info-tx:#b5d4f4;--warn-bg:#633806;--warn-tx:#fac775;--sync-highlight:rgba(96,165,250,0.25)}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{margin:0;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom)}
.app{max-width:480px;margin:0 auto;padding-top:12px}
.back{display:flex;align-items:center;gap:6px;margin-bottom:12px;color:var(--info-tx);font-size:14px;font-weight:500;text-decoration:none;-webkit-tap-highlight-color:transparent}
.back::before{content:'‹';font-size:20px;line-height:1;margin-top:-1px}
.tabs{display:flex;gap:4px;background:var(--card);border-radius:10px;padding:4px;margin-bottom:12px}
.tabs button{flex:1;border:none;padding:10px;font-size:13px;border-radius:7px;background:transparent;color:var(--txt);font-weight:500}
.tabs button.on{background:var(--info-bg);color:var(--info-tx)}
.card{background:var(--card);border-radius:12px;overflow:hidden;margin-bottom:8px}
.hd{padding:14px 16px;border-bottom:0.5px solid var(--brd)}
.hd h1{font-size:15px;font-weight:500;margin:0}
.sub{font-size:12px;color:var(--mut);margin-top:4px;display:flex;justify-content:space-between;align-items:center}
.cat{position:sticky;top:0;background:var(--bg);padding:6px 16px;font-size:12px;font-weight:500;color:var(--mut);text-transform:uppercase;letter-spacing:0.5px;z-index:1}
.row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--brd)}
.row:last-child{border-bottom:none}
.row .nm{font-size:14px}
.row .mt{font-size:12px;color:var(--mut)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--mut);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px}
.field input,.field select{width:100%;padding:11px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt);font-family:inherit;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--info-tx)}
.btn-primary{width:100%;padding:12px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:8px;font-size:14px;font-weight:500;font-family:inherit;margin-bottom:10px;cursor:pointer}
.btn-primary:active{opacity:0.8}
.btn-secondary{width:100%;padding:11px;background:transparent;color:var(--mut);border:0.5px solid var(--brd);border-radius:8px;font-size:13px;font-weight:500;font-family:inherit;margin-bottom:8px;cursor:pointer}
.btn-danger{width:100%;padding:11px;background:transparent;color:#c0392b;border:0.5px solid #c0392b;border-radius:8px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:0.5px solid var(--brd)}
.toggle-row:last-child{border-bottom:none}
.toggle-row .lbl{font-size:13px;font-weight:500}
.toggle-row .sub{font-size:11px;color:var(--mut);margin-top:1px}
.toggle{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.slider{position:absolute;cursor:pointer;inset:0;background:var(--brd);border-radius:24px;transition:background .2s}
.slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.slider{background:var(--info-tx)}
.toggle input:checked+.slider::before{transform:translateX(18px)}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg);font-size:12px;font-weight:500;color:var(--mut);text-transform:uppercase;letter-spacing:0.5px}
.sec-delete{background:none;border:none;color:#c0392b;font-size:16px;padding:4px 8px;cursor:pointer}
.field-list{min-height:8px}
.field-row{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:0.5px solid var(--brd);min-height:44px;flex-wrap:wrap;background:var(--card);border-radius:8px;margin:4px 8px}
.drag-handle{color:var(--mut);font-size:18px;cursor:grab;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.field-row-tap{flex:1;font-size:14px;cursor:pointer}
.field-type-pill{font-size:12px;padding:3px 8px;border-radius:10px;background:var(--info-bg);color:var(--info-tx)}
.field-delete{background:none;border:none;color:#c0392b;font-size:16px;padding:4px 8px;cursor:pointer}
.field-settings{width:100%;padding:12px 16px;background:var(--card);border-top:0.5px solid var(--brd)}
.add-field-btn{display:block;width:100%;padding:10px 16px;background:transparent;border:none;color:var(--info-tx);font-size:13px;font-weight:500;text-align:left;cursor:pointer}
.field-type-picker{background:var(--card);border-radius:12px;overflow:hidden;margin:4px 0 8px}
.field-type-picker .row{cursor:pointer}
.section-divider{height:0.5px;background:var(--brd);margin:8px 0}
.add-section-btn{width:100%;padding:12px;background:transparent;color:var(--mut);border:0.5px solid var(--brd);border-radius:8px;font-size:13px;font-weight:500;margin:8px 0;cursor:pointer}
.day-chip{display:inline-flex;align-items:center;justify-content:center;min-width:36px;min-height:36px;border-radius:18px;border:0.5px solid var(--brd);background:transparent;color:var(--txt);font-size:12px;font-weight:500;cursor:pointer}
.day-chip.on{background:var(--info-bg);color:var(--info-tx);border-color:var(--info-tx)}
.day-chips-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.skip-logic-row{margin-top:12px}
.skip-logic-row select{width:100%;padding:11px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt);font-family:inherit;outline:none;-webkit-appearance:none;margin-top:4px}
.skip-logic-row select:focus{border-color:var(--info-tx)}
.meta-card{background:var(--card);border-radius:12px;overflow:hidden;margin-bottom:12px}
.editor-back{display:flex;align-items:center;gap:6px;margin-bottom:12px;color:var(--info-tx);font-size:14px;font-weight:500;text-decoration:none;cursor:pointer;-webkit-tap-highlight-color:transparent;background:none;border:none;padding:0;font-family:inherit}
.editor-back::before{content:'‹';font-size:20px;line-height:1;margin-top:-1px}

.fill-field{padding:12px 16px;border-bottom:0.5px solid var(--brd)}

.fill-field-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sub-step-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 16px 8px 40px;border-bottom:0.5px solid var(--brd)}
.sub-step-row:last-child{border-bottom:none}

.sub-step-check{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:12px;color:#27ae60;flex-shrink:0;cursor:pointer;margin-right:9px}

.fill-field-label{font-size:14px;font-weight:500;margin-bottom:6px}
.fill-attribution{font-size:11px;color:var(--mut);margin-top:4px}
.check-btn{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--brd);background:transparent;color:#27ae60;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.check-btn.checked{background:rgba(39,174,96,0.12);border-color:#27ae60}
.yes-no-row{display:flex;gap:8px;margin-top:6px}
.yn-btn{flex:1;padding:12px;border-radius:8px;border:0.5px solid var(--brd);background:transparent;color:var(--txt);font-size:14px;font-weight:500;cursor:pointer}
.yn-btn.yn-yes{background:var(--info-bg);color:var(--info-tx);border-color:var(--info-tx)}
.yn-btn.yn-no{background:var(--warn-bg);color:var(--warn-tx);border-color:var(--warn-tx)}
.fill-textarea{width:100%;padding:10px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt);font-family:inherit;outline:none;resize:none;-webkit-appearance:none}

.yn-pills{display:flex;gap:8px;padding:4px 16px 8px}

.yn-pill.on{background:var(--info-bg);color:var(--info-tx);border-color:var(--info-tx)}
.severity-pills{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.severity-pill{padding:8px 16px;border-radius:8px;border:0.5px solid var(--brd);background:transparent;color:var(--txt);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.severity-pill.on{background:var(--info-bg);color:var(--info-tx);border-color:var(--info-tx)}
.temp-warn{font-size:12px;color:var(--warn-tx);margin:4px 16px 0;display:block}
.temp-input-row{display:flex;align-items:center;gap:4px;padding:4px 16px 8px}
.photo-stub-btn{padding:8px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
.photo-modal{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column}
.photo-preview{max-width:100%;max-height:70vh;object-fit:contain}
.photo-modal-actions{position:fixed;bottom:32px;left:0;right:0;display:flex;justify-content:center;gap:16px;align-items:center}
.photo-confirm-btn{min-width:56px;min-height:56px;border-radius:28px;background:var(--info-bg);color:var(--info-tx);border:none;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-retake-btn{padding:12px 16px;background:transparent;color:var(--info-tx);border:none;font-size:14px;font-weight:500;cursor:pointer;min-height:44px;font-family:inherit}
.photo-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;border:0.5px solid var(--brd)}
.photo-capture-btn{padding:8px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--txt)}
.photo-retake-link{background:none;border:none;color:var(--info-tx);font-size:12px;cursor:pointer;padding:0;font-family:inherit}
.submit-confirm{display:block;text-align:center;font-size:14px;color:var(--mut);margin-top:8px}
.fail-note-input{width:100%;padding:10px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt);font-family:inherit;outline:none;resize:none;-webkit-appearance:none;margin-top:8px}
.fail-note-input:focus{border-color:var(--info-tx)}
.approval-card{background:var(--card);border-radius:12px;margin-bottom:8px}
.approval-badge{display:inline-block;padding:4px 8px;border-radius:10px;background:var(--warn-bg);color:var(--warn-tx);font-size:12px;font-weight:500;margin-top:4px}
.btn-approve{width:100%;padding:12px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:8px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;min-height:44px}
.btn-approve:active{opacity:0.8}
.btn-reject{width:100%;padding:12px;background:transparent;color:#c0392b;border:0.5px solid #c0392b;border-radius:8px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;min-height:44px}
.btn-reject:active{opacity:0.8}
.btn-reject-confirm{width:100%;padding:12px;background:#c0392b;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;min-height:44px}
.rejection-reason{width:100%;padding:10px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt);font-family:inherit;outline:none;resize:none;-webkit-appearance:none}
.rejection-reason:focus{border-color:var(--info-tx)}
.photo-strip{display:flex;gap:8px;overflow-x:auto;padding:8px 16px}
.review-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:0.5px solid var(--brd)}
.review-item:last-child{border-bottom:none}
.review-check{color:#27ae60;font-size:14px;flex-shrink:0;margin-top:1px}
.review-label{font-size:14px;flex:1}
.review-reject-btn{font-size:12px;color:#c0392b;background:none;border:1px solid #c0392b;border-radius:6px;padding:4px 10px;cursor:pointer;flex-shrink:0;white-space:nowrap;margin-left:4px}
.review-reject-btn.selected{background:#c0392b;color:#fff}
.reject-item-form{padding:8px 16px 12px 38px;background:rgba(192,57,43,0.06)}

.reject-item-input{width:100%;padding:8px 10px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:13px;color:var(--txt);font-family:inherit;outline:none;resize:none;margin-bottom:6px}

.require-photo-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mut);cursor:pointer}
.require-photo-toggle input{width:16px;height:16px}
.correction-banner{padding:10px 16px;background:rgba(192,57,43,0.08);border:0.5px solid rgba(192,57,43,0.2);border-radius:8px;margin-bottom:8px;font-size:13px;color:#c0392b}

<div class="app">
<a class="back" href="index.html" id="hq-back">HQ &nbsp;&#183;&nbsp; Operations</a>
<div id="save-status" style="display:none"></div>
<div class="tabs">
  <button id="t1" class="on" onclick="show(1)">My Checklists</button>
  <button id="t2" onclick="show(2)">Approvals</button>
  <button id="t3" onclick="show(3)">Builder</button>
</div>

<script>
// ─── Per-field debounced save using submitOp (D-08) ──────────────────────────

const FIELD_DEBOUNCE = {};

function debouncedSaveField(fieldId, value) {
  if (FIELD_DEBOUNCE[fieldId]) { clearTimeout(FIELD_DEBOUNCE[fieldId]); updateSaveStatus(-1); }
  updateSaveStatus(1);
  FIELD_DEBOUNCE[fieldId] = setTimeout(async () => {
    FIELD_DEBOUNCE[fieldId] = null;
    const indicator = document.querySelector(`[data-field-id="${fieldId}"] .save-indicator`);
    try {
      var saveValue = value;
      var fn = store.get('failNotes', fieldId);
      if (fn && (fn.note || fn.severity || fn.photo)) {
        saveValue = { _v: value, _fail_note: { note: fn.note, severity: fn.severity, photo: fn.photo || null } };
      }
      const result = await submitOp('SET_FIELD', fieldId, 'field_response', { value: saveValue, field_id: fieldId });
      if (result && result._conflict) {
        const winner = result.winner;
        store.set('fieldResponses', fieldId, { value: winner.value });
        renderFieldResponse(fieldId);
        flashField(fieldId);
        enqueueSyncToast(null, 'Conflict resolved', [fieldId]);
        updateSaveStatus(-1);
        return;
      }
      var drafts = store.get('draftResponses');
      if (saveValue === null || saveValue === undefined) {
        var idx = drafts.findIndex(function(d) { return d.field_id === fieldId; });
        if (idx !== -1) drafts.splice(idx, 1);
      } else {
        var existing = drafts.find(function(d) { return d.field_id === fieldId; });
        if (existing) { existing.value = saveValue; existing.answered_at = new Date().toISOString(); }
        else drafts.push({ field_id: fieldId, value: saveValue, answered_at: new Date().toISOString() });
      }
      store._notify('draftResponses');
      if (indicator) { indicator.textContent = 'Saved'; indicator.className = 'save-indicator saved'; setTimeout(() => { indicator.textContent = ''; indicator.className = 'save-indicator'; }, 800); }
      clearFieldError(fieldId);
    } catch (e) {
      showFieldError(fieldId);
    }
    updateSaveStatus(-1);
  }, 400);
}

function showFieldError(fieldId) {
  const row = document.querySelector(`[data-field-id="${fieldId}"]`);
  if (!row) return;

async function loadMyChecklists() {
  const container = document.getElementById('checklist-list');
  if (MY_CHECKLISTS && MY_CHECKLISTS.length > 0) { if (!fillState.activeTemplate && container) renderMyChecklists(); }
  else if (container) renderSkeletons(container, 3);
  try {
    const data = await api('GET', 'myChecklists?dow=' + new Date().getDay());
    store.batch(function() {
      store.setAll('myChecklists', (data.templates || []).map(function(t) {
        if (!t.sections) t.sections = [];
        t.sections.forEach(function(s) { if (!s.fields) s.fields = []; });
        return t;
      }));
      store.setAll('mySubmissions', data.submissions || []);
      store.setAll('draftResponses', data.drafts || []);
    });
    MY_CHECKLISTS = store.get('myChecklists');
    MY_SUBMISSIONS = store.get('mySubmissions');
    DRAFT_RESPONSES = store.get('draftResponses');
    hydrateFieldState();
    // Re-render with fresh MY_SUBMISSIONS data (subscriber fires before hydrateFieldState)
    if (!fillState.activeTemplate && container) renderMyChecklists();
    // If runner is open, update the stale activeTemplate reference and re-render
    if (fillState.activeTemplate) {
      var updated = MY_CHECKLISTS.find(function(t) { return t.id === fillState.activeTemplate.id; });
      if (updated) fillState.activeTemplate = updated;
      var tplFieldIds = new Set((fillState.activeTemplate.sections || []).flatMap(function(s) { return (s.fields || []).map(function(f) { return f.id; }); }));
      hydrateFieldState(tplFieldIds);
      var fillBody = document.getElementById('fill-body');
      if (fillBody) fillBody.innerHTML = renderRunner();
    }
  } catch (e) {
    console.error('loadMyChecklists error:', e);
    if (container) { container.innerHTML = ''; renderError(container, "Couldn't load checklists.", () => loadMyChecklists()); }
  }
}

function fireworks(){
  var canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:10000;pointer-events:none';
  canvas.width=window.innerWidth*2;canvas.height=window.innerHeight*2;
  document.body.appendChild(canvas);
  var ctx=canvas.getContext('2d');
  ctx.scale(2,2);
  var W=window.innerWidth,H=window.innerHeight;
  var particles=[];
  var colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6eb4','#a66cff','#ff9f43','#00d2d3'];
  function burst(x,y){
    for(var i=0;i<40;i++){
      var angle=Math.random()*Math.PI*2;
      var speed=2+Math.random()*5;
      particles.push({x:x,y:y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,color:colors[Math.floor(Math.random()*colors.length)],size:2+Math.random()*3,gravity:0.06+Math.random()*0.04});
    }
  }
  // Launch 5 bursts with staggered timing
  burst(W*0.5,H*0.3);
  setTimeout(function(){burst(W*0.25,H*0.4)},200);
  setTimeout(function(){burst(W*0.75,H*0.35)},350);
  setTimeout(function(){burst(W*0.4,H*0.25)},500);
  setTimeout(function(){burst(W*0.6,H*0.45)},650);
  var frame;
  function animate(){
    ctx.clearRect(0,0,W,H);
    var alive=false;
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      if(p.life<=0)continue;
      alive=true;
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;
      p.life-=0.015;p.vx*=0.99;
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    if(alive){frame=requestAnimationFrame(animate)}
    else{cancelAnimationFrame(frame);canvas.remove()}
  }
  animate();
}

function openCamera(onCapture) {
  var inp = document.createElement('input');
  inp.type = 'file';

  inp.capture = 'environment';
  inp.style.cssText = 'position:fixed;top:-100px;left:-100px;opacity:0;pointer-events:none';

// Transform frontend template shape to backend API shape for save
function toApiTemplate(tpl) {
  var out = { name: tpl.name, requires_approval: !!tpl.requires_approval, sections: tpl.sections };
  var assignments = [];
  if (tpl.assigned_to) {
    (tpl.assigned_to.roles || []).forEach(function(r){ assignments.push({ assignee_type: 'role', assignee_id: r, assignment_role: 'assignee' }); });
    (tpl.assigned_to.users || []).forEach(function(u){ assignments.push({ assignee_type: 'user', assignee_id: u, assignment_role: 'assignee' }); });
  }
  if (tpl.approver) {
    (tpl.approver.roles || []).forEach(function(r){ assignments.push({ assignee_type: 'role', assignee_id: r, assignment_role: 'approver' }); });
    (tpl.approver.users || []).forEach(function(u){ assignments.push({ assignee_type: 'user', assignee_id: u, assignment_role: 'approver' }); });
  }
  out.assignments = assignments;
  if (tpl.active_days && tpl.active_days.length) {
    out.schedules = [{ active_days: tpl.active_days }];
  }
  return out;
}

// Transform backend API template to frontend shape after load
function fromApiTemplate(t) {
  if (!t.sections) t.sections = [];
  t.sections.forEach(function(s) { if (!s.fields) s.fields = []; });
  t.assigned_to = { roles: [], users: [] };
  t.approver = { roles: [], users: [] };
  (t.assignments || []).forEach(function(a) {
    var bucket = a.assignment_role === 'approver' ? t.approver : t.assigned_to;
    var list = a.assignee_type === 'role' ? bucket.roles : bucket.users;
    if (list.indexOf(a.assignee_id) === -1) list.push(a.assignee_id);
  });
  t.active_days = null;
  if (t.schedules && t.schedules.length) {
    t.active_days = t.schedules[0].active_days || null;
  }
  return t;
}

function createNewSection(title) {

    <span class="field-type-pill">${fld.type.replace('_',' ')}</span>
    <button class="field-delete" aria-label="Delete field" data-field-id="${fld.id}" data-section-id="${secId}">✕</button>
    ${isExpanded ? renderFieldExpanded(fld, secId) : ''}
  </div>`;
}

function toggleFieldExpanded(fldId) {
  state.expandedField = state.expandedField === fldId ? null : fldId;
  renderBuilder();
}

function toggleFieldPicker(secId) {
  state.fieldPickerSection = state.fieldPickerSection === secId ? null : secId;
  renderBuilder();
}

function addField(secId, type) {
  const sec = state.activeTemplate.sections.find(s => s.id === secId);
  if (!sec) return;
  const field = createNewField(type);
  field.order = sec.fields.length;
  sec.fields.push(field);
  state.fieldPickerSection = null;
  state.expandedField = field.id;
  renderBuilder();
}

function deleteField(secId, fldId) {
  const sec = state.activeTemplate.sections.find(s => s.id === secId);
  if (!sec) return;
  sec.fields = sec.fields.filter(f => f.id !== fldId);
  sec.fields.forEach((f, i) => { f.order = i; });
  if (state.expandedField === fldId) state.expandedField = null;
  renderBuilder();
}

function updateField(secId, fldId, patch) {
  const sec = state.activeTemplate.sections.find(s => s.id === secId);
  const fld = sec.fields.find(f => f.id === fldId);
  Object.assign(fld, patch);
  // Do NOT call renderBuilder() for text input changes (causes cursor jump)
  // Only re-render for toggle changes
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeAttr(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function openEditor(tplId) {
  if (tplId) {
    state.activeTemplate = TEMPLATES.find(t => t.id === tplId) || null;
    if (!state.activeTemplate) return;
    // Deep copy to avoid mutating the source array while editing
    state.activeTemplate = JSON.parse(JSON.stringify(state.activeTemplate));
    state.originalTemplate = JSON.parse(JSON.stringify(state.activeTemplate));
  } else {
    state.activeTemplate = createNewTemplate();
    state.originalTemplate = null;
  }
  state.view = 'editor';
  renderBuilder();
}

function backToList() {
  if (wfBuilderHasUnsavedChanges() && !confirm('You have unsaved changes. Leave without saving?')) return;
  state.view = 'list';
  state.activeTemplate = null;
  state.originalTemplate = null;
  state.expandedField = null;
  state.fieldPickerSection = null;
  renderBuilder();
}

const DAYS = ['M','T','W','T','F','Sa','Su'];
const DAY_INDICES = [1, 2, 3, 4, 5, 6, 0]; // Mon=1, Tue=2, ..., Sat=6, Sun=0

function renderDayChips(activeDays, targetId, targetType, hasCustomDays) {
  const days = activeDays || [];
  const isCustom = targetType === 'section' ? (activeDays !== null) : !!hasCustomDays;
  const inheritLabel = targetType === 'section' ? 'Same as schedule' : 'When section is visible';
  return `
    <div class="field" style="margin-top:12px">
      <label>SHOW ON DAYS</label>
      <div style="margin-bottom:8px">
        <button class="day-inherit-btn ${!isCustom ? 'on' : ''}" data-target-id="${targetId}" data-target-type="${targetType}" data-action="inherit" style="padding:6px 12px;border-radius:8px;border:0.5px solid var(--brd);background:${!isCustom ? 'var(--info-bg)' : 'transparent'};color:${!isCustom ? 'var(--info-tx)' : 'var(--mut)'};font-size:12px;font-weight:500;margin-right:6px;cursor:pointer">${inheritLabel}</button>
        <button class="day-inherit-btn ${isCustom ? 'on' : ''}" data-target-id="${targetId}" data-target-type="${targetType}" data-action="custom" style="padding:6px 12px;border-radius:8px;border:0.5px solid var(--brd);background:${isCustom ? 'var(--info-bg)' : 'transparent'};color:${isCustom ? 'var(--info-tx)' : 'var(--mut)'};font-size:12px;font-weight:500;cursor:pointer">Custom days</button>
      </div>
      <div class="day-chips-row" ${!isCustom ? 'style="display:none"' : ''}>
        ${DAYS.map((label, i) => `
          <button class="day-chip ${days.includes(DAY_INDICES[i]) ? 'on' : ''}"
                  data-day="${DAY_INDICES[i]}" data-target-id="${targetId}"
                  data-target-type="${targetType}">${label}</button>
        `).join('')}
      </div>
    </div>`;
}

function getPrecedingFields(template, sectionId, fieldId) {
  const fields = [];
  for (const sec of template.sections) {
    for (const fld of sec.fields) {
      if (sec.id === sectionId && fld.id === fieldId) return fields;
      fields.push({ id: fld.id, label: fld.label || fld.type, type: fld.type, sectionTitle: sec.title });
    }
  }
  return fields;
}

function getValuesForFieldType(type) {
  if (type === 'checkbox') return [{value: true, label: 'Checked'}, {value: false, label: 'Unchecked'}];
  if (type === 'yes_no') return [{value: true, label: 'Yes'}, {value: false, label: 'No'}];
  if (type === 'text') return [{value: '', label: 'Empty'}, {value: '_notempty', label: 'Not empty'}];
  if (type === 'temperature') return [{value: '_in_range', label: 'In range'}, {value: '_out_of_range', label: 'Out of range'}];
  if (type === 'photo') return [{value: true, label: 'Uploaded'}, {value: false, label: 'Not uploaded'}];
  return [];
}

function renderSkipLogic(fld, secId) {
  const preceding = getPrecedingFields(state.activeTemplate, secId, fld.id);
  if (preceding.length === 0) return '';

  const selectedFieldId = fld.condition && fld.condition.field_id ? fld.condition.field_id : '';
  const selectedValue = fld.condition && fld.condition.value !== undefined ? fld.condition.value : '';

  const selectedField = preceding.find(f => f.id === selectedFieldId);
  const valueOptions = selectedField ? getValuesForFieldType(selectedField.type) : [];

  return `
    <div class="skip-logic-row">
      <label style="display:block;font-size:12px;font-weight:500;color:var(--mut);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px">SHOW THIS FIELD ONLY WHEN</label>
      <select class="skip-field-select" data-field-id="${fld.id}" data-section-id="${secId}"
              style="width:100%;padding:11px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt);margin-bottom:8px">
        <option value="">select a field...</option>
        ${preceding.map(f => `<option value="${f.id}" ${f.id === selectedFieldId ? 'selected' : ''}>${escapeHtml(f.sectionTitle)}: ${escapeHtml(f.label)}</option>`).join('')}
      </select>
      ${selectedFieldId ? `
        <select class="skip-value-select" data-field-id="${fld.id}" data-section-id="${secId}"
                style="width:100%;padding:11px 12px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:14px;color:var(--txt)">
          <option value="">select a value...</option>
          ${valueOptions.map(v => `<option value="${JSON.stringify(v.value).replace(/"/g, '&quot;')}" ${JSON.stringify(v.value) === JSON.stringify(selectedValue) ? 'selected' : ''}>${v.label}</option>`).join('')}
        </select>
      ` : ''}
      ${selectedFieldId ? `<button class="skip-clear" data-field-id="${fld.id}" data-section-id="${secId}" style="margin-top:8px;background:none;border:none;color:#c0392b;font-size:12px;cursor:pointer;padding:4px 0">Remove condition</button>` : ''}
    </div>`;
}

let sortableInstances = [];

function initSortable() {
  sortableInstances.forEach(s => s.destroy());
  sortableInstances = [];
  document.querySelectorAll('.field-list').forEach(el => {
    const secId = el.dataset.sectionId;
    sortableInstances.push(Sortable.create(el, {
      handle: '.drag-handle',
      animation: 150,
      onEnd(evt) {
        const sec = state.activeTemplate.sections.find(s => s.id === secId);
        const moved = sec.fields.splice(evt.oldIndex, 1)[0];
        sec.fields.splice(evt.newIndex, 0, moved);
        sec.fields.forEach((f, i) => f.order = i);
        // No re-render — SortableJS already moved the DOM node
      }
    }));
  });
}

function addSection() {
  const title = prompt('Section name:');
  if (title && title.trim()) {
    const sec = createNewSection(title.trim());
    state.activeTemplate.sections.push(sec);
    renderBuilder();
  }
}

function deleteSection(secId) {
  state.activeTemplate.sections = state.activeTemplate.sections.filter(s => s.id !== secId);
  renderBuilder();
}

function updateTemplateName(name) {
  state.activeTemplate.name = name;
}

function toggleApproval() {
  state.activeTemplate.requires_approval = !state.activeTemplate.requires_approval;
  renderBuilder();
}

// Event delegation — attached ONCE, not inside render
document.getElementById('builder-body').addEventListener('click', function(e) {
  // Template row -> open editor
  const tplRow = e.target.closest('[data-template-id]');
  if (tplRow && !e.target.closest('.sec-delete') && !e.target.closest('.field-delete') && !e.target.closest('.day-inherit-btn') && !e.target.closest('.day-chip')) {
    openEditor(tplRow.dataset.templateId);
    return;
  }

  // Editor back button
  if (e.target.closest('.editor-back')) {
    backToList();
    return;
  }

  // Delete section
  const secDelete = e.target.closest('.sec-delete');
  if (secDelete) {
    deleteSection(secDelete.dataset.sectionId);
    return;
  }

  // Add section
  if (e.target.closest('.add-section-btn')) {
    addSection();
    return;
  }

  // Add field — toggle field type picker
  const addFieldBtn = e.target.closest('.add-field-btn');
  if (addFieldBtn) {
    toggleFieldPicker(addFieldBtn.dataset.sectionId);
    return;
  }

  // Field type picker row — add field of selected type
  const pickerRow = e.target.closest('.field-type-picker .row');
  if (pickerRow) {
    addField(pickerRow.dataset.sectionId, pickerRow.dataset.type);
    return;
  }

  // Assignment toggle actions
  var assignAction = e.target.closest('[data-action^="toggle-assign-"]') || e.target.closest('[data-action^="toggle-approver-"]');
  if (assignAction && state.activeTemplate) {
    var act = assignAction.dataset.action;
    var tpl = state.activeTemplate;
    if (act === 'toggle-assign-role') {
      if (!tpl.assigned_to) tpl.assigned_to = { roles: [], users: [] };
      var role = assignAction.dataset.role;
      var idx = tpl.assigned_to.roles.indexOf(role);
      if (idx === -1) tpl.assigned_to.roles.push(role); else tpl.assigned_to.roles.splice(idx, 1);
    } else if (act === 'toggle-assign-user') {
      if (!tpl.assigned_to) tpl.assigned_to = { roles: [], users: [] };
      var uid = assignAction.dataset.userId;
      var idx = tpl.assigned_to.users.indexOf(uid);
      if (idx === -1) tpl.assigned_to.users.push(uid); else tpl.assigned_to.users.splice(idx, 1);
    } else if (act === 'toggle-approver-role') {
      if (!tpl.approver) tpl.approver = { roles: [], users: [] };
      var role = assignAction.dataset.role;
      var idx = tpl.approver.roles.indexOf(role);
      if (idx === -1) tpl.approver.roles.push(role); else tpl.approver.roles.splice(idx, 1);
    } else if (act === 'toggle-approver-user') {
      if (!tpl.approver) tpl.approver = { roles: [], users: [] };
      var uid = assignAction.dataset.userId;
      var idx = tpl.approver.users.indexOf(uid);
      if (idx === -1) tpl.approver.users.push(uid); else tpl.approver.users.splice(idx, 1);
    }
    renderBuilder();
    return;
  }

  // Day schedule toggle
  var dayToggle = e.target.closest('[data-action="toggle-day"]');
  if (dayToggle && state.activeTemplate) {
    var day = parseInt(dayToggle.dataset.day, 10);
    if (!state.activeTemplate.active_days) state.activeTemplate.active_days = [];
    var idx = state.activeTemplate.active_days.indexOf(day);
    if (idx === -1) state.activeTemplate.active_days.push(day); else state.activeTemplate.active_days.splice(idx, 1);
    renderBuilder();
    return;
  }

  // Sub-step actions (must be before generic field-delete)
  var subAction = e.target.closest('[data-action="add-sub-step"]') || e.target.closest('[data-action="delete-sub-step"]');
  if (subAction) {
    var fldId = subAction.dataset.fieldId;
    var secId = subAction.dataset.sectionId;
    var sec = state.activeTemplate.sections.find(function(s){return s.id===secId});
    var fld = sec ? sec.fields.find(function(f){return f.id===fldId}) : null;
    if (fld) {
      if (!fld.sub_steps) fld.sub_steps = [];
      if (subAction.dataset.action === 'add-sub-step') {
        fld.sub_steps.push({ id: generateId('sub'), label: '' });
      } else {
        fld.sub_steps.splice(+subAction.dataset.subIdx, 1);
      }
      renderBuilder();
    }
    return;
  }

  // Delete field
  const fieldDelete = e.target.closest('.field-delete');
  if (fieldDelete) {
    deleteField(fieldDelete.dataset.sectionId, fieldDelete.dataset.fieldId);
    return;
  }

  // Tap field row to expand/collapse settings
  const fieldRowTap = e.target.closest('.field-row-tap');
  if (fieldRowTap) {
    const fieldRow = e.target.closest('.field-row');
    if (fieldRow) {
      toggleFieldExpanded(fieldRow.dataset.fieldId);
    }
    return;
  }

  // Skip logic — clear condition
  if (e.target.closest('.skip-clear')) {
    const btn = e.target.closest('.skip-clear');
    const fldId = btn.dataset.fieldId;
    const secId = btn.dataset.sectionId;
    const sec = state.activeTemplate.sections.find(s => s.id === secId);
    const fld = sec.fields.find(f => f.id === fldId);
    if (fld.condition) {
      delete fld.condition.field_id;
      delete fld.condition.operator;
      delete fld.condition.value;
      if (!fld.condition.days) fld.condition = null;
    }
    renderBuilder();
    return;
  }

  // Day inherit/custom toggle for fields
  if (e.target.closest('.day-inherit-btn')) {
    const btn = e.target.closest('.day-inherit-btn');
    const targetId = btn.dataset.targetId;
    const targetType = btn.dataset.targetType;
    const action = btn.dataset.action;
    if (targetType === 'section') {
      const sec = state.activeTemplate.sections.find(s => s.id === targetId);
      if (sec) {
        if (action === 'inherit') {
          sec.condition = null; // inherit from schedule
        } else {
          if (!sec.condition) sec.condition = { days: [] };
          else if (!sec.condition.days) sec.condition.days = [];
        }
      }
    } else {
      const sec = state.activeTemplate.sections.find(s =>
        s.fields.some(f => f.id === targetId));
      const fld = sec.fields.find(f => f.id === targetId);
      if (action === 'inherit') {
        if (fld.condition) { delete fld.condition.days; if (!fld.condition.field_id) fld.condition = null; }
      } else {
        if (!fld.condition) fld.condition = { days: [] };
        else if (!fld.condition.days) fld.condition.days = [];
      }
    }
    renderBuilder();
    return;
  }

  // Day chip toggle
  if (e.target.closest('.day-chip')) {
    const chip = e.target.closest('.day-chip');
    const dayIndex = +chip.dataset.day;
    const targetId = chip.dataset.targetId;
    const targetType = chip.dataset.targetType;

    if (targetType === 'section') {
      const sec = state.activeTemplate.sections.find(s => s.id === targetId);
      if (!sec.condition) sec.condition = { days: [] };
      const idx = sec.condition.days.indexOf(dayIndex);
      if (idx === -1) sec.condition.days.push(dayIndex);
      else sec.condition.days.splice(idx, 1);
      if (sec.condition.days.length === 0) sec.condition = null;
    } else {
      const sec = state.activeTemplate.sections.find(s =>
        s.fields.some(f => f.id === targetId));
      const fld = sec.fields.find(f => f.id === targetId);
      if (!fld.condition) fld.condition = { days: [] };
      else if (fld.condition.field_id) {
        // Already has skip logic — add days alongside
        if (!fld.condition.days) fld.condition.days = [];
      }
      const days = fld.condition.days || (fld.condition.days = []);
      const idx = days.indexOf(dayIndex);
      if (idx === -1) days.push(dayIndex);
      else days.splice(idx, 1);
      if (days.length === 0) delete fld.condition.days;
      if (!fld.condition.days && !fld.condition.field_id) fld.condition = null;
    }
    renderBuilder();
    return;
  }

  // Save template via API
  if (e.target.closest('#save-btn')) {
    var btn = e.target.closest('#save-btn');
    var tpl = state.activeTemplate;
    if (!tpl) return;
    btn.textContent = 'Saving\u2026';
    btn.disabled = true;
    var isNew = !TEMPLATES.find(function(t){return t.id===tpl.id});
    var endpoint = isNew ? 'createTemplate' : ('updateTemplate/' + tpl.id);
    var method = isNew ? 'POST' : 'PUT';
    updateSaveStatus(1);
    api(method, endpoint, toApiTemplate(tpl)).then(function(result) {
      updateSaveStatus(-1);
      if (isNew && result && result.id) tpl.id = result.id;
      showToast('Checklist saved \u2713');
      state.view = 'list';
      state.activeTemplate = null;
      state.originalTemplate = null;
      state.expandedField = null;
      state.fieldPickerSection = null;
      renderBuilder();
      loadTemplates();
    }).catch(function(err) {
      updateSaveStatus(-1);
      btn.textContent = 'Save checklist';
      btn.disabled = false;
      if (err && err.status === 403) {
        showToast(ADMIN_RESTRICTED);
      } else if (err && err.error === 'requires_approver') {
        showToast('Select at least one approver when approval is required.');
      } else {
        showToast('Save failed. Check your connection.');
      }
    });
    return;
  }

  // Archive template (inline confirm)
  if (e.target.closest('[data-action="archive-confirm"]')) {
    var tplId = e.target.closest('[data-action="archive-confirm"]').dataset.tplId;
    updateSaveStatus(1);
    api('DELETE', 'archiveTemplate/' + tplId).then(function() {
      updateSaveStatus(-1);
      showToast('Template archived');
      loadTemplates();
    }).catch(function() {
      updateSaveStatus(-1);
      showToast('Archive failed. Try again.');
    });
    return;
  }

  // Archive button — show inline confirm
  if (e.target.closest('[data-action="archive-template"]')) {
    var el = e.target.closest('[data-action="archive-template"]');
    var tplId = el.dataset.tplId;
    var existing = document.getElementById('archive-confirm-' + tplId);
    if (!existing) {
      var confirmDiv = document.createElement('div');
      confirmDiv.id = 'archive-confirm-' + tplId;
      confirmDiv.style.cssText = 'padding:8px 16px;font-size:13px;color:#c0392b;display:flex;align-items:center;gap:8px;flex-wrap:wrap';
      confirmDiv.innerHTML = 'Archive this template? Existing submissions will not be affected. ' +
        '<button data-action="archive-confirm" data-tpl-id="' + tplId + '" style="padding:6px 12px;background:#c0392b;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit">Archive</button>' +
        '<button data-action="archive-cancel" style="padding:6px 12px;background:transparent;color:var(--mut);border:none;font-size:12px;cursor:pointer;font-family:inherit">Cancel</button>';
      el.parentNode.insertBefore(confirmDiv, el.nextSibling);
    }
    return;
  }

  // Archive cancel
  if (e.target.closest('[data-action="archive-cancel"]')) {
    var confirm = e.target.closest('[id^="archive-confirm-"]');
    if (confirm) confirm.remove();
    return;
  }

  // New template button
  if (e.target.closest('.btn-primary') && state.view === 'list') {
    openEditor(null);
    return;
  }
});

// Input delegation — real-time field text updates without cursor jump
document.getElementById('builder-body').addEventListener('input', function(e) {
  const secId = e.target.dataset.sectionId;
  const fldId = e.target.dataset.fieldId;
  if (!secId || !fldId) return;

  if (e.target.classList.contains('fld-label')) {
    updateField(secId, fldId, { label: e.target.value });
    return;
  }

  if (e.target.classList.contains('sub-step-label')) {
    var sec = state.activeTemplate.sections.find(function(s){return s.id===secId});
    var fld = sec && sec.fields.find(function(f){return f.id===fldId});
    if (fld && fld.sub_steps && e.target.dataset.subIdx !== undefined) {
      fld.sub_steps[+e.target.dataset.subIdx].label = e.target.value;
    }
    return;
  }

  if (e.target.classList.contains('fld-temp-min')) {
    const sec = state.activeTemplate.sections.find(s => s.id === secId);
    const fld = sec && sec.fields.find(f => f.id === fldId);
    if (fld) {
      updateField(secId, fldId, {
        config: Object.assign({}, fld.config, { min: +e.target.value }),
        fail_trigger: fld.fail_trigger ? Object.assign({}, fld.fail_trigger, { min: +e.target.value }) : fld.fail_trigger
      });
    }
    return;
  }

  if (e.target.classList.contains('fld-temp-max')) {
    const sec = state.activeTemplate.sections.find(s => s.id === secId);
    const fld = sec && sec.fields.find(f => f.id === fldId);
    if (fld) {
      updateField(secId, fldId, {
        config: Object.assign({}, fld.config, { max: +e.target.value }),
        fail_trigger: fld.fail_trigger ? Object.assign({}, fld.fail_trigger, { max: +e.target.value }) : fld.fail_trigger
      });
    }
    return;
  }
});

// Change delegation — attached ONCE
document.getElementById('builder-body').addEventListener('change', function(e) {
  // Template name input
  if (e.target.id === 'tpl-name-input') {
    updateTemplateName(e.target.value);
    return;
  }

  // Requires approval toggle
  if (e.target.id === 'approval-toggle') {
    toggleApproval();
    return;
  }

  // Photo required toggle
  if (e.target.classList.contains('fld-photo-required')) {
    const secId = e.target.dataset.sectionId;
    const fldId = e.target.dataset.fieldId;
    if (secId && fldId) {
      updateField(secId, fldId, { required: e.target.checked });
      renderBuilder();
    }
    return;
  }

  // Skip logic — field selector
  if (e.target.classList.contains('skip-field-select')) {
    const select = e.target;
    const fldId = select.dataset.fieldId;
    const secId = select.dataset.sectionId;
    const sec = state.activeTemplate.sections.find(s => s.id === secId);
    const fld = sec.fields.find(f => f.id === fldId);
    if (select.value) {
      if (!fld.condition) fld.condition = {};
      fld.condition.field_id = select.value;
      fld.condition.operator = 'equals';
      delete fld.condition.value; // Reset value when field changes
    } else {
      // Clear skip logic but preserve days
      if (fld.condition) {
        delete fld.condition.field_id;
        delete fld.condition.operator;
        delete fld.condition.value;
        if (!fld.condition.days) fld.condition = null;
      }
    }
    renderBuilder();
    return;
  }

  // Skip logic — value selector
  if (e.target.classList.contains('skip-value-select')) {
    const select = e.target;
    const fldId = select.dataset.fieldId;
    const secId = select.dataset.sectionId;
    const sec = state.activeTemplate.sections.find(s => s.id === secId);
    const fld = sec.fields.find(f => f.id === fldId);
    fld.condition.value = JSON.parse(select.value);
    // No re-render needed — just state update
    return;
  }
});

// FIELD_RESPONSES and FAIL_NOTES are registered in store above and aliased at the top.
// Unwrap values that were double-stringified by an old bug.
// e.g. '"true"' → true, '"\"hey\""' → 'hey', '400' → 400
function unwrapValue(v) {
  if (typeof v !== 'string') return v;
  try {
    var parsed = JSON.parse(v);
    // If parsing a string produced another string, that's a double-wrapped value — unwrap it
    if (typeof parsed === 'string') return parsed;
    return parsed;
  } catch (e) {
    return v;
  }
}

// hydrateFieldState rebuilds FIELD_RESPONSES and FAIL_NOTES from all server sources.
// Priority: submission responses > draft responses.
// Called once after loadMyChecklists and when opening a checklist runner.
function hydrateFieldState(filterFieldIds) {
  // Clear existing state
  Object.keys(FIELD_RESPONSES).forEach(function(k) { delete FIELD_RESPONSES[k]; });
  Object.keys(FAIL_NOTES).forEach(function(k) { delete FAIL_NOTES[k]; });
  Object.keys(REJECTION_FLAGS).forEach(function(k) { delete REJECTION_FLAGS[k]; });
  // 1. Draft responses (in-progress, not yet submitted)
  (DRAFT_RESPONSES || []).forEach(function(d) {
    if (!filterFieldIds || filterFieldIds.has(d.field_id)) {
      if (d.value === null || d.value === undefined) return; // unchecked — no entry
      var val = unwrapValue(d.value);
      var subSteps = null;
      // Unpack bundled fail note if present
      if (val && typeof val === 'object' && val._v !== undefined) {
        if (val._fail_note) FAIL_NOTES[d.field_id] = { note: val._fail_note.note || '', severity: val._fail_note.severity || '', photo: val._fail_note.photo || null };
        val = val._v;
      }
      // Unpack sub-step objects: { value: bool, sub_steps: {...} }
      if (val && typeof val === 'object' && val.sub_steps !== undefined) {
        subSteps = val.sub_steps;
        val = val.value;
      }
      var entry = { value: val, answeredBy: d.answered_by_name || getUserName(), answeredAt: new Date(d.answered_at) };
      if (subSteps) entry.sub_steps = subSteps;
      FIELD_RESPONSES[d.field_id] = entry;
    }
  });
  // 2. Submitted responses (highest priority — overwrites drafts)
  (MY_SUBMISSIONS || []).forEach(function(sub) {
    (sub.responses || []).forEach(function(r) {
      if (!filterFieldIds || filterFieldIds.has(r.field_id)) {
        var val = unwrapValue(r.value);
        var subSteps = null;
        if (val && typeof val === 'object' && val.sub_steps !== undefined) {
          subSteps = val.sub_steps;
          val = val.value;
        }
        var entry = { value: val, answeredBy: r.answered_by_name || r.answeredBy || getUserName(), answeredAt: new Date(r.answered_at) };
        if (subSteps) entry.sub_steps = subSteps;
        FIELD_RESPONSES[r.field_id] = entry;
      }
    });
    // 3. Load rejection flags — only from the LATEST submission per template
    //    (a resubmission creates a new pending submission; the old rejected one should not clear new responses)
    if (sub.status === 'rejected' && sub.rejections && sub.rejections.length > 0) {
      var hasNewerSubmission = (MY_SUBMISSIONS || []).some(function(other) {
        return other.template_id === sub.template_id && other.id !== sub.id &&
          new Date(other.submitted_at) > new Date(sub.submitted_at);
      });
      if (!hasNewerSubmission) {
        sub.rejections.forEach(function(rej) {
          if (!filterFieldIds || filterFieldIds.has(rej.field_id)) {
            REJECTION_FLAGS[rej.field_id] = { comment: rej.comment || '', requirePhoto: !!rej.require_photo };
            delete FIELD_RESPONSES[rej.field_id]; // uncheck so crew must redo
          }
        });
      }
    }
  });
}

// FAIL_NOTES is registered in store above and aliased at the top.
const REJECTION_FLAGS = {}; // { [fldId]: { comment, requirePhoto } } — TODO: load from submission.rejections[] on checklist open

// Named mutation helpers (used inline in event handlers and referenced by name for traceability)
function clearRejectionFlag(fldId) {
  if (!REJECTION_FLAGS[fldId]) return;
  // Keep the flag if photo is required but not yet provided
  if (REJECTION_FLAGS[fldId].requirePhoto) {
    var resp = FIELD_RESPONSES[fldId];
    var hasPhoto = resp && resp.value && typeof resp.value === 'string' && resp.value.startsWith('https://');
    if (!hasPhoto) return; // keep flag — photo still needed
  }
  delete REJECTION_FLAGS[fldId];
}

function getUserName() {
  return CURRENT_USER ? (CURRENT_USER.display_name || CURRENT_USER.name || 'User') : 'User';
}
function getUserInitials() {
  if (!CURRENT_USER) return '?';
  if (CURRENT_USER.initials) return CURRENT_USER.initials;
  var n = CURRENT_USER.display_name || CURRENT_USER.name;
  return n ? n.split(' ').map(function(p){return p[0]}).join('').toUpperCase().slice(0,2) : '?';
}

function setYesNo(fldId, value) {
  clearRejectionFlag(fldId);
  FIELD_RESPONSES[fldId] = { value: value, answeredBy: getUserName(), answeredAt: new Date() };
  debouncedSaveField(fldId, value);
  if (!value) { if (!FAIL_NOTES[fldId]) FAIL_NOTES[fldId] = { note: '', severity: '' }; }
  else { if (FAIL_NOTES[fldId]) delete FAIL_NOTES[fldId]; }
}
function setTextAnswer(fldId, value) {
  // text-input handler — no re-render (cursor jump prevention)
  if (value.trim()) {
    FIELD_RESPONSES[fldId] = { value: value.trim(), answeredBy: getUserName(), answeredAt: new Date() };
    debouncedSaveField(fldId, value.trim());

  }
}
var FAIL_NOTE_DEBOUNCE = {};
function autoSaveFailNote(fldId) {
  clearTimeout(FAIL_NOTE_DEBOUNCE[fldId]);
  FAIL_NOTE_DEBOUNCE[fldId] = setTimeout(function() {
    var resp = FIELD_RESPONSES[fldId];

}

function setFailNote(fldId, patch) {
  if (!FAIL_NOTES[fldId]) FAIL_NOTES[fldId] = { note: '', severity: '' };
  Object.assign(FAIL_NOTES[fldId], patch);
  autoSaveFailNote(fldId);
}
function setSeverity(fldId, severity) {
  if (!FAIL_NOTES[fldId]) FAIL_NOTES[fldId] = { note: '', severity: '' };
  FAIL_NOTES[fldId].severity = severity;
}
async function submitChecklistToAPI(tplId, allFlds, isReapproval) {
  var responses = allFlds.map(function(f) {
    var resp = FIELD_RESPONSES[f.id];
    var failNote = FAIL_NOTES[f.id];
    return {
      field_id: f.id,
      value: resp ? JSON.stringify(resp.value) : null,
      fail_note: failNote ? failNote.note : null,
      fail_severity: failNote ? failNote.severity : null
    };
  }).filter(function(r) { return r.value !== null; });
  var submitPayload = {
    id: generateUUID(),
    template_id: tplId,
    idempotency_key: generateUUID(),
    responses: responses,
    fail_notes: Object.keys(FAIL_NOTES).map(function(fid) {
      return { field_id: fid, note: FAIL_NOTES[fid].note, severity: FAIL_NOTES[fid].severity };
    })
  };
  try {
    return await api('POST', 'submitChecklist', submitPayload);
  } catch (err) {
    if (!navigator.onLine) {
      await enqueueSubmission(submitPayload);
      throw { offline: true };
    }
    throw err;
  }
}

function handlePhotoCaptureClick(fldId) {
  openCamera(function(file) {
    var objectURL = URL.createObjectURL(file);
    showPhotoPreview(objectURL, function() {
      // User confirmed — upload via presigned PUT URL
      var fieldRow = document.querySelector('.fill-field[data-field-id="' + fldId + '"]');
      var captureArea = fieldRow ? fieldRow.querySelector('.photo-capture-area') : null;
      if (captureArea) {
        captureArea.innerHTML = '<div class="photo-uploading"><div class="photo-spinner"></div>Uploading...</div>';
      }
      var tpl = fillState.activeTemplate;
      var tplId = tpl ? tpl.id : 'unknown';
      var filename = fldId + '.jpg';
      fetch('/api/v1/photos/presign', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path_prefix: 'checklists', id: tplId, filename: filename })
      }).then(function(r) {
        if (r.status === 401) { location.href = 'login.html'; throw new Error('unauthorized'); }
        if (!r.ok) throw new Error('presign failed: ' + r.status);
        return r.json();
      })
        .then(function(presignResp) {
          return fetch(presignResp.url, {
            method: 'PUT',
            body: file,
            headers: { 'Content-Type': 'image/jpeg' }
          }).then(function(putResp) {
            if (!putResp.ok) throw new Error('PUT failed: ' + putResp.status);
            return presignResp.public_url;
          });
        })
        .then(function(publicUrl) {
          URL.revokeObjectURL(objectURL);
          FIELD_RESPONSES[fldId] = { value: publicUrl, answeredBy: getUserName(), answeredAt: new Date() };
          debouncedSaveField(fldId, publicUrl);
          if (captureArea) {
            captureArea.innerHTML =
              '<div class="photo-thumb-wrap">' +
              '<a class="photo-thumb-link" href="' + publicUrl + '" target="_blank">' +
              '<img class="photo-thumb" src="' + publicUrl + '" alt="Captured photo">' +
              '</a>' +
              '<button class="photo-retake-link" data-action="photo-retake" data-fld-id="' + fldId + '">Retake</button>' +
              '</div>';
          }
          updateProgress();
        })
        .catch(function(err) {
          console.error('Photo upload failed:', err);
          URL.revokeObjectURL(objectURL);
          if (captureArea) {
            captureArea.innerHTML =
              '<button class="photo-capture-btn" data-action="photo-capture" data-fld-id="' + fldId + '">📷 Take Photo</button>' +
              '<div class="photo-field-error" data-action="photo-capture" data-fld-id="' + fldId + '">Upload failed. Tap to retry.</div>';
          }
        });
    }, function() {
      // User retook — revoke old blob and re-open camera
      URL.revokeObjectURL(objectURL);
      handlePhotoCaptureClick(fldId);
    });
  });
}

function evaluateFailTrigger(fail_trigger, value) {
  if (!fail_trigger) return false;
  if (value === null || value === undefined || value === '') return false;
  if (fail_trigger.type === 'out_of_range') {
    var num = parseFloat(value);
    if (isNaN(num)) return false;
    var hasMin = fail_trigger.min !== undefined && fail_trigger.min !== null;
    var hasMax = fail_trigger.max !== undefined && fail_trigger.max !== null;
    if (hasMin && hasMax) return num < fail_trigger.min || num > fail_trigger.max;
    if (hasMin) return num < fail_trigger.min;
    if (hasMax) return num > fail_trigger.max;
  }
  return false;
}
