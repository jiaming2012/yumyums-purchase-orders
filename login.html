<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c447c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Yumyums">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<title>Yumyums HQ — Sign In</title>
<style>
:root{--bg:#f5f5f3;--card:#fff;--txt:#1a1a1a;--mut:#6b6b6b;--brd:rgba(0,0,0,0.08);--info-bg:#e6f1fb;--info-tx:#0c447c;--warn-bg:#faeeda;--warn-tx:#854f0b}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--card:#262626;--txt:#f0f0f0;--mut:#999;--brd:rgba(255,255,255,0.1);--info-bg:#0c447c;--info-tx:#b5d4f4;--warn-bg:#633806;--warn-tx:#fac775}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{margin:0;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom);min-height:100dvh;display:flex;align-items:center;justify-content:center}
.app{max-width:480px;width:100%}
.wordmark{font-size:26px;font-weight:700;color:var(--txt);text-align:center;margin-bottom:4px}
.sub{font-size:13px;color:var(--mut);text-align:center;margin-bottom:32px}
.card{background:var(--card);border-radius:14px;padding:24px;border:0.5px solid var(--brd)}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--mut);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px}
.field input{width:100%;padding:12px 14px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:15px;color:var(--txt);font-family:inherit;outline:none}
.field input:focus{border-color:var(--info-tx)}
.btn{width:100%;padding:13px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:8px;font-size:15px;font-weight:600;font-family:inherit;margin-top:4px;cursor:pointer}
.btn:active{opacity:0.8}
.error{display:none;background:var(--warn-bg);color:var(--warn-tx);border-radius:8px;padding:11px 14px;font-size:13px;margin-bottom:16px;text-align:center}
.error.show{display:block}
.welcome-heading{font-size:26px;font-weight:400;margin:0 0 8px;text-align:center}
.sub-heading{font-size:14px;color:var(--mut);margin-bottom:16px;text-align:center}
.logo{display:block;margin:0 auto 16px;max-width:200px;width:60%;height:auto;border-radius:12px}
</style>
</head>
<body>
<div class="app">
  <img class="logo" src="icons/logo-square.png" alt="Yumyums Smokin' Grille">
  <div class="wordmark">Yumyums HQ</div>
  <div class="sub">Good Food begins with Great Operations.</div>

  <div class="card">
    <div id="err" class="error">Invalid credentials. Please try again.</div>

    <!-- Normal login form -->
    <div id="login-form">
      <form onsubmit="signIn();return false">
        <div class="field">
          <label>Email</label>
          <input id="email" type="email" name="email" placeholder="you@yumyums.com" autocomplete="username">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="pw" type="password" name="password" placeholder="Password" autocomplete="current-password">
        </div>
        <button class="btn" type="submit">Sign In</button>
      </form>
    </div>

    <!-- Accept-invite form (shown when ?token= present) -->
    <div id="invite-form" style="display:none">
      <h1 id="welcome-heading" class="welcome-heading"></h1>
      <p id="invite-sub" class="sub-heading">Set a password to activate your account.</p>
      <form onsubmit="acceptInvite();return false">
        <div id="nickname-field" class="field" style="display:none">
          <label>Nickname <span style="font-weight:400;color:var(--mut)">(optional)</span></label>
          <input id="invite-nick" type="text" placeholder="e.g. Jay" autocomplete="nickname">
          <div style="font-size:12px;color:var(--mut);margin-top:4px">How you'll appear in the app</div>
        </div>
        <div class="field">
          <label>Password</label>
          <input id="invite-pw" type="password" name="password" placeholder="At least 8 characters" autocomplete="new-password">
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input id="invite-pw2" type="password" name="confirm_password" placeholder="Repeat password" autocomplete="new-password">
        </div>
        <button class="btn" type="submit">Set Password &amp; Log In</button>
      </form>
    </div>
  </div>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const inviteToken=params.get('token');

if(inviteToken){
  showAcceptInviteMode(inviteToken);
}

async function showAcceptInviteMode(token){
  try{
    const res=await fetch('/api/v1/auth/invite-info?token='+encodeURIComponent(token));
    if(!res.ok){
      const data=await res.json().catch(()=>({}));
      showError('This invite link has expired. Ask your manager to send a new one.');
      return;
    }
    const data=await res.json();
    document.getElementById('login-form').style.display='none';
    document.getElementById('invite-form').style.display='block';
    document.getElementById('welcome-heading').textContent='Welcome, '+data.first_name;
    if(data.status==='invited'){
      document.getElementById('nickname-field').style.display='block';
    }else{
      document.getElementById('invite-sub').textContent='Enter your new password.';
    }
  }catch(e){
    showError('Something went wrong. Check your connection and try again.');
  }
}

async function acceptInvite(){
  const pw=document.getElementById('invite-pw').value;
  const pw2=document.getElementById('invite-pw2').value;
  const nick=(document.getElementById('invite-nick').value||'').trim();
  clearError();
  if(pw!==pw2){showError("Passwords don't match.");return}
  if(pw.length<8){showError('Password must be at least 8 characters.');return}
  try{
    const payload={token:inviteToken,password:pw};
    if(nick)payload.nickname=nick;
    const res=await fetch('/api/v1/auth/accept-invite',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    if(res.ok){
      window.location.href='/index.html';
    }else{
      const data=await res.json().catch(()=>({}));
      if(data.error==='token_expired'||data.error==='token_used'){
        showError('This invite link has expired. Ask your manager to send a new one.');
      }else{
        showError('Something went wrong. Check your connection and try again.');
      }
    }
  }catch(e){
    showError('Something went wrong. Check your connection and try again.');
  }
}

async function signIn(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  clearError();
  if(!email||!pw){showError('Invalid credentials. Please try again.');return}
  try{
    const res=await fetch('/api/v1/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email,password:pw})
    });
    if(res.ok){
      window.location.href='/';
    }else{
      showError('Invalid credentials. Please try again.');
    }
  }catch(e){
    showError('Invalid credentials. Please try again.');
  }
}

function showError(msg){
  const el=document.getElementById('err');
  el.textContent=msg;
  el.classList.add('show');
}

function clearError(){
  document.getElementById('err').classList.remove('show');
}

document.addEventListener('dblclick',e=>e.preventDefault());
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script>
<script src="log.js"></script><script src="ptr.js"></script>
</body>
</html>
