<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c447c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Yumyums">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Yumyums HQ — Sign In</title>
<style>
:root{--bg:#f5f5f3;--card:#fff;--txt:#1a1a1a;--mut:#6b6b6b;--brd:rgba(0,0,0,0.08);--info-bg:#e6f1fb;--info-tx:#0c447c;--warn-bg:#faeeda;--warn-tx:#854f0b}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--card:#262626;--txt:#f0f0f0;--mut:#999;--brd:rgba(255,255,255,0.1);--info-bg:#0c447c;--info-tx:#b5d4f4;--warn-bg:#633806;--warn-tx:#fac775}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{margin:0;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom);min-height:100dvh;display:flex;align-items:center;justify-content:center}
.app{max-width:480px;width:100%}
.wordmark{font-size:26px;font-weight:700;color:var(--txt);text-align:center;margin-bottom:4px}
.sub{font-size:13px;color:var(--mut);text-align:center;margin-bottom:32px}
.card{background:var(--card);border-radius:14px;padding:24px;border:0.5px solid var(--brd)}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--mut);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px}
.field input{width:100%;padding:12px 14px;background:var(--bg);border:0.5px solid var(--brd);border-radius:8px;font-size:15px;color:var(--txt);font-family:inherit;outline:none}
.field input:focus{border-color:var(--info-tx)}
.btn{width:100%;padding:13px;background:var(--info-bg);color:var(--info-tx);border:none;border-radius:8px;font-size:15px;font-weight:600;font-family:inherit;margin-top:4px}
.btn:active{opacity:0.8}
.error{display:none;background:var(--warn-bg);color:var(--warn-tx);border-radius:8px;padding:11px 14px;font-size:13px;margin-bottom:16px;text-align:center}
.error.show{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="wordmark">Yumyums HQ</div>
  <div class="sub">Operations console</div>

  <div class="card">
    <div id="err" class="error">Invalid credentials. Please try again.</div>
    <div class="field">
      <label>Email</label>
      <input id="email" type="email" placeholder="you@yumyums.com" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="pw" type="password" placeholder="Password" autocomplete="current-password">
    </div>
    <button class="btn" onclick="signIn()">Sign In</button>
  </div>
</div>

<script>
async function signIn(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');
  err.classList.remove('show');
  if(!email||!pw){err.classList.add('show');return}
  try{
    const res=await fetch('/api/v1/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email,password:pw})
    });
    if(res.ok){
      window.location.href='/index.html';
    }else{
      err.classList.add('show');
    }
  }catch(e){
    err.classList.add('show');
  }
}
document.addEventListener('dblclick',e=>e.preventDefault());
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script>
<script src="ptr.js"></script>
</body>
</html>
